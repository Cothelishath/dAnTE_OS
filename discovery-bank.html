<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Discovery Bank</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400;1,500;1,600&family=DM+Mono:wght@300;400;500&family=Outfit:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root[data-theme="dark"]{
  --bg:#090b0e;--bg-2:#0f1218;--bg-3:#161a22;--bg-4:#1e232e;
  --border:rgba(255,255,255,0.06);--border-gold:rgba(200,164,80,0.2);
  --text-primary:#ede8e0;--text-secondary:#8a8278;--text-muted:#4a4640;
  --gold:#c8a450;--gold-dim:rgba(200,164,80,0.1);--gold-bright:#d8b460;
  --faith:#7a9e8a;--self:#9a8abf;--relation:#c4788a;
  --work:#7a9abf;--finance:#bf9a6a;--health:#bf7a7a;
  --vision:#c8a450;--hard:#8a8a9e;--lead:#9ebf7a;
  --mind:#7abfbf;--create:#bf9abf;--time:#a8bf9a;--gift:#bfa07a;
}
:root[data-theme="light"]{
  --bg:#f4f0e8;--bg-2:#ece8de;--bg-3:#e2ddd2;--bg-4:#d8d2c4;
  --border:rgba(0,0,0,0.07);--border-gold:rgba(140,100,20,0.2);
  --text-primary:#14100a;--text-secondary:#6a6055;--text-muted:#a09888;
  --gold:#8a6820;--gold-dim:rgba(138,104,32,0.08);--gold-bright:#9a7828;
  --faith:#3a6a50;--self:#5a4a8a;--relation:#8a3858;
  --work:#3a5a8a;--finance:#8a6030;--health:#8a3a3a;
  --vision:#8a6820;--hard:#5a5a7a;--lead:#4a7a2a;
  --mind:#2a7a7a;--create:#7a4a7a;--time:#4a6a3a;--gift:#7a5a2a;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text-primary);font-family:'Outfit',sans-serif;font-weight:300;min-height:100vh;transition:background 0.4s,color 0.4s;overflow-x:hidden;}
header{position:sticky;top:0;z-index:100;background:var(--bg);border-bottom:1px solid var(--border);padding:0 2rem;display:flex;align-items:center;justify-content:space-between;height:58px;}
.logo{display:flex;align-items:baseline;gap:0.75rem;}
.logo-title{font-family:'Cormorant Garamond',serif;font-size:1.3rem;font-style:italic;font-weight:400;color:var(--gold);letter-spacing:0.02em;}
.logo-sub{font-family:'DM Mono',monospace;font-size:0.55rem;letter-spacing:0.14em;text-transform:uppercase;color:var(--text-muted);}
.header-right{display:flex;align-items:center;gap:1rem;}
.theme-btn{width:30px;height:30px;border-radius:50%;border:1px solid var(--border);background:var(--bg-3);color:var(--text-secondary);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:0.75rem;transition:all 0.2s;}
.theme-btn:hover{border-color:var(--gold);color:var(--gold);}
.q-count-badge{font-family:'DM Mono',monospace;font-size:0.52rem;letter-spacing:0.1em;text-transform:uppercase;color:var(--text-muted);}
.nav-strip{display:flex;padding:0 2rem;background:var(--bg-2);border-bottom:1px solid var(--border);overflow-x:auto;scrollbar-width:none;gap:0;}
.nav-strip::-webkit-scrollbar{display:none;}
.nav-btn{padding:0.75rem 1.1rem;background:none;border:none;border-bottom:2px solid transparent;color:var(--text-muted);font-family:'DM Mono',monospace;font-size:0.55rem;letter-spacing:0.1em;text-transform:uppercase;cursor:pointer;white-space:nowrap;transition:all 0.2s;}
.nav-btn:hover{color:var(--text-secondary);}
.nav-btn.active{color:var(--gold);border-bottom-color:var(--gold);}
main{max-width:960px;margin:0 auto;padding:3rem 2rem 6rem;}
.tab-panel{display:none;}
.tab-panel.active{display:block;animation:rise 0.3s ease both;}
@keyframes rise{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}
.today-hero{text-align:center;padding:3rem 2rem 2rem;margin-bottom:2rem;}
.today-date{font-family:'DM Mono',monospace;font-size:0.58rem;letter-spacing:0.2em;text-transform:uppercase;color:var(--text-muted);margin-bottom:1rem;}
.today-question{font-family:'Cormorant Garamond',serif;font-size:2rem;font-weight:300;font-style:italic;color:var(--text-primary);line-height:1.4;max-width:620px;margin:0 auto 1.5rem;}
.today-domain{font-family:'DM Mono',monospace;font-size:0.55rem;letter-spacing:0.15em;text-transform:uppercase;padding:0.25rem 0.75rem;border-radius:20px;display:inline-block;margin-bottom:0.5rem;}
.today-depth{font-family:'DM Mono',monospace;font-size:0.52rem;letter-spacing:0.1em;text-transform:uppercase;color:var(--text-muted);margin-bottom:2rem;}
.today-actions{display:flex;gap:0.75rem;justify-content:center;flex-wrap:wrap;margin-bottom:2.5rem;}
.today-btn{padding:0.6rem 1.5rem;border-radius:2px;font-family:'DM Mono',monospace;font-size:0.6rem;letter-spacing:0.1em;text-transform:uppercase;cursor:pointer;transition:all 0.2s;border:1px solid var(--border);background:var(--bg-2);color:var(--text-secondary);}
.today-btn:hover{border-color:var(--border-gold);color:var(--gold);}
.today-btn.primary{background:var(--gold-dim);border-color:var(--border-gold);color:var(--gold);}
.today-btn.primary:hover{background:var(--gold);color:#000;}
.write-block{background:var(--bg-2);border:1px solid var(--border);border-radius:3px;padding:1.5rem;margin-bottom:1rem;}
.write-label{font-family:'DM Mono',monospace;font-size:0.55rem;letter-spacing:0.12em;text-transform:uppercase;color:var(--text-muted);margin-bottom:0.75rem;}
textarea.write-area{width:100%;min-height:160px;background:var(--bg-3);border:1px solid var(--border);border-radius:2px;padding:1rem 1.25rem;color:var(--text-primary);font-family:'Cormorant Garamond',serif;font-size:1.05rem;font-weight:300;line-height:1.75;resize:vertical;outline:none;transition:border-color 0.2s;}
textarea.write-area:focus{border-color:var(--border-gold);}
textarea.write-area::placeholder{color:var(--text-muted);font-style:italic;}
.save-entry-btn{padding:0.55rem 1.4rem;background:var(--gold-dim);border:1px solid var(--border-gold);border-radius:2px;color:var(--gold);font-family:'DM Mono',monospace;font-size:0.58rem;letter-spacing:0.1em;text-transform:uppercase;cursor:pointer;transition:all 0.2s;}
.save-entry-btn:hover{background:var(--gold);color:#000;}
.saved-flash{font-family:'DM Mono',monospace;font-size:0.55rem;color:var(--faith);letter-spacing:0.1em;margin-left:0.75rem;opacity:0;transition:opacity 0.3s;}
.mood-row{display:flex;gap:0.5rem;flex-wrap:wrap;margin-bottom:2rem;justify-content:center;}
.mood-btn{padding:0.4rem 0.9rem;border-radius:20px;border:1px solid var(--border);background:var(--bg-2);font-family:'DM Mono',monospace;font-size:0.55rem;letter-spacing:0.08em;text-transform:uppercase;color:var(--text-muted);cursor:pointer;transition:all 0.2s;}
.mood-btn:hover{border-color:var(--border-gold);color:var(--gold);}
.mood-btn.active{background:var(--gold-dim);border-color:var(--border-gold);color:var(--gold);}
.domain-tag{font-family:'DM Mono',monospace;font-size:0.52rem;letter-spacing:0.1em;text-transform:uppercase;padding:0.18rem 0.5rem;border-radius:20px;display:inline-block;}
.q-card{background:var(--bg-2);border:1px solid var(--border);border-radius:3px;padding:1.4rem 1.6rem;margin-bottom:0.6rem;position:relative;cursor:pointer;transition:border-color 0.2s,transform 0.15s;}
.q-card:hover{border-color:var(--border-gold);transform:translateX(3px);}
.q-card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;border-radius:3px 0 0 3px;}
.q-card.depth-surface::before{opacity:0.4;}
.q-card.depth-deep::before{opacity:0.7;}
.q-card.depth-core::before{opacity:1;}
.q-text{font-family:'Cormorant Garamond',serif;font-size:1.05rem;font-style:italic;font-weight:300;color:var(--text-primary);line-height:1.5;margin-bottom:0.6rem;}
.q-meta{display:flex;align-items:center;gap:0.5rem;flex-wrap:wrap;}
.depth-label{font-family:'DM Mono',monospace;font-size:0.5rem;letter-spacing:0.1em;text-transform:uppercase;padding:0.15rem 0.4rem;border-radius:2px;background:var(--bg-4);color:var(--text-muted);}
.depth-label.surface{color:var(--text-muted);}
.depth-label.deep{color:var(--gold);background:var(--gold-dim);}
.depth-label.core{color:#fff;background:var(--gold);opacity:0.85;}
.use-btn{margin-left:auto;background:none;border:1px solid var(--border);border-radius:2px;font-family:'DM Mono',monospace;font-size:0.5rem;letter-spacing:0.08em;text-transform:uppercase;color:var(--text-muted);cursor:pointer;padding:0.2rem 0.5rem;transition:all 0.15s;}
.use-btn:hover{border-color:var(--gold);color:var(--gold);}
.domain-section{margin-bottom:2.5rem;}
.domain-header{display:flex;align-items:center;gap:1rem;margin-bottom:1.1rem;padding-bottom:0.75rem;border-bottom:1px solid var(--border);cursor:pointer;}
.domain-name{font-family:'Cormorant Garamond',serif;font-size:1.2rem;font-weight:400;color:var(--text-primary);flex:1;}
.domain-count{font-family:'DM Mono',monospace;font-size:0.55rem;color:var(--text-muted);letter-spacing:0.08em;}
.domain-toggle{font-family:'DM Mono',monospace;font-size:0.7rem;color:var(--text-muted);transition:transform 0.2s;}
.domain-section.collapsed .domain-toggle{transform:rotate(-90deg);}
.domain-section.collapsed .domain-questions{display:none;}
.search-wrap{position:relative;margin-bottom:2rem;}
.search-input{width:100%;background:var(--bg-2);border:1px solid var(--border);border-radius:3px;padding:0.85rem 1.25rem 0.85rem 2.75rem;color:var(--text-primary);font-family:'Outfit',sans-serif;font-size:0.88rem;outline:none;transition:border-color 0.2s;}
.search-input:focus{border-color:var(--border-gold);}
.search-input::placeholder{color:var(--text-muted);}
.search-icon{position:absolute;left:1rem;top:50%;transform:translateY(-50%);color:var(--text-muted);font-size:0.85rem;pointer-events:none;}
.filter-row{display:flex;gap:0.5rem;flex-wrap:wrap;margin-bottom:1.5rem;}
.filter-btn{padding:0.35rem 0.85rem;border-radius:20px;border:1px solid var(--border);background:var(--bg-2);font-family:'DM Mono',monospace;font-size:0.52rem;letter-spacing:0.08em;text-transform:uppercase;color:var(--text-muted);cursor:pointer;transition:all 0.15s;}
.filter-btn:hover{border-color:var(--border-gold);color:var(--gold);}
.filter-btn.active{background:var(--gold-dim);border-color:var(--border-gold);color:var(--gold);}
.entry-item{background:var(--bg-2);border:1px solid var(--border);border-radius:3px;margin-bottom:0.75rem;overflow:hidden;}
.entry-header{padding:0.8rem 1.2rem;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--border);background:var(--bg-3);}
.entry-date{font-family:'DM Mono',monospace;font-size:0.55rem;letter-spacing:0.1em;text-transform:uppercase;color:var(--text-muted);}
.entry-body{padding:1.2rem;font-family:'Cormorant Garamond',serif;font-size:1rem;color:var(--text-secondary);line-height:1.75;white-space:pre-wrap;}
.entry-question{font-family:'DM Mono',monospace;font-size:0.6rem;color:var(--text-muted);padding:0.6rem 1.2rem 0;font-style:normal;letter-spacing:0.04em;}
.del-btn{background:none;border:none;font-family:'DM Mono',monospace;font-size:0.5rem;color:var(--text-muted);cursor:pointer;padding:0.2rem 0.4rem;border-radius:2px;transition:all 0.15s;}
.del-btn:hover{color:#c07060;}
.gold-rule{height:1px;background:linear-gradient(90deg,var(--gold) 0%,transparent 70%);opacity:0.18;margin:2rem 0;}
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.82);z-index:200;align-items:center;justify-content:center;}
.modal-overlay.open{display:flex;}
.modal{background:var(--bg-2);border:1px solid var(--border-gold);border-radius:3px;padding:2rem;width:90%;max-width:600px;max-height:90vh;overflow-y:auto;}
.modal-q{font-family:'Cormorant Garamond',serif;font-size:1.3rem;font-style:italic;font-weight:300;color:var(--text-primary);line-height:1.5;margin-bottom:1.5rem;}
.modal-label{font-family:'DM Mono',monospace;font-size:0.52rem;letter-spacing:0.1em;text-transform:uppercase;color:var(--text-muted);margin-bottom:0.5rem;display:block;}
.modal-actions{display:flex;gap:0.75rem;justify-content:flex-end;margin-top:1rem;}
.modal-cancel{padding:0.45rem 0.9rem;background:none;border:1px solid var(--border);border-radius:2px;color:var(--text-muted);font-family:'DM Mono',monospace;font-size:0.55rem;letter-spacing:0.07em;text-transform:uppercase;cursor:pointer;}
.modal-save{padding:0.45rem 1.2rem;background:var(--gold-dim);border:1px solid var(--border-gold);border-radius:2px;color:var(--gold);font-family:'DM Mono',monospace;font-size:0.55rem;letter-spacing:0.07em;text-transform:uppercase;cursor:pointer;transition:all 0.2s;}
.modal-save:hover{background:var(--gold);color:#000;}
</style>
</head>
<body>
<header>
  <div class="logo">
    <span class="logo-title">The Discovery Bank</span>
    <span class="logo-sub">Questions for the examined life</span>
  </div>
  <div class="header-right">
    <span class="q-count-badge" id="syncStatus">—</span>
    <span class="q-count-badge" id="q-count-badge"></span>
    <button class="theme-btn" onclick="toggleTheme()"><span id="theme-icon">☀</span></button>
  </div>
</header>
<nav class="nav-strip">
  <button class="nav-btn active" onclick="switchTab('today',this)">Today's Question</button>
  <button class="nav-btn" onclick="switchTab('browse',this)">Browse All</button>
  <button class="nav-btn" onclick="switchTab('feeling',this)">By Feeling</button>
  <button class="nav-btn" onclick="switchTab('entries',this)">My Entries</button>
</nav>
<main>
<div class="tab-panel active" id="tab-today">
  <div class="today-hero">
    <div class="today-date" id="today-date"></div>
    <div class="today-domain" id="today-domain-tag"></div>
    <div class="today-question" id="today-q">Loading...</div>
    <div class="today-depth" id="today-depth"></div>
    <div class="today-actions">
      <button class="today-btn" onclick="shuffleToday()">Different question</button>
      <button class="today-btn" onclick="pickByMood()">Pick by feeling</button>
      <button class="today-btn primary" onclick="openWrite()">Write to this</button>
    </div>
  </div>
  <div class="write-block" id="write-block" style="display:none;">
    <div class="write-label" id="write-q-label"></div>
    <textarea class="write-area" id="write-area" placeholder="Write honestly. Not for anyone else. Just the truth of where you are right now."></textarea>
    <div style="display:flex;align-items:center;margin-top:0.75rem;">
      <button class="save-entry-btn" onclick="saveEntry()">Save Entry</button>
      <span class="saved-flash" id="save-flash">Saved.</span>
    </div>
  </div>
</div>
<div class="tab-panel" id="tab-browse">
  <div class="search-wrap">
    <span class="search-icon">⌕</span>
    <input type="text" class="search-input" id="search-input" placeholder="Search questions..." oninput="filterQuestions()">
  </div>
  <div class="filter-row" id="depth-filters">
    <button class="filter-btn active" onclick="setDepthFilter(this,'all')">All depths</button>
    <button class="filter-btn" onclick="setDepthFilter(this,'surface')">Surface</button>
    <button class="filter-btn" onclick="setDepthFilter(this,'deep')">Deep</button>
    <button class="filter-btn" onclick="setDepthFilter(this,'core')">Core</button>
  </div>
  <div id="browse-content"></div>
</div>
<div class="tab-panel" id="tab-feeling">
  <div style="text-align:center;margin-bottom:2rem;">
    <div style="font-family:'Cormorant Garamond',serif;font-size:1.4rem;font-style:italic;color:var(--text-secondary);margin-bottom:1rem;">How are you right now?</div>
    <div class="mood-row">
      <button class="mood-btn" onclick="setMood(this,'lost')">Lost</button>
      <button class="mood-btn" onclick="setMood(this,'stuck')">Stuck</button>
      <button class="mood-btn" onclick="setMood(this,'tired')">Tired</button>
      <button class="mood-btn" onclick="setMood(this,'afraid')">Afraid</button>
      <button class="mood-btn" onclick="setMood(this,'angry')">Angry</button>
      <button class="mood-btn" onclick="setMood(this,'hopeful')">Hopeful</button>
      <button class="mood-btn" onclick="setMood(this,'flat')">Flat</button>
      <button class="mood-btn" onclick="setMood(this,'restless')">Restless</button>
      <button class="mood-btn" onclick="setMood(this,'guilty')">Guilty</button>
      <button class="mood-btn" onclick="setMood(this,'proud')">Proud</button>
      <button class="mood-btn" onclick="setMood(this,'unclear')">Unclear</button>
      <button class="mood-btn" onclick="setMood(this,'full')">Full</button>
      <button class="mood-btn" onclick="setMood(this,'grateful')">Grateful</button>
      <button class="mood-btn" onclick="setMood(this,'tender')">Tender</button>
    </div>
  </div>
  <div id="feeling-results"></div>
</div>
<div class="tab-panel" id="tab-entries">
  <div style="font-family:'Cormorant Garamond',serif;font-size:1.2rem;font-style:italic;color:var(--text-secondary);margin-bottom:1.5rem;">Your written responses</div>
  <div id="entries-list"></div>
</div>
</main>
<div class="modal-overlay" id="modal">
  <div class="modal">
    <div class="modal-q" id="modal-q"></div>
    <span class="modal-label">Your response</span>
    <textarea class="write-area" id="modal-area" style="min-height:200px;" placeholder="Write honestly. Not for anyone else."></textarea>
    <div class="modal-actions">
      <button class="modal-cancel" onclick="closeModal()">Cancel</button>
      <button class="modal-save" onclick="saveFromModal()">Save Entry</button>
    </div>
  </div>
</div>
<script>
const DOMAINS = {
  faith:    { name:'Faith & God',             color:'var(--faith)',    icon:'✦' },
  self:     { name:'Self & Character',        color:'var(--self)',     icon:'◈' },
  relation: { name:'Relationships & Love',    color:'var(--relation)', icon:'♡' },
  work:     { name:'Work & Craft',            color:'var(--work)',     icon:'⌗' },
  finance:  { name:'Finances & Freedom',      color:'var(--finance)',  icon:'◇' },
  health:   { name:'Health & Body',           color:'var(--health)',   icon:'○' },
  vision:   { name:'Vision & Legacy',         color:'var(--vision)',   icon:'△' },
  lead:     { name:'Leadership',              color:'var(--lead)',     icon:'⬡' },
  mind:     { name:'Mind & Learning',         color:'var(--mind)',     icon:'≋' },
  create:   { name:'Creativity & Beauty',     color:'var(--create)',   icon:'✿' },
  hard:     { name:'Hard Days & Failure',     color:'var(--hard)',     icon:'◎' },
  time:     { name:'Time & Presence',         color:'var(--time)',     icon:'◷' },
  gift:     { name:'Giving & Generosity',     color:'var(--gift)',     icon:'❋' },
};

const QUESTIONS = [
  // ── FAITH ──
  {id:'f1',domain:'faith',depth:'surface',text:'What did God say to me this morning — or what did I bring to Him?',moods:['lost','flat','full','hopeful']},
  {id:'f2',domain:'faith',depth:'surface',text:'When did I last feel genuinely close to God — and what was different about that time?',moods:['flat','tired','lost']},
  {id:'f3',domain:'faith',depth:'surface',text:'What am I grateful for today that I haven\'t acknowledged yet?',moods:['flat','tired','full','grateful']},
  {id:'f4',domain:'faith',depth:'deep',text:'Is my faith currently a relationship or a performance? How would I know the difference?',moods:['lost','guilty','unclear']},
  {id:'f5',domain:'faith',depth:'deep',text:'What do I believe God thinks of me right now — not what I know theologically, but what I actually feel?',moods:['guilty','afraid','lost','flat']},
  {id:'f6',domain:'faith',depth:'deep',text:'Where am I using faith as a reason not to plan, rather than as the backing for a plan?',moods:['stuck','unclear','restless']},
  {id:'f7',domain:'faith',depth:'deep',text:'What is God asking of me right now that I\'ve been pretending I haven\'t heard?',moods:['stuck','guilty','restless','unclear']},
  {id:'f8',domain:'faith',depth:'core',text:'If I removed guilt and unworthiness from my approach to prayer — what would I actually say to God?',moods:['guilty','afraid','lost']},
  {id:'f9',domain:'faith',depth:'core',text:'Do I believe the believer is the most advantaged person in the world — and does my life reflect that belief?',moods:['tired','lost','stuck','afraid']},
  {id:'f10',domain:'faith',depth:'core',text:'What would it mean to fully trust God with the thing I\'m currently trying to control?',moods:['afraid','stuck','restless','angry']},
  {id:'f11',domain:'faith',depth:'surface',text:'What scripture has been sitting with me recently — and why that one?',moods:['full','hopeful','flat','grateful']},
  {id:'f12',domain:'faith',depth:'deep',text:'Am I seeking wisdom or seeking confirmation of what I\'ve already decided?',moods:['unclear','stuck','restless']},
  {id:'f13',domain:'faith',depth:'surface',text:'What would worship look like for me today — not as a form, but as a posture?',moods:['flat','full','grateful','hopeful']},
  {id:'f14',domain:'faith',depth:'deep',text:'What does it mean that I am favoured — and am I living like that\'s true?',moods:['lost','flat','afraid','tired']},
  {id:'f15',domain:'faith',depth:'core',text:'Is there something I am carrying alone that I was never meant to carry without God?',moods:['tired','lost','afraid','stuck']},
  {id:'f16',domain:'faith',depth:'deep',text:'What would it mean to receive from God today rather than only ask?',moods:['flat','full','grateful','tender']},
  {id:'f17',domain:'faith',depth:'surface',text:'Where has God shown up recently in a way I didn\'t ask for but needed?',moods:['grateful','full','hopeful']},
  {id:'f18',domain:'faith',depth:'core',text:'What does it cost me to believe fully — and am I willing to pay it?',moods:['afraid','stuck','unclear','lost']},

  // ── SELF & CHARACTER ──
  {id:'s1',domain:'self',depth:'surface',text:'What is one thing I did today that I couldn\'t do — or didn\'t do — a month ago?',moods:['flat','tired','full','hopeful']},

  lost:     ['faith','self','hard','vision','lead','time'],
  stuck:    ['self','lead','work','hard','relation','time'],
  tired:    ['hard','health','self','faith','lead','time'],
  afraid:   ['self','relation','lead','hard','faith','finance'],
  angry:    ['relation','hard','self','lead'],
  hopeful:  ['vision','work','faith','mind','gift'],
  flat:     ['self','faith','hard','lead','relation','time'],
  restless: ['vision','work','lead','mind','finance','gift'],
  guilty:   ['self','relation','faith','hard','lead','gift'],
  proud:    ['self','vision','work','faith'],
  unclear:  ['vision','self','lead','faith','mind','time'],
  full:     ['faith','mind','create','vision','gift'],
  grateful: ['faith','gift','time','create'],
  tender:   ['relation','gift','faith','time'],

let currentQ = null;
let activeDepthFilter = 'all';
let activeSearchTerm = '';
let activeMood = null;

function toggleTheme(){
  const h=document.documentElement;
  const dark=h.getAttribute('data-theme')==='dark';
  h.setAttribute('data-theme',dark?'light':'dark');
  document.getElementById('theme-icon').textContent=dark?'☾':'☀';
  localStorage.setItem('db-theme',dark?'light':'dark');
}

function switchTab(name,btn){
  document.querySelectorAll('.tab-panel').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('tab-'+name).classList.add('active');
  btn.classList.add('active');
  if(name==='browse')renderBrowse();
  if(name==='entries')renderEntries();
  window.scrollTo(0,0);
}

function setTodayQuestion(q){
  currentQ=q;
  const d=DOMAINS[q.domain];
  document.getElementById('today-date').textContent=new Date().toLocaleDateString('en-GB',{weekday:'long',day:'numeric',month:'long',year:'numeric'});
  document.getElementById('today-domain-tag').textContent=d.icon+' '+d.name;
  document.getElementById('today-domain-tag').style.cssText=`background:${d.color}18;border:1px solid ${d.color}40;color:${d.color};`;
  document.getElementById('today-q').textContent=q.text;
  document.getElementById('today-depth').textContent=q.depth==='surface'?'Opening question':(q.depth==='deep'?'Depth question':'Core question — sit with this one');
  document.getElementById('write-q-label').textContent=q.text;
  document.getElementById('write-area').value='';
  document.getElementById('write-block').style.display='none';
}

function shuffleToday(){
  const pool=QUESTIONS.filter(q=>q!==currentQ);
  setTodayQuestion(pool[Math.floor(Math.random()*pool.length)]);
}

function pickByMood(){
  switchTab('feeling',document.querySelectorAll('.nav-btn')[2]);
}

function openWrite(){
  const wb=document.getElementById('write-block');
  wb.style.display=wb.style.display==='none'?'block':'none';
  if(wb.style.display==='block')document.getElementById('write-area').focus();
}

function setMood(btn,mood){
  document.querySelectorAll('.mood-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  activeMood=mood;
  renderFeelingResults(mood);
}

function renderFeelingResults(mood){
  const pool=QUESTIONS.filter(q=>q.moods.includes(mood));
  const core=pool.filter(q=>q.depth==='core');
  const deep=pool.filter(q=>q.depth==='deep');
  const surface=pool.filter(q=>q.depth==='surface');
  const selected=[
    ...(core.length?[core[Math.floor(Math.random()*core.length)]]:[] ),
    ...(deep.length?[deep[Math.floor(Math.random()*deep.length)]]:[] ),
    ...(deep.length>1?[deep[Math.floor(Math.random()*deep.length)]]:[] ),
    ...(surface.length?[surface[Math.floor(Math.random()*surface.length)]]:[] ),
  ].filter((q,i,a)=>a.indexOf(q)===i).slice(0,4);
  const c=document.getElementById('feeling-results');
  if(!selected.length){c.innerHTML='<div style="font-size:0.82rem;color:var(--text-muted);text-align:center;padding:2rem;">No questions for this feeling yet.</div>';return;}
  c.innerHTML=`<div style="font-family:'DM Mono',monospace;font-size:0.55rem;letter-spacing:0.12em;text-transform:uppercase;color:var(--text-muted);margin-bottom:1rem;">Questions for when you feel ${mood}</div>`+
    selected.map(q=>qCard(q,true)).join('');
}

function renderBrowse(){
  const term=activeSearchTerm.toLowerCase();
  const c=document.getElementById('browse-content');
  c.innerHTML='';
  Object.keys(DOMAINS).forEach(domKey=>{
    const d=DOMAINS[domKey];
    let qs=QUESTIONS.filter(q=>{
      if(q.domain!==domKey)return false;
      if(activeDepthFilter!=='all'&&q.depth!==activeDepthFilter)return false;
      if(term&&!q.text.toLowerCase().includes(term))return false;
      return true;
    });
    if(!qs.length)return;
    const sec=document.createElement('div');
    sec.className='domain-section';
    sec.innerHTML=`
      <div class="domain-header" onclick="toggleSection(this.parentElement)">
        <span style="font-size:1.1rem;color:${d.color};">${d.icon}</span>
        <span class="domain-name">${d.name}</span>
        <span class="domain-count">${qs.length} question${qs.length!==1?'s':''}</span>
        <span class="domain-toggle">▾</span>
      </div>
      <div class="domain-questions">${qs.map(q=>qCard(q,true)).join('')}</div>`;
    c.appendChild(sec);
  });
}

function toggleSection(sec){sec.classList.toggle('collapsed');}

function filterQuestions(){
  activeSearchTerm=document.getElementById('search-input').value;
  renderBrowse();
}

function setDepthFilter(btn,depth){
  document.querySelectorAll('#depth-filters .filter-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  activeDepthFilter=depth;
  renderBrowse();
}

function qCard(q,showUse=false){
  const d=DOMAINS[q.domain];
  const depthLabel=q.depth==='surface'?'Opening':q.depth==='deep'?'Deep':'Core';
  return `<div class="q-card depth-${q.depth}" style="border-left-color:${d.color};" onclick="useQuestion('${q.id}')">
    <div class="q-text">${q.text}</div>
    <div class="q-meta">
      <span class="domain-tag" style="background:${d.color}18;border:1px solid ${d.color}40;color:${d.color};">${d.icon} ${d.name}</span>
      <span class="depth-label ${q.depth}">${depthLabel}</span>
      ${showUse?`<button class="use-btn" onclick="event.stopPropagation();useQuestion('${q.id}')">Write to this</button>`:''}
    </div>
  </div>`;
}

function useQuestion(id){
  const q=QUESTIONS.find(x=>x.id===id);
  if(!q)return;
  currentQ=q;
  document.getElementById('modal-q').textContent=q.text;
  document.getElementById('modal-area').value='';
  document.getElementById('modal').classList.add('open');
}

function saveEntry(){
  const text=document.getElementById('write-area').value.trim();
  if(!text||!currentQ)return;
  saveToEntries(currentQ,text);
  document.getElementById('write-area').value='';
  const f=document.getElementById('save-flash');
  f.style.opacity='1';setTimeout(()=>f.style.opacity='0',2200);
}

function saveFromModal(){
  const text=document.getElementById('modal-area').value.trim();
  if(!text||!currentQ)return;
  saveToEntries(currentQ,text);
  closeModal();
}

function saveToEntries(q,text){
  const entries=JSON.parse(localStorage.getItem('db-entries')||'[]');
  entries.unshift({id:'e'+Date.now(),qid:q.id,qtext:q.text,domain:q.domain,depth:q.depth,date:new Date().toISOString(),text});
  localStorage.setItem('db-entries',JSON.stringify(entries));
  scheduleCloudPush();
}

const SYNC_URL = 'https://wrzxalfdatnpdnbmdjir.supabase.co/rest/v1/sync_data';
const SYNC_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndyenhhbGZkYXRucGRuYm1kamlyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQ1MjA4ODMsImV4cCI6MjEwMDA5Njg4M30.oyx47J97hZsjnF3iFOz9mHGt_9oGjqLMQ0zsiVhBC-g';
const SYNC_KEY = 'AmiableMeerkat894';
const SYNC_TOOL = 'discovery-bank';

function setSyncStatus(msg) { const el=document.getElementById('syncStatus'); if(el) el.textContent=msg; }

async function pullCloud() {
  setSyncStatus('Syncing…');
  try {
    const ctrl = new AbortController();
    const timeout = setTimeout(()=>ctrl.abort(), 6000);
    const res = await fetch(`${SYNC_URL}?tool=eq.${SYNC_TOOL}&select=data,updated_at`, {
      headers: { 'apikey': SYNC_ANON_KEY, 'Authorization': 'Bearer ' + SYNC_ANON_KEY, 'x-sync-key': SYNC_KEY },
      signal: ctrl.signal
    });
    clearTimeout(timeout);
    if(!res.ok) { setSyncStatus('Sync error'); return; }
    const rows = await res.json();
    if(!rows.length) {
      setSyncStatus('Synced');
      const entries=JSON.parse(localStorage.getItem('db-entries')||'[]');
      pushCloudNow(entries);
      return;
    }
    const remote = rows[0];
    const localSyncedAt = localStorage.getItem(SYNC_TOOL + '_synced_at');
    if(!localSyncedAt || new Date(remote.updated_at) > new Date(localSyncedAt)) {
      localStorage.setItem('db-entries', JSON.stringify(remote.data));
      localStorage.setItem(SYNC_TOOL + '_synced_at', remote.updated_at);
    }
    setSyncStatus('Synced');
  } catch(e) { setSyncStatus('Offline'); }
}

let cloudPushTimer = null;
function scheduleCloudPush() {
  clearTimeout(cloudPushTimer);
  cloudPushTimer = setTimeout(()=>{
    const entries=JSON.parse(localStorage.getItem('db-entries')||'[]');
    pushCloudNow(entries);
  }, 1500);
}

async function pushCloudNow(entries) {
  setSyncStatus('Syncing…');
  try {
    const res = await fetch(`${SYNC_URL}?on_conflict=tool`, {
      method: 'POST',
      headers: { 'apikey': SYNC_ANON_KEY, 'Authorization': 'Bearer ' + SYNC_ANON_KEY, 'x-sync-key': SYNC_KEY, 'Content-Type': 'application/json', 'Prefer': 'resolution=merge-duplicates,return=representation' },
      body: JSON.stringify([{ tool: SYNC_TOOL, data: entries }])
    });
    if(!res.ok) { setSyncStatus('Sync error'); return; }
    const rows = await res.json();
    if(rows.length) localStorage.setItem(SYNC_TOOL + '_synced_at', rows[0].updated_at);
    setSyncStatus('Synced');
  } catch(e) { setSyncStatus('Offline'); }
}

function renderEntries(){
  const entries=JSON.parse(localStorage.getItem('db-entries')||'[]');
  const c=document.getElementById('entries-list');
  if(!entries.length){
    c.innerHTML='<div style="font-family:\'Cormorant Garamond\',serif;font-size:1rem;font-style:italic;color:var(--text-muted);text-align:center;padding:3rem;">Nothing written yet. Use a question and write your first response.</div>';
    return;
  }
  c.innerHTML=entries.map((e,i)=>{
    const d=DOMAINS[e.domain];
    const dt=new Date(e.date);
    const ds=dt.toLocaleDateString('en-GB',{weekday:'short',day:'numeric',month:'long',year:'numeric'});
    return `<div class="entry-item">
      <div class="entry-header">
        <div style="display:flex;align-items:center;gap:0.6rem;">
          <span class="domain-tag" style="background:${d.color}18;border:1px solid ${d.color}40;color:${d.color};">${d.icon} ${d.name}</span>
          <span class="entry-date">${ds}</span>
        </div>
        <button class="del-btn" onclick="deleteEntry(${i})">Delete</button>
      </div>
      <div class="entry-question">${e.qtext}</div>
      <div class="entry-body">${e.text}</div>
    </div>`;
  }).join('');
}

function deleteEntry(i){
  if(!confirm('Delete this entry?'))return;
  const entries=JSON.parse(localStorage.getItem('db-entries')||'[]');
  entries.splice(i,1);
  localStorage.setItem('db-entries',JSON.stringify(entries));
  scheduleCloudPush();
  renderEntries();
}

function closeModal(){document.getElementById('modal').classList.remove('open');}

async function init(){
  await pullCloud();
  const theme=localStorage.getItem('db-theme')||'dark';
  document.documentElement.setAttribute('data-theme',theme);
  document.getElementById('theme-icon').textContent=theme==='dark'?'☀':'☾';
  const dayOfYear=Math.floor((new Date()-new Date(new Date().getFullYear(),0,0))/86400000);
  setTodayQuestion(QUESTIONS[dayOfYear%QUESTIONS.length]);
  document.getElementById('modal').addEventListener('click',e=>{if(e.target.id==='modal')closeModal();});
  document.getElementById('q-count-badge').textContent=QUESTIONS.length+' questions';
}

init();
</script>
