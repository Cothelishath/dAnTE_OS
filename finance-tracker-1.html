<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@300;400&display=swap" rel="stylesheet">
<title>Money Flow — dAnTE</title>
<style>
:root{
  --bg:#0a0a0a;--bg2:#111;--bg3:#181818;--bg4:#1e1e1e;
  --border:#1e1e1e;--border2:#2a2a2a;--border3:#363636;
  --gold:#c9a84c;--gold-dim:#7a5f28;--gold-glow:rgba(201,168,76,0.08);
  --text:#ddd8ce;--text-dim:#777;--text-muted:#404040;
  --green:#4caf7d;--green-bg:rgba(76,175,125,0.1);
  --red:#c0392b;--red-bg:rgba(192,57,43,0.1);
  --radius:5px;
}
.light{
  --bg:#f2ede6;--bg2:#eae4dc;--bg3:#e0d9d0;--bg4:#d6cfc5;
  --border:#d8d1c8;--border2:#c8c1b7;--border3:#b8b0a5;
  --gold:#8a6020;--gold-dim:#b8902a;--gold-glow:rgba(138,96,32,0.07);
  --text:#1a1714;--text-dim:#666;--text-muted:#aaa;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;-webkit-tap-highlight-color:transparent}
body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;font-size:13px;line-height:1.5;display:flex;flex-direction:column;min-height:100vh}
::-webkit-scrollbar{width:3px}::-webkit-scrollbar-thumb{background:var(--border3);border-radius:2px}

header{flex-shrink:0;background:var(--bg);border-bottom:1px solid var(--border);padding:11px 16px;display:flex;align-items:center;gap:8px;position:sticky;top:0;z-index:50}
.logo{display:flex;flex-direction:column;gap:0;margin-right:auto}
.logo-brand{font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:.22em;color:var(--gold);text-transform:uppercase}
.logo-title{font-family:'Cormorant Garamond',serif;font-size:20px;font-weight:300;color:var(--text);letter-spacing:.04em;line-height:1.1}
.logo-title em{color:var(--gold);font-style:italic}
.hbtn{background:none;border:1px solid var(--border2);border-radius:var(--radius);color:var(--text-dim);font-family:'Inter',sans-serif;font-size:11px;padding:5px 10px;cursor:pointer;transition:all .18s;white-space:nowrap}
.hbtn:hover{border-color:var(--gold);color:var(--gold)}
.hbtn-gold{border-color:var(--gold);color:var(--gold)}
.hbtn-gold:hover{background:var(--gold-glow)}

.month-bar{flex-shrink:0;background:var(--bg2);border-bottom:1px solid var(--border);padding:9px 16px;display:flex;align-items:center;gap:10px}
.month-nav{background:none;border:1px solid var(--border2);border-radius:var(--radius);color:var(--text-dim);font-size:16px;width:32px;height:32px;cursor:pointer;transition:all .15s;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.month-nav:hover{border-color:var(--gold);color:var(--gold)}
.month-label{font-family:'Cormorant Garamond',serif;font-size:19px;font-weight:300;color:var(--text);letter-spacing:.04em;flex:1;text-align:center}
.month-label em{color:var(--gold);font-style:italic}

.summary-strip{flex-shrink:0;display:grid;grid-template-columns:repeat(3,1fr);gap:8px;padding:10px 14px;border-bottom:1px solid var(--border);background:var(--bg)}
.sum-card{background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:10px 12px}
.sum-num{font-family:'Cormorant Garamond',serif;font-size:20px;font-weight:300;line-height:1}
.sum-num.inc{color:var(--green)}
.sum-num.exp{color:var(--red)}
.sum-num.bal{color:var(--gold)}
.sum-lbl{font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--text-muted);text-transform:uppercase;letter-spacing:.1em;margin-top:3px}

.tab-bar{flex-shrink:0;display:flex;background:var(--bg2);border-bottom:1px solid var(--border);padding:0 14px;overflow-x:auto}
.tab{padding:9px 13px;font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--text-muted);cursor:pointer;border-bottom:2px solid transparent;transition:all .18s;white-space:nowrap;flex-shrink:0}
.tab:hover{color:var(--text-dim)}
.tab.active{color:var(--gold);border-bottom-color:var(--gold)}

main{flex:1;padding:14px 16px 60px;max-width:680px;width:100%;margin:0 auto}
.page{display:none}.page.active{display:block}

/* ENTRY FORM */
.entry-form{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:14px;margin-bottom:16px}
.type-toggle{display:flex;border-radius:var(--radius);overflow:hidden;border:1px solid var(--border2);margin-bottom:10px}
.type-btn{flex:1;padding:8px;font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:.08em;cursor:pointer;border:none;background:var(--bg3);color:var(--text-muted);transition:all .15s;text-align:center}
.type-btn.exp.active{background:var(--red-bg);color:var(--red)}
.type-btn.inc.active{background:var(--green-bg);color:var(--green)}
.form-row{display:flex;gap:7px;margin-bottom:7px;flex-wrap:wrap}
.f-inp{flex:1;min-width:80px;background:var(--bg3);border:1px solid var(--border2);border-radius:var(--radius);color:var(--text);font-family:'Inter',sans-serif;font-size:12px;padding:8px 10px;outline:none;transition:border-color .18s}
.f-inp:focus{border-color:var(--gold)}
.f-inp::placeholder{color:var(--text-muted)}
.f-mono{font-family:'JetBrains Mono',monospace;font-size:11px}
.f-amt{width:110px;flex-shrink:0}
.f-date{width:120px;flex-shrink:0}
.f-select{flex:1;background:var(--bg3);border:1px solid var(--border2);border-radius:var(--radius);color:var(--text);font-family:'Inter',sans-serif;font-size:12px;padding:8px 10px;outline:none;cursor:pointer;appearance:none}
.f-select:focus{border-color:var(--gold)}
.add-entry-btn{width:100%;background:var(--gold);border:none;border-radius:var(--radius);color:#000;font-family:'Cormorant Garamond',serif;font-size:15px;font-weight:600;padding:9px;cursor:pointer;letter-spacing:.04em;transition:opacity .18s;margin-top:4px}
.add-entry-btn:hover{opacity:.9}

/* TRANSACTIONS */
.tx-group{margin-bottom:16px}
.tx-group-label{font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--text-muted);letter-spacing:.12em;text-transform:uppercase;margin-bottom:7px;display:flex;justify-content:space-between}
.tx-group-total{color:var(--gold)}
.tx-item{display:flex;align-items:center;gap:9px;padding:9px 11px;border-radius:7px;border:1px solid transparent;background:var(--bg2);margin-bottom:5px;transition:all .15s}
.tx-item:hover{border-color:var(--border)}
.tx-icon{width:28px;height:28px;border-radius:6px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:13px}
.tx-icon.inc{background:var(--green-bg)}
.tx-icon.exp{background:var(--red-bg)}
.tx-body{flex:1;min-width:0}
.tx-desc{font-size:13px;color:var(--text);font-weight:500;outline:none;display:block}
.tx-desc:focus{background:var(--bg3);border-radius:3px;padding:1px 4px;margin:-1px -4px}
.tx-meta{display:flex;align-items:center;gap:5px;margin-top:2px;flex-wrap:wrap}
.tx-cat{font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--text-muted);border:1px solid var(--border2);border-radius:3px;padding:1px 5px;cursor:pointer;transition:all .15s}
.tx-cat:hover{border-color:var(--gold-dim);color:var(--gold)}
.tx-note{font-size:11px;color:var(--text-muted);font-style:italic}
.tx-amt{font-family:'Cormorant Garamond',serif;font-size:17px;font-weight:300;flex-shrink:0;letter-spacing:.02em}
.tx-amt.inc{color:var(--green)}
.tx-amt.exp{color:var(--red)}
.tx-del{background:none;border:none;color:transparent;cursor:pointer;font-size:11px;padding:3px 5px;transition:all .15s;flex-shrink:0}
.tx-item:hover .tx-del{color:var(--text-muted)}
.tx-del:hover{color:var(--red)!important}

/* BREAKDOWN */
.cat-section{margin-bottom:20px}
.cat-section-title{font-family:'Cormorant Garamond',serif;font-size:16px;font-weight:300;color:var(--text);margin-bottom:10px;letter-spacing:.03em}
.cat-row{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--border)}
.cat-row:last-child{border-bottom:none}
.cat-name{font-size:12px;color:var(--text);flex:1}
.cat-bar-wrap{width:80px;height:4px;background:var(--border2);border-radius:2px;overflow:hidden;flex-shrink:0}
.cat-bar{height:100%;border-radius:2px;transition:width .4s}
.cat-amt{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--text-dim);min-width:80px;text-align:right;flex-shrink:0}
.cat-pct{font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--text-muted);min-width:30px;text-align:right;flex-shrink:0}

/* ALL TIME */
.month-row{display:flex;align-items:center;gap:12px;padding:11px 13px;background:var(--bg2);border:1px solid var(--border);border-radius:8px;margin-bottom:7px;cursor:pointer;transition:border-color .15s}
.month-row:hover{border-color:var(--border2)}
.month-row-name{font-family:'Cormorant Garamond',serif;font-size:15px;color:var(--text);flex:1;letter-spacing:.03em}
.month-row-detail{font-family:'JetBrains Mono',monospace;font-size:10px;display:flex;gap:10px}

/* CATEGORIES PAGE */
.cat-manage-item{display:flex;align-items:center;gap:8px;padding:8px 11px;background:var(--bg2);border:1px solid var(--border);border-radius:7px;margin-bottom:6px}
.cat-manage-name{flex:1;background:transparent;border:none;color:var(--text);font-family:'Inter',sans-serif;font-size:12px;outline:none;padding:2px 4px;border-radius:3px}
.cat-manage-name:focus{background:var(--bg3)}
.cat-manage-type{font-family:'JetBrains Mono',monospace;font-size:9px;padding:2px 7px;border-radius:3px;flex-shrink:0;cursor:pointer;border:none;transition:all .15s}
.cat-manage-type.exp{background:var(--red-bg);color:var(--red)}
.cat-manage-type.inc{background:var(--green-bg);color:var(--green)}
.cat-manage-type.both{background:var(--gold-glow);color:var(--gold)}
.cat-del-btn{background:none;border:none;color:var(--text-muted);cursor:pointer;font-size:12px;padding:3px 6px;border-radius:3px;transition:all .15s;flex-shrink:0}
.cat-del-btn:hover{color:var(--red)}
.add-row{display:flex;gap:6px;margin-top:10px}
.add-inp{flex:1;background:var(--bg3);border:1px solid var(--border2);border-radius:var(--radius);color:var(--text);font-family:'Inter',sans-serif;font-size:12px;padding:8px 11px;outline:none;transition:border-color .18s}
.add-inp:focus{border-color:var(--gold)}
.add-inp::placeholder{color:var(--text-muted)}
.add-btn{background:var(--gold-glow);border:1px solid var(--gold-dim);border-radius:var(--radius);color:var(--gold);font-size:16px;padding:0 13px;cursor:pointer;transition:all .15s;flex-shrink:0}
.add-btn:hover{background:var(--gold);color:#000}
.add-type-sel{background:var(--bg3);border:1px solid var(--border2);border-radius:var(--radius);color:var(--text-dim);font-family:'JetBrains Mono',monospace;font-size:10px;padding:8px 8px;outline:none;cursor:pointer;flex-shrink:0}
.add-type-sel:focus{border-color:var(--gold)}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.82);z-index:200;display:flex;align-items:flex-end;justify-content:center;backdrop-filter:blur(6px)}
.modal-overlay.hidden{display:none}
.modal{background:var(--bg2);border:1px solid var(--border2);border-radius:16px 16px 0 0;padding:20px 18px 32px;width:100%;max-width:560px;max-height:80vh;overflow-y:auto;display:flex;flex-direction:column;gap:12px}
.modal-handle{width:36px;height:3px;background:var(--border3);border-radius:2px;margin:0 auto -4px}
.modal-title{font-family:'Cormorant Garamond',serif;font-size:19px;font-weight:300;color:var(--text)}
.m-inp{width:100%;background:var(--bg3);border:1px solid var(--border2);border-radius:var(--radius);color:var(--text);font-family:'Inter',sans-serif;font-size:12px;padding:9px 12px;outline:none;transition:border-color .18s}
.m-inp:focus{border-color:var(--gold)}
.m-inp::placeholder{color:var(--text-muted)}
.m-sel{width:100%;background:var(--bg3);border:1px solid var(--border2);border-radius:var(--radius);color:var(--text);font-family:'Inter',sans-serif;font-size:12px;padding:9px 12px;outline:none;cursor:pointer}
.m-sel:focus{border-color:var(--gold)}
.modal-actions{display:flex;gap:8px;justify-content:space-between;flex-wrap:wrap}
.btn{display:inline-flex;align-items:center;gap:5px;padding:8px 14px;border-radius:var(--radius);border:1px solid var(--border2);background:transparent;color:var(--text-dim);font-family:'Inter',sans-serif;font-size:12px;cursor:pointer;transition:all .18s}
.btn:hover{border-color:var(--gold);color:var(--gold)}
.btn-gold{background:var(--gold);border-color:var(--gold);color:#000;font-weight:500}
.btn-gold:hover{opacity:.9;color:#000}
.btn-red{border-color:var(--red);color:var(--red)}
.btn-red:hover{background:var(--red-bg)}

.empty-note{font-size:11px;color:var(--text-muted);font-style:italic;padding:20px 0;text-align:center;line-height:1.8}
.section-label{font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--text-muted);letter-spacing:.14em;text-transform:uppercase;margin-bottom:8px;display:block}
.action-row{display:flex;gap:12px;margin-top:10px}
.action-btn{font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--text-muted);background:none;border:none;cursor:pointer;letter-spacing:.08em;text-transform:uppercase}
.action-btn:hover{color:var(--gold)}
.action-btn.red:hover{color:var(--red)}

.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(6px);background:var(--bg3);border:1px solid var(--gold-dim);color:var(--gold);font-family:'JetBrains Mono',monospace;font-size:11px;padding:9px 18px;border-radius:20px;z-index:400;opacity:0;transition:all .25s;pointer-events:none;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-brand">dAnTE</div>
    <div class="logo-title">Money <em>Flow</em></div>
  </div>
  <div class="hbtn" id="syncStatus" style="cursor:default;">—</div>
  <button class="hbtn" onclick="toggleTheme()">☀︎</button>
  <button class="hbtn" onclick="exportData()">⬇</button>
  <button class="hbtn" onclick="document.getElementById('importFile').click()">⬆</button>
  <button class="hbtn hbtn-gold" onclick="saveData()">Save</button>
</header>

<div class="month-bar">
  <button class="month-nav" onclick="changeMonth(-1)">‹</button>
  <div class="month-label" id="monthLabel"></div>
  <button class="month-nav" onclick="changeMonth(1)">›</button>
</div>

<div class="summary-strip">
  <div class="sum-card"><div class="sum-num inc" id="sumInc">₦0</div><div class="sum-lbl">Income</div></div>
  <div class="sum-card"><div class="sum-num exp" id="sumExp">₦0</div><div class="sum-lbl">Expenses</div></div>
  <div class="sum-card"><div class="sum-num bal" id="sumBal">₦0</div><div class="sum-lbl">Balance</div></div>
</div>

<div class="tab-bar">
  <div class="tab active" onclick="switchTab('log')">Log</div>
  <div class="tab" onclick="switchTab('breakdown')">Breakdown</div>
  <div class="tab" onclick="switchTab('alltime')">All Time</div>
  <div class="tab" onclick="switchTab('categories')">Categories</div>
</div>

<main>
  <!-- ADD FORM -->
  <div class="entry-form">
    <div class="type-toggle">
      <button class="type-btn exp active" id="btnExp" onclick="setType('exp')">− Expense</button>
      <button class="type-btn inc" id="btnInc" onclick="setType('inc')">+ Income</button>
    </div>
    <div class="form-row">
      <input class="f-inp f-mono f-amt" id="fAmt" type="number" min="0" placeholder="Amount (₦)">
      <input class="f-inp f-mono f-date" id="fDate" type="date">
    </div>
    <div class="form-row">
      <input class="f-inp" id="fDesc" placeholder="Description — what is this?" onkeydown="if(event.key==='Enter')addEntry()">
    </div>
    <div class="form-row">
      <select class="f-select" id="fCat"></select>
      <input class="f-inp" id="fNote" placeholder="Note (optional)">
    </div>
    <button class="add-entry-btn" onclick="addEntry()">Record</button>
  </div>

  <!-- LOG PAGE -->
  <div class="page active" id="page-log">
    <div id="txLog"></div>
    <div class="action-row">
      <button class="action-btn red" onclick="clearMonth()">Clear this month</button>
    </div>
  </div>

  <!-- BREAKDOWN PAGE -->
  <div class="page" id="page-breakdown">
    <div id="breakdownContent"></div>
  </div>

  <!-- ALL TIME PAGE -->
  <div class="page" id="page-alltime">
    <div id="allTimeContent"></div>
  </div>

  <!-- CATEGORIES PAGE -->
  <div class="page" id="page-categories">
    <span class="section-label">Manage categories</span>
    <div style="font-size:11px;color:var(--text-muted);font-style:italic;margin-bottom:12px">Add, rename, or remove categories. Type sets whether it appears for expenses, income, or both.</div>
    <div id="catManageList"></div>
    <div class="add-row" style="margin-top:14px">
      <input class="add-inp" id="newCatName" placeholder="New category name...">
      <select class="add-type-sel" id="newCatType">
        <option value="both">Both</option>
        <option value="exp">Expense</option>
        <option value="inc">Income</option>
      </select>
      <button class="add-btn" onclick="addCategory()">+</button>
    </div>
  </div>
</main>

<!-- EDIT ENTRY MODAL -->
<div class="modal-overlay hidden" id="editModal">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title">Edit Entry</div>
    <div><select class="m-sel" id="em-type"><option value="exp">Expense</option><option value="inc">Income</option></select></div>
    <div><input class="m-inp f-mono" id="em-amt" type="number" placeholder="Amount (₦)"></div>
    <div><input class="m-inp" id="em-desc" placeholder="Description"></div>
    <div><input class="m-inp f-mono" id="em-date" type="date"></div>
    <div><select class="m-sel" id="em-cat"></select></div>
    <div><input class="m-inp" id="em-note" placeholder="Note (optional)"></div>
    <div class="modal-actions">
      <button class="btn btn-red" onclick="deleteEntryModal()">Delete</button>
      <div style="display:flex;gap:8px">
        <button class="btn" onclick="closeEditModal()">Cancel</button>
        <button class="btn btn-gold" onclick="saveEntryModal()">Save</button>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>
<input type="file" id="importFile" accept=".json" style="display:none" onchange="handleImport(event)">

<script>
function uid(){return Math.random().toString(36).slice(2,9)}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
function pad(n){return String(n).padStart(2,'0')}
function fmt(n){return '₦'+Math.abs(Number(n)).toLocaleString('en-NG',{minimumFractionDigits:0,maximumFractionDigits:0})}

const MONTH_NAMES=['January','February','March','April','May','June','July','August','September','October','November','December'];
const MONTH_SHORT=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
const DAY_SHORT=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];

const DEFAULT_CATS=[
  {id:'c1',name:'Feeding',type:'exp'},
  {id:'c2',name:'Groceries',type:'exp'},
  {id:'c3',name:'Commute',type:'exp'},
  {id:'c4',name:'Fuel',type:'exp'},
  {id:'c5',name:'Airtime & Data',type:'exp'},
  {id:'c6',name:'Self Care',type:'exp'},
  {id:'c7',name:'Health & Medication',type:'exp'},
  {id:'c8',name:'Clothing',type:'exp'},
  {id:'c9',name:'Utilities',type:'exp'},
  {id:'c10',name:'Rent',type:'exp'},
  {id:'c11',name:'Entertainment',type:'exp'},
  {id:'c12',name:'Eating Out',type:'exp'},
  {id:'c13',name:'Gifts',type:'both'},
  {id:'c14',name:'Business Expense',type:'exp'},
  {id:'c15',name:'Savings',type:'exp'},
  {id:'c16',name:'Investment',type:'both'},
  {id:'c17',name:'Family Support',type:'exp'},
  {id:'c18',name:'Church & Giving',type:'exp'},
  {id:'c19',name:'Subscriptions',type:'exp'},
  {id:'c20',name:'Miscellaneous',type:'both'},
  {id:'c21',name:'CGSL Income',type:'inc'},
  {id:'c22',name:'Dante Craft Income',type:'inc'},
  {id:'c23',name:'Trading Profit',type:'inc'},
  {id:'c24',name:'Freelance Income',type:'inc'},
  {id:'c25',name:'Other Income',type:'inc'},
];

let state={
  entries:[],
  categories:JSON.parse(JSON.stringify(DEFAULT_CATS)),
};
let entryType='exp';
let viewYear=new Date().getFullYear();
let viewMonth=new Date().getMonth();
let currentTab='log';
let editingId=null;
let isDark=true;

// ── CATEGORIES ────────────────────────────────────────────
function getCatsForType(type){
  return state.categories.filter(c=>c.type===type||c.type==='both');
}
function buildCatSelect(selId, type, selected=''){
  const sel=document.getElementById(selId);
  const cur=selected||sel?.value||'';
  if(!sel) return;
  sel.innerHTML='<option value="">— Category —</option>';
  getCatsForType(type).forEach(c=>{
    const o=document.createElement('option');
    o.value=c.name; o.textContent=c.name;
    if(c.name===cur) o.selected=true;
    sel.appendChild(o);
  });
}
function refreshFormCat(){buildCatSelect('fCat',entryType)}

function renderCategories(){
  const list=document.getElementById('catManageList');
  list.innerHTML='';
  state.categories.forEach(c=>{
    const row=document.createElement('div');
    row.className='cat-manage-item';
    const typeLabel={exp:'Expense',inc:'Income',both:'Both'}[c.type]||c.type;
    row.innerHTML=`
      <input class="cat-manage-name" value="${esc(c.name)}" onchange="updateCatName('${c.id}',this.value)">
      <button class="cat-manage-type ${c.type}" onclick="cycleCatType('${c.id}')">${typeLabel}</button>
      <button class="cat-del-btn" onclick="deleteCategory('${c.id}')">✕</button>`;
    list.appendChild(row);
  });
}
function updateCatName(id,val){
  const c=state.categories.find(x=>x.id===id);
  if(c&&val.trim()){c.name=val.trim();saveData();refreshFormCat()}
}
function cycleCatType(id){
  const c=state.categories.find(x=>x.id===id);
  if(!c) return;
  const cycle={exp:'inc',inc:'both',both:'exp'};
  c.type=cycle[c.type]||'exp';
  renderCategories(); saveData(); refreshFormCat();
}
function deleteCategory(id){
  if(!confirm('Remove this category?')) return;
  state.categories=state.categories.filter(x=>x.id!==id);
  renderCategories(); saveData(); refreshFormCat();
}
function addCategory(){
  const name=document.getElementById('newCatName').value.trim();
  if(!name){showToast('Enter a category name');return}
  const type=document.getElementById('newCatType').value;
  state.categories.push({id:uid(),name,type});
  document.getElementById('newCatName').value='';
  renderCategories(); saveData(); refreshFormCat(); showToast('Category added');
}

// ── MONTH ─────────────────────────────────────────────────
function changeMonth(d){
  viewMonth+=d;
  if(viewMonth>11){viewMonth=0;viewYear++}
  if(viewMonth<0){viewMonth=11;viewYear--}
  renderAll();
}
function mkKey(){return viewYear+'-'+pad(viewMonth+1)}
function getMonthEntries(){return state.entries.filter(e=>e.date.startsWith(mkKey()))}

function renderMonthLabel(){
  const isCurrent=viewYear===new Date().getFullYear()&&viewMonth===new Date().getMonth();
  document.getElementById('monthLabel').innerHTML=MONTH_NAMES[viewMonth]+' <em>'+viewYear+'</em>'+(isCurrent?' ·':'');
}

function renderSummary(){
  const entries=getMonthEntries();
  const inc=entries.filter(e=>e.type==='inc').reduce((s,e)=>s+Number(e.amount),0);
  const exp=entries.filter(e=>e.type==='exp').reduce((s,e)=>s+Number(e.amount),0);
  const bal=inc-exp;
  document.getElementById('sumInc').textContent=fmt(inc);
  document.getElementById('sumExp').textContent=fmt(exp);
  document.getElementById('sumBal').textContent=(bal>=0?'+':'')+fmt(bal);
  document.getElementById('sumBal').style.color=bal>0?'var(--green)':bal<0?'var(--red)':'var(--gold)';
}

// ── TYPE TOGGLE ───────────────────────────────────────────
function setType(t){
  entryType=t;
  document.getElementById('btnExp').classList.toggle('active',t==='exp');
  document.getElementById('btnInc').classList.toggle('active',t==='inc');
  refreshFormCat();
}

// ── ADD ENTRY ─────────────────────────────────────────────
function addEntry(){
  const amt=parseFloat(document.getElementById('fAmt').value);
  const desc=document.getElementById('fDesc').value.trim();
  if(!amt||!desc){showToast('Amount and description required');return}
  const cat=document.getElementById('fCat').value;
  const note=document.getElementById('fNote').value.trim();
  const date=document.getElementById('fDate').value||new Date().toISOString().slice(0,10);
  state.entries.unshift({id:uid(),type:entryType,amount:amt,desc,cat,note,date});
  document.getElementById('fAmt').value='';
  document.getElementById('fDesc').value='';
  document.getElementById('fNote').value='';
  // Sync view to entry's month
  const d=new Date(date+'T12:00:00');
  viewYear=d.getFullYear(); viewMonth=d.getMonth();
  renderAll(); saveData(); showToast('Recorded');
}

// ── LOG ───────────────────────────────────────────────────
function renderLog(){
  const container=document.getElementById('txLog');
  const entries=getMonthEntries();
  container.innerHTML='';
  if(!entries.length){container.innerHTML='<div class="empty-note">No entries for '+MONTH_NAMES[viewMonth]+' '+viewYear+'.<br>Record your first transaction above.</div>';return}
  // Group by date
  const groups={};
  entries.forEach(e=>{if(!groups[e.date])groups[e.date]=[];groups[e.date].push(e)});
  Object.keys(groups).sort((a,b)=>b.localeCompare(a)).forEach(date=>{
    const d=new Date(date+'T12:00:00');
    const dayInc=groups[date].filter(e=>e.type==='inc').reduce((s,e)=>s+Number(e.amount),0);
    const dayExp=groups[date].filter(e=>e.type==='exp').reduce((s,e)=>s+Number(e.amount),0);
    const dayLabel=d.getDate()+' '+MONTH_SHORT[d.getMonth()]+' · '+DAY_SHORT[d.getDay()];
    const group=document.createElement('div');
    group.className='tx-group';
    const totals=(dayInc?`<span style="color:var(--green)">+${fmt(dayInc)}</span> `:'')+(dayExp?`<span style="color:var(--red)">−${fmt(dayExp)}</span>`:'');
    group.innerHTML=`<div class="tx-group-label"><span>${dayLabel}</span><span class="tx-group-total">${totals}</span></div>`;
    groups[date].forEach(e=>{
      const item=document.createElement('div');
      item.className='tx-item';
      item.innerHTML=`
        <div class="tx-icon ${e.type}">${e.type==='inc'?'↑':'↓'}</div>
        <div class="tx-body">
          <span class="tx-desc" contenteditable="true" onblur="inlineUpdateEntry('${e.id}','desc',this.innerText)">${esc(e.desc)}</span>
          <div class="tx-meta">
            ${e.cat?`<span class="tx-cat" onclick="openEditModal('${e.id}')">${esc(e.cat)}</span>`:''}
            ${e.note?`<span class="tx-note">${esc(e.note)}</span>`:''}
          </div>
        </div>
        <div class="tx-amt ${e.type}">${e.type==='inc'?'+':'−'}${fmt(e.amount)}</div>
        <button class="tx-del" onclick="openEditModal('${e.id}')">✎</button>
        <button class="tx-del" onclick="deleteEntry('${e.id}')">✕</button>`;
      group.appendChild(item);
    });
    container.appendChild(group);
  });
}

function inlineUpdateEntry(id,field,val){
  const e=state.entries.find(x=>x.id===id);
  if(e){e[field]=val.trim();saveData()}
}
function deleteEntry(id){
  state.entries=state.entries.filter(x=>x.id!==id);
  renderAll(); saveData();
}
function clearMonth(){
  if(!confirm('Delete all entries for '+MONTH_NAMES[viewMonth]+'?'))return;
  state.entries=state.entries.filter(e=>!e.date.startsWith(mkKey()));
  renderAll(); saveData(); showToast('Cleared');
}

// ── EDIT MODAL ────────────────────────────────────────────
function openEditModal(id){
  editingId=id;
  const e=state.entries.find(x=>x.id===id); if(!e) return;
  document.getElementById('em-type').value=e.type;
  document.getElementById('em-amt').value=e.amount;
  document.getElementById('em-desc').value=e.desc;
  document.getElementById('em-date').value=e.date;
  document.getElementById('em-note').value=e.note||'';
  buildCatSelect('em-cat',e.type,e.cat);
  document.getElementById('editModal').classList.remove('hidden');
}
function closeEditModal(){document.getElementById('editModal').classList.add('hidden');editingId=null}
function saveEntryModal(){
  const e=state.entries.find(x=>x.id===editingId); if(!e) return;
  e.type=document.getElementById('em-type').value;
  e.amount=parseFloat(document.getElementById('em-amt').value)||e.amount;
  e.desc=document.getElementById('em-desc').value.trim()||e.desc;
  e.date=document.getElementById('em-date').value||e.date;
  e.cat=document.getElementById('em-cat').value;
  e.note=document.getElementById('em-note').value.trim();
  closeEditModal(); renderAll(); saveData(); showToast('Updated');
}
function deleteEntryModal(){
  if(!confirm('Delete this entry?'))return;
  deleteEntry(editingId); closeEditModal();
}
document.getElementById('editModal').addEventListener('click',e=>{if(e.target===document.getElementById('editModal'))closeEditModal()});

// ── BREAKDOWN ─────────────────────────────────────────────
function renderBreakdown(){
  const container=document.getElementById('breakdownContent');
  container.innerHTML='';
  const entries=getMonthEntries();
  const expenses=entries.filter(e=>e.type==='exp');
  const incomes=entries.filter(e=>e.type==='inc');
  const totalExp=expenses.reduce((s,e)=>s+Number(e.amount),0);
  const totalInc=incomes.reduce((s,e)=>s+Number(e.amount),0);

  // Expenses
  const expCats={};
  expenses.forEach(e=>{const k=e.cat||'Uncategorised';expCats[k]=(expCats[k]||0)+Number(e.amount)});
  const expSorted=Object.entries(expCats).sort((a,b)=>b[1]-a[1]);
  const expSec=document.createElement('div'); expSec.className='cat-section';
  expSec.innerHTML=`<div class="cat-section-title">Expenses · ${fmt(totalExp)}</div>`;
  if(!expSorted.length) expSec.innerHTML+='<div class="empty-note">No expenses this month.</div>';
  expSorted.forEach(([cat,amt])=>{
    const pct=totalExp?Math.round(amt/totalExp*100):0;
    const row=document.createElement('div'); row.className='cat-row';
    row.innerHTML=`<div class="cat-name">${esc(cat)}</div>
      <div class="cat-bar-wrap"><div class="cat-bar" style="width:${pct}%;background:var(--red)"></div></div>
      <div class="cat-amt">${fmt(amt)}</div>
      <div class="cat-pct">${pct}%</div>`;
    expSec.appendChild(row);
  });
  container.appendChild(expSec);

  // Income
  const incCats={};
  incomes.forEach(e=>{const k=e.cat||'Uncategorised';incCats[k]=(incCats[k]||0)+Number(e.amount)});
  const incSorted=Object.entries(incCats).sort((a,b)=>b[1]-a[1]);
  const incSec=document.createElement('div'); incSec.className='cat-section';
  incSec.innerHTML=`<div class="cat-section-title">Income · ${fmt(totalInc)}</div>`;
  if(!incSorted.length) incSec.innerHTML+='<div class="empty-note">No income entries this month.</div>';
  incSorted.forEach(([cat,amt])=>{
    const pct=totalInc?Math.round(amt/totalInc*100):0;
    const row=document.createElement('div'); row.className='cat-row';
    row.innerHTML=`<div class="cat-name">${esc(cat)}</div>
      <div class="cat-bar-wrap"><div class="cat-bar" style="width:${pct}%;background:var(--green)"></div></div>
      <div class="cat-amt">${fmt(amt)}</div>
      <div class="cat-pct">${pct}%</div>`;
    incSec.appendChild(row);
  });
  container.appendChild(incSec);
}

// ── ALL TIME ──────────────────────────────────────────────
function renderAllTime(){
  const container=document.getElementById('allTimeContent');
  container.innerHTML='';
  const months={};
  state.entries.forEach(e=>{
    const mk=e.date.slice(0,7);
    if(!months[mk]) months[mk]={inc:0,exp:0};
    if(e.type==='inc') months[mk].inc+=Number(e.amount);
    else months[mk].exp+=Number(e.amount);
  });
  const sorted=Object.keys(months).sort((a,b)=>b.localeCompare(a));
  if(!sorted.length){container.innerHTML='<div class="empty-note">No entries yet.</div>';return}
  // Totals
  const allInc=Object.values(months).reduce((s,m)=>s+m.inc,0);
  const allExp=Object.values(months).reduce((s,m)=>s+m.exp,0);
  const summary=document.createElement('div');
  summary.style.cssText='display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap';
  summary.innerHTML=`
    <div style="flex:1;background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:10px 12px">
      <div style="font-family:'Cormorant Garamond',serif;font-size:20px;color:var(--green)">${fmt(allInc)}</div>
      <div style="font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--text-muted);text-transform:uppercase;letter-spacing:.1em;margin-top:2px">Total Income</div>
    </div>
    <div style="flex:1;background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:10px 12px">
      <div style="font-family:'Cormorant Garamond',serif;font-size:20px;color:var(--red)">${fmt(allExp)}</div>
      <div style="font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--text-muted);text-transform:uppercase;letter-spacing:.1em;margin-top:2px">Total Expenses</div>
    </div>`;
  container.appendChild(summary);
  sorted.forEach(mk=>{
    const [y,m]=mk.split('-');
    const bal=months[mk].inc-months[mk].exp;
    const row=document.createElement('div'); row.className='month-row';
    row.onclick=()=>{viewYear=parseInt(y);viewMonth=parseInt(m)-1;switchTab('log')};
    row.innerHTML=`
      <div class="month-row-name">${MONTH_NAMES[parseInt(m)-1]} ${y}</div>
      <div class="month-row-detail">
        <span style="color:var(--green)">+${fmt(months[mk].inc)}</span>
        <span style="color:var(--red)">−${fmt(months[mk].exp)}</span>
        <span style="color:${bal>=0?'var(--green)':'var(--red)'}">${bal>=0?'+':''}${fmt(bal)}</span>
      </div>`;
    container.appendChild(row);
  });
}

// ── TAB ───────────────────────────────────────────────────
const TABS=['log','breakdown','alltime','categories'];
function switchTab(tab){
  currentTab=tab;
  document.querySelectorAll('.tab').forEach((t,i)=>t.classList.toggle('active',TABS[i]===tab));
  document.querySelectorAll('.page').forEach((p,i)=>p.classList.toggle('active',TABS[i]===tab));
  if(tab==='log') renderLog();
  else if(tab==='breakdown') renderBreakdown();
  else if(tab==='alltime') renderAllTime();
  else if(tab==='categories') renderCategories();
}

function saveData(){localStorage.setItem('moneyFlow',JSON.stringify(state));showToast('Saved');scheduleCloudPush();}

const SYNC_URL = 'https://wrzxalfdatnpdnbmdjir.supabase.co/rest/v1/sync_data';
const SYNC_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndyenhhbGZkYXRucGRuYm1kamlyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQ1MjA4ODMsImV4cCI6MjEwMDA5Njg4M30.oyx47J97hZsjnF3iFOz9mHGt_9oGjqLMQ0zsiVhBC-g';
const SYNC_KEY = 'AmiableMeerkat894';
const SYNC_TOOL = 'finance-tracker';

function setSyncStatus(msg) { const el=document.getElementById('syncStatus'); if(el) el.textContent=msg; }

async function pullCloud() {
  setSyncStatus('Syncing…');
  try {
    const ctrl = new AbortController();
    const timeout = setTimeout(()=>ctrl.abort(), 6000);
    const res = await fetch(`${SYNC_URL}?tool=eq.${SYNC_TOOL}&select=data,updated_at`, {
      headers: { 'apikey': SYNC_ANON_KEY, 'Authorization': 'Bearer ' + SYNC_ANON_KEY, 'x-sync-key': SYNC_KEY },
      signal: ctrl.signal
    });
    clearTimeout(timeout);
    if(!res.ok) { setSyncStatus('Sync error'); return; }
    const rows = await res.json();
    if(!rows.length) { setSyncStatus('Synced'); pushCloudNow(); return; }
    const remote = rows[0];
    const localSyncedAt = localStorage.getItem(SYNC_TOOL + '_synced_at');
    if(!localSyncedAt || new Date(remote.updated_at) > new Date(localSyncedAt)) {
      const d = remote.data;
      if(d.entries) state.entries = d.entries;
      if(d.categories && d.categories.length) state.categories = d.categories;
      localStorage.setItem('moneyFlow', JSON.stringify(state));
      localStorage.setItem(SYNC_TOOL + '_synced_at', remote.updated_at);
    }
    setSyncStatus('Synced');
  } catch(e) { setSyncStatus('Offline'); }
}

let cloudPushTimer = null;
function scheduleCloudPush() {
  clearTimeout(cloudPushTimer);
  cloudPushTimer = setTimeout(pushCloudNow, 1500);
}

async function pushCloudNow() {
  setSyncStatus('Syncing…');
  try {
    const res = await fetch(`${SYNC_URL}?on_conflict=tool`, {
      method: 'POST',
      headers: { 'apikey': SYNC_ANON_KEY, 'Authorization': 'Bearer ' + SYNC_ANON_KEY, 'x-sync-key': SYNC_KEY, 'Content-Type': 'application/json', 'Prefer': 'resolution=merge-duplicates,return=representation' },
      body: JSON.stringify([{ tool: SYNC_TOOL, data: state }])
    });
    if(!res.ok) { setSyncStatus('Sync error'); return; }
    const rows = await res.json();
    if(rows.length) localStorage.setItem(SYNC_TOOL + '_synced_at', rows[0].updated_at);
    setSyncStatus('Synced');
  } catch(e) { setSyncStatus('Offline'); }
}
function loadData(){
  const raw=localStorage.getItem('moneyFlow');
  if(raw){try{const d=JSON.parse(raw);if(d.entries)state.entries=d.entries;if(d.categories&&d.categories.length)state.categories=d.categories;}catch(e){}}
}
function exportData(){
  const blob=new Blob([JSON.stringify(state,null,2)],{type:'application/json'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);
  a.download='money-flow-'+mkKey()+'.json';a.click();showToast('Exported');
}
function handleImport(e){
  const file=e.target.files[0];if(!file)return;
  const r=new FileReader();
  r.onload=ev=>{try{const d=JSON.parse(ev.target.result);if(d.entries)state.entries=d.entries;if(d.categories)state.categories=d.categories;renderAll();buildCatSelect('fCat',entryType);showToast('Imported');}catch(err){showToast('Import failed')}};
  r.readAsText(file);e.target.value='';
}
function toggleTheme(){
  isDark=!isDark;document.body.classList.toggle('light',!isDark);
  localStorage.setItem('moneyFlowTheme',isDark?'dark':'light');
}
function showToast(msg){
  const t=document.getElementById('toast');t.textContent=msg;
  t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2000);
}

function renderAll(){
  renderMonthLabel();
  renderSummary();
  if(currentTab==='log') renderLog();
  else if(currentTab==='breakdown') renderBreakdown();
  else if(currentTab==='alltime') renderAllTime();
  else if(currentTab==='categories') renderCategories();
}

const th=localStorage.getItem('moneyFlowTheme');
if(th==='light'){isDark=false;document.body.classList.add('light')}
(async function(){
  await pullCloud();
  loadData();
  refreshFormCat();
  document.getElementById('fDate').value=new Date().toISOString().slice(0,10);
  renderAll();
})();
</script>
