<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>dAnTE — Paul Bassey</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Jost:wght@200;300;400;500&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
:root{--bg:#070909;--s1:#0d1212;--s2:#131a1a;--s3:#192020;--border:rgba(255,255,255,0.06);--border-g:rgba(255,255,255,0.11);--tx:#e2e8e6;--mid:#6a8080;--dim:#2d3d3d;--acc:#6aaa90;--gold:#c9a84c;--rose:#c47888;--blue:#6a9ab8;--fd:'Cormorant Garamond',serif;--fm:'Jost',sans-serif;--mono:'DM Mono',monospace;}
body.light{--bg:#f4f5f3;--s1:#eaece8;--s2:#e0e2de;--s3:#d6d8d4;--border:rgba(0,0,0,0.07);--border-g:rgba(0,0,0,0.13);--tx:#101412;--mid:#4a5e58;--dim:#aab0ae;--acc:#1a6a50;--gold:#7a5810;--rose:#7a2838;--blue:#1a4868;}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{background:var(--bg);color:var(--tx);font-family:var(--fm);font-weight:300;font-size:13px;line-height:1.6;min-height:100vh;transition:background .25s,color .25s;overflow-x:hidden;}

/* HEADER */
.hdr{padding:2rem 2rem 1.5rem;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:flex-end;flex-wrap:wrap;gap:1rem;position:sticky;top:0;z-index:100;background:rgba(7,9,9,0.95);backdrop-filter:blur(10px);}
body.light .hdr{background:rgba(244,245,243,0.95);}
.hdr-l .eyebrow{font-family:var(--mono);font-size:0.52rem;letter-spacing:0.28em;text-transform:uppercase;color:var(--acc);margin-bottom:0.3rem;}
.hdr-l .name{font-family:var(--fd);font-size:clamp(1.6rem,4vw,2.5rem);font-weight:300;line-height:1.05;color:var(--tx);}
.hdr-l .name em{font-style:italic;color:var(--acc);}
.hdr-l .sub{font-family:var(--mono);font-size:0.52rem;letter-spacing:0.18em;text-transform:uppercase;color:var(--dim);margin-top:0.2rem;}
.hdr-r{display:flex;gap:7px;align-items:center;flex-wrap:wrap;}
.hbtn{background:none;border:1px solid var(--border-g);border-radius:2px;color:var(--mid);font-family:var(--mono);font-size:0.52rem;letter-spacing:0.1em;padding:5px 11px;cursor:pointer;transition:all .2s;white-space:nowrap;}
.hbtn:hover{color:var(--acc);border-color:var(--acc);}
.hbtn.active{color:var(--acc);border-color:var(--acc);background:rgba(106,170,144,0.06);}
.date-chip{font-family:var(--mono);font-size:0.52rem;letter-spacing:0.1em;color:var(--dim);}

/* PINNED */
.pinned{display:flex;gap:8px;padding:1rem 2rem;border-bottom:1px solid var(--border);overflow-x:auto;background:var(--s1);}
.pin{flex-shrink:0;background:none;border:1px solid var(--border-g);border-radius:2px;color:var(--mid);font-family:var(--mono);font-size:0.52rem;letter-spacing:0.08em;padding:6px 14px;cursor:pointer;text-decoration:none;display:inline-flex;align-items:center;gap:5px;transition:all .2s;white-space:nowrap;}
.pin:hover{color:var(--acc);border-color:var(--acc);}
.pin.gold:hover{color:var(--gold);border-color:var(--gold);}
.pin.rose:hover{color:var(--rose);border-color:var(--rose);}

/* SEARCH */
.sbar{padding:1rem 2rem;border-bottom:1px solid var(--border);display:flex;gap:8px;flex-wrap:wrap;align-items:center;}
.sinp{background:var(--s1);border:1px solid var(--border);border-radius:2px;color:var(--tx);font-family:var(--fm);font-size:12px;font-weight:300;padding:7px 12px;outline:none;transition:border-color .2s;flex:1;min-width:180px;max-width:400px;}
.sinp:focus{border-color:var(--border-g);}
.sinp::placeholder{color:var(--dim);}
.filter-btns{display:flex;gap:6px;flex-wrap:wrap;}
.fbtn{background:none;border:1px solid var(--border);border-radius:2px;color:var(--dim);font-family:var(--mono);font-size:0.5rem;letter-spacing:0.08em;padding:4px 9px;cursor:pointer;transition:all .2s;white-space:nowrap;}
.fbtn:hover,.fbtn.on{color:var(--acc);border-color:var(--acc);}

/* CONTENT */
.content{max-width:1100px;margin:0 auto;padding:1.5rem 2rem 6rem;}

/* SECTION */
.sec{margin-bottom:2.5rem;}
.sec-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:0.75rem;padding-bottom:0.5rem;border-bottom:1px solid var(--border);}
.sec-left{display:flex;align-items:center;gap:0.75rem;}
.sec-label{font-family:var(--mono);font-size:0.52rem;letter-spacing:0.22em;text-transform:uppercase;color:var(--mid);}
.sec-count{font-family:var(--mono);font-size:0.48rem;color:var(--dim);}
.sec-edit-btn{background:none;border:none;color:var(--dim);font-family:var(--mono);font-size:0.5rem;cursor:pointer;padding:2px 6px;border-radius:2px;transition:all .2s;opacity:0;}
.sec:hover .sec-edit-btn{opacity:1;}
.sec-edit-btn:hover{color:var(--acc);}

/* GRID */
.tool-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:9px;}

/* CARD */
.tool-card{background:var(--s1);border:1px solid var(--border);border-radius:2px;padding:1rem 1.1rem;text-decoration:none;color:inherit;display:block;transition:all .18s;position:relative;overflow:hidden;cursor:pointer;}
.tool-card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:2px;background:var(--border-g);transition:background .18s;}
.tool-card:hover{background:var(--s2);border-color:var(--border-g);}
.tool-card:hover::before{background:var(--acc);}
.tool-card.gold::before{background:rgba(201,168,76,0.2);}
.tool-card.gold:hover::before{background:var(--gold);}
.tool-card.rose::before{background:rgba(196,120,136,0.2);}
.tool-card.rose:hover::before{background:var(--rose);}
.tool-card.blue::before{background:rgba(106,154,184,0.2);}
.tool-card.blue:hover::before{background:var(--blue);}
.tc-icon{font-size:1rem;margin-bottom:0.4rem;opacity:0.8;}
.tc-name{font-family:var(--fd);font-size:0.95rem;font-weight:400;color:var(--tx);line-height:1.3;margin-bottom:0.15rem;}
.tc-desc{font-family:var(--mono);font-size:0.48rem;letter-spacing:0.07em;color:var(--dim);text-transform:uppercase;line-height:1.5;}
.tc-tag{position:absolute;top:0.5rem;right:0.6rem;font-family:var(--mono);font-size:0.44rem;letter-spacing:0.07em;text-transform:uppercase;padding:2px 5px;border-radius:2px;}
.tag-daily{background:rgba(106,170,144,0.1);color:var(--acc);border:1px solid rgba(106,170,144,0.2);}
.tag-new{background:rgba(201,168,76,0.1);color:var(--gold);border:1px solid rgba(201,168,76,0.2);}

/* CARD EDIT MODE */
.card-editbar{position:absolute;top:0.4rem;right:0.4rem;display:flex;gap:2px;z-index:10;}
.card-del,.card-edit,.card-pin{background:none;border:none;color:var(--dim);cursor:pointer;font-size:0.65rem;opacity:0;transition:all .15s;padding:2px 4px;}
body.editing .card-del,body.editing .card-edit,body.editing .card-pin{opacity:0.5;}
body.editing .card-del:hover{opacity:1;color:#c46858;}
body.editing .card-edit:hover{opacity:1;color:var(--blue);}
body.editing .card-pin:hover{opacity:1;color:var(--gold);}
.card-pin{opacity:0 !important;} /* pin only shown in edit mode, never idle */
body.editing .card-pin{opacity:0.5 !important;}
body.editing .tool-card{cursor:default;}
body.editing .tool-card:hover{background:var(--s1);}

/* ADD TOOL PANEL */
.add-panel{background:var(--s1);border:1px solid var(--border);border-radius:2px;padding:1.5rem;margin-top:2rem;display:none;}
.add-panel.open{display:block;}
.add-panel-title{font-family:var(--mono);font-size:0.55rem;letter-spacing:0.2em;text-transform:uppercase;color:var(--acc);margin-bottom:1.25rem;}
.add-form{display:grid;grid-template-columns:0.6fr 1.2fr 1.2fr 1.4fr 1fr auto;gap:8px;align-items:end;flex-wrap:wrap;}
.add-field{display:flex;flex-direction:column;gap:4px;}
.add-label{font-family:var(--mono);font-size:0.48rem;letter-spacing:0.12em;text-transform:uppercase;color:var(--dim);}
.add-inp,.add-sel{background:var(--s2);border:1px solid var(--border);border-radius:2px;color:var(--tx);font-family:var(--fm);font-size:11px;font-weight:300;padding:6px 9px;outline:none;transition:border-color .2s;width:100%;}
.add-inp:focus,.add-sel:focus{border-color:var(--acc);}
.add-inp::placeholder{color:var(--dim);}
.add-submit{background:none;border:1px solid var(--acc);border-radius:2px;color:var(--acc);font-family:var(--mono);font-size:0.52rem;letter-spacing:0.1em;padding:7px 16px;cursor:pointer;transition:all .2s;white-space:nowrap;}
.add-submit:hover{background:rgba(106,170,144,0.08);}

/* ADD SECTION */
.add-sec-row{display:flex;gap:8px;margin-top:1rem;align-items:center;}
.add-sec-inp{background:var(--s2);border:1px solid var(--border);border-radius:2px;color:var(--tx);font-family:var(--fm);font-size:11px;padding:5px 9px;outline:none;flex:1;max-width:200px;}
.add-sec-btn{background:none;border:1px dashed var(--border-g);border-radius:2px;color:var(--dim);font-family:var(--mono);font-size:0.5rem;letter-spacing:0.08em;padding:5px 12px;cursor:pointer;transition:all .2s;}
.add-sec-btn:hover{color:var(--acc);border-color:var(--acc);}

.empty{text-align:center;padding:3rem;font-family:var(--fd);font-style:italic;color:var(--dim);font-size:1.1rem;}

.footer{text-align:center;padding:1.5rem;border-top:1px solid var(--border);font-family:var(--mono);font-size:0.48rem;letter-spacing:0.15em;color:var(--dim);text-transform:uppercase;}

.toast{position:fixed;bottom:18px;left:50%;transform:translateX(-50%) translateY(44px);background:var(--s2);border:1px solid var(--border-g);color:var(--acc);font-family:var(--mono);font-size:0.52rem;letter-spacing:0.1em;padding:7px 16px;border-radius:2px;transition:transform .35s cubic-bezier(.34,1.56,.64,1);z-index:999;white-space:nowrap;}
.toast.show{transform:translateX(-50%) translateY(0);}

@media(max-width:480px){
  .hdr,.sbar,.content,.pinned{padding-left:1.25rem;padding-right:1.25rem;}
  .tool-grid{grid-template-columns:1fr 1fr;}
  .add-form{grid-template-columns:1fr 1fr;}
  .add-form .add-submit{grid-column:1/-1;}
}
</style>
</head>
<body>

<div class="hdr">
  <div class="hdr-l">
    <div class="eyebrow">dAnTE Inc. &mdash; Personal OS</div>
    <div class="name">Paul <em>Bassey.</em></div>
    <div class="sub">Son &middot; Steward &middot; Builder &middot; Connoisseur</div>
  </div>
  <div class="hdr-r">
    <div class="date-chip" id="datechip"></div>
    <div class="date-chip" id="syncStatus">—</div>
    <button class="hbtn" onclick="exportState()">Export</button>
    <button class="hbtn" onclick="document.getElementById('importFile').click()">Import</button>
    <input type="file" id="importFile" accept=".json" style="display:none" onchange="importState(this)">
    <button class="hbtn" onclick="toggleTheme()">&#9788; / &#9790;</button>
    <button class="hbtn" id="editBtn" onclick="toggleEdit()">Manage</button>
    <button class="hbtn active" onclick="toggleAddPanel()">+ Add Tool</button>
  </div>
</div>

<div class="pinned" id="pinnedBar"></div>

<div class="sbar">
  <input class="sinp" id="sinp" placeholder="Search tools..." oninput="doSearch()">
  <div class="filter-btns" id="filterBtns"></div>
</div>

<div class="content">
  <div id="sectionsWrap"></div>

  <div class="add-panel" id="addPanel">
    <div class="add-panel-title" id="addPanelTitle">Add a tool</div>
    <div class="add-form">
      <div class="add-field">
        <div class="add-label">Icon / Emoji</div>
        <input class="add-inp" id="newIcon" placeholder="e.g. ⚡ (optional)" maxlength="4">
      </div>
      <div class="add-field">
        <div class="add-label">Tool Name</div>
        <input class="add-inp" id="newName" placeholder="e.g. The Quickening">
      </div>
      <div class="add-field">
        <div class="add-label">Filename</div>
        <input class="add-inp" id="newFile" placeholder="e.g. the-quickening.html">
      </div>
      <div class="add-field">
        <div class="add-label">Description</div>
        <input class="add-inp" id="newDesc" placeholder="e.g. Daily tracker">
      </div>
      <div class="add-field">
        <div class="add-label">Section & Colour</div>
        <select class="add-sel" id="newSection"></select>
      </div>
      <button class="add-submit" id="addSubmitBtn" onclick="submitTool()">Add</button>
      <button class="add-submit" id="cancelEditBtn" onclick="cancelEditTool()" style="display:none;border-color:var(--dim);color:var(--dim);">Cancel</button>
    </div>
    <div class="add-sec-row">
      <input class="add-sec-inp" id="newSecName" placeholder="New section name...">
      <button class="add-sec-btn" onclick="addSection()">+ New Section</button>
    </div>
  </div>

  <div class="empty" id="emptySearch" style="display:none;">Nothing found.</div>
</div>

<div class="footer">dAnTE Inc. &middot; Personal OS &middot; Paul Akpan Bassey &middot; 2026</div>
<div class="toast" id="toast"></div>

<script>
const LS = 'dante_os_v2';
const COLORS = ['default','gold','rose','blue'];

// DEFAULT DATA
const DEFAULT = {

let state = loadState();
let editMode = false;
let activeFilter = null;

function loadState(){
  try{
    const s = localStorage.getItem(LS);
    if(s) return JSON.parse(s);
  }catch(e){}
  return JSON.parse(JSON.stringify(DEFAULT));
}

function saveState(){
  try{ localStorage.setItem(LS, JSON.stringify(state)); }catch(e){}
  scheduleCloudPush();
}

// ── CLOUD SYNC (Supabase) ──
// state loads synchronously above so the page is usable immediately.
// pullCloud() runs after that, and if the cloud copy is newer, swaps
// state in and re-renders — additive on top of the existing load, not
// a rework of it.
const SYNC_URL = 'https://wrzxalfdatnpdnbmdjir.supabase.co/rest/v1/sync_data';
const SYNC_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndyenhhbGZkYXRucGRuYm1kamlyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQ1MjA4ODMsImV4cCI6MjEwMDA5Njg4M30.oyx47J97hZsjnF3iFOz9mHGt_9oGjqLMQ0zsiVhBC-g';
const SYNC_KEY = 'AmiableMeerkat894';
const SYNC_TOOL = 'lifeos';

function setSyncStatus(msg) { const el=document.getElementById('syncStatus'); if(el) el.textContent=msg; }

async function pullCloud() {
  setSyncStatus('Syncing…');
  try {
    const ctrl = new AbortController();
    const timeout = setTimeout(()=>ctrl.abort(), 6000);
    const res = await fetch(`${SYNC_URL}?tool=eq.${SYNC_TOOL}&select=data,updated_at`, {
      headers: { 'apikey': SYNC_ANON_KEY, 'Authorization': 'Bearer ' + SYNC_ANON_KEY, 'x-sync-key': SYNC_KEY },
      signal: ctrl.signal
    });
    clearTimeout(timeout);
    if(!res.ok) { setSyncStatus('Sync error'); return; }
    const rows = await res.json();
    if(!rows.length) { setSyncStatus('Synced'); pushCloudNow(); return; }
    const remote = rows[0];
    const localSyncedAt = localStorage.getItem(SYNC_TOOL + '_synced_at');
    if(!localSyncedAt || new Date(remote.updated_at) > new Date(localSyncedAt)) {
      state = remote.data;
      localStorage.setItem(LS, JSON.stringify(state));
      localStorage.setItem(SYNC_TOOL + '_synced_at', remote.updated_at);
      render();
    }
    setSyncStatus('Synced');
  } catch(e) { setSyncStatus('Offline'); }
}

let cloudPushTimer = null;
function scheduleCloudPush() {
  clearTimeout(cloudPushTimer);
  cloudPushTimer = setTimeout(pushCloudNow, 1500);
}

async function pushCloudNow() {
  setSyncStatus('Syncing…');
  try {
    const res = await fetch(`${SYNC_URL}?on_conflict=tool`, {
      method: 'POST',
      headers: { 'apikey': SYNC_ANON_KEY, 'Authorization': 'Bearer ' + SYNC_ANON_KEY, 'x-sync-key': SYNC_KEY, 'Content-Type': 'application/json', 'Prefer': 'resolution=merge-duplicates,return=representation' },
      body: JSON.stringify([{ tool: SYNC_TOOL, data: state }])
    });
    if(!res.ok) { setSyncStatus('Sync error'); return; }
    const rows = await res.json();
    if(rows.length) localStorage.setItem(SYNC_TOOL + '_synced_at', rows[0].updated_at);
    setSyncStatus('Synced');
  } catch(e) { setSyncStatus('Offline'); }
}

function toast(m){
  const t=document.getElementById('toast');
  t.textContent=m;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2200);
}

function toggleTheme(){
  document.body.classList.toggle('light');
  try{localStorage.setItem('dante_os_theme',document.body.classList.contains('light')?'light':'dark');}catch(e){}
}

function toggleEdit(){
  editMode = !editMode;
  document.body.classList.toggle('editing', editMode);
  document.getElementById('editBtn').classList.toggle('active', editMode);
  document.getElementById('editBtn').textContent = editMode ? 'Done' : 'Manage';
}

function toggleAddPanel(){
  const p = document.getElementById('addPanel');
  p.classList.toggle('open');
  if(p.classList.contains('open')) populateSectionSelect();
}

function populateSectionSelect(){
  const sel = document.getElementById('newSection');
  sel.innerHTML = state.sections.map(s =>
    `<option value="${s.id}">${s.label}</option>`
  ).join('');
}

// RENDER
function render(){
  renderPinned();
  renderFilters();
  renderSections();
}

function renderPinned(){
  const bar = document.getElementById('pinnedBar');
  const pinnedTools = [];
  state.pinned.forEach(file => {
    state.sections.forEach(sec => {
      sec.tools.forEach(tool => {
        if(tool.file === file) pinnedTools.push({...tool, secColor: sec.color});
      });
    });
  });
  bar.innerHTML = pinnedTools.map(t =>
    `<a class="pin ${t.secColor==='gold'?'gold':t.secColor==='rose'?'rose':''}" href="${t.file}">${t.icon||'◆'} ${t.name}</a>`
  ).join('');
}

function renderFilters(){
  const wrap = document.getElementById('filterBtns');
  wrap.innerHTML = state.sections.map(s =>
    `<button class="fbtn${activeFilter===s.id?' on':''}" onclick="filterSection('${s.id}')">${s.label}</button>`
  ).join('');
}

function renderSections(filter){
  const wrap = document.getElementById('sectionsWrap');
  wrap.innerHTML = '';
  const sections = filter ? state.sections.filter(s=>s.id===filter) : state.sections;
  sections.forEach(sec => {
    if(!sec.tools.length && !editMode) return;
    const div = document.createElement('div');
    div.className = 'sec';
    div.id = 'sec_'+sec.id;
    div.innerHTML = `
      <div class="sec-hdr">
        <div class="sec-left">
          <span class="sec-label">${sec.label}</span>
          <span class="sec-count">${sec.tools.length} tool${sec.tools.length!==1?'s':''}</span>
        </div>
        <button class="sec-edit-btn" onclick="renameSection('${sec.id}')">✎ Rename</button>
      </div>
      <div class="tool-grid" id="grid_${sec.id}">
        ${sec.tools.map((t,i) => renderCard(t, sec.id, i, sec.color)).join('')}
      </div>`;
    wrap.appendChild(div);
  });
}

function renderCard(tool, secId, idx, secColor){
  const color = secColor==='gold'?'gold':secColor==='rose'?'rose':secColor==='blue'?'blue':'';
  const tag = tool.tag==='daily'?`<div class="tc-tag tag-daily">Daily</div>`:tool.tag==='new'?`<div class="tc-tag tag-new">New</div>`:'';
  const isPinned = state.pinned.includes(tool.file);
  return `<a class="tool-card ${color}" href="${tool.file}" onclick="return handleCardClick(event,'${tool.file}')">
    ${tag}
    <div class="card-editbar">
      <button class="card-pin" title="${isPinned?'Unpin from Quick Links':'Pin to Quick Links'}" onclick="togglePin('${tool.file}');event.stopPropagation();event.preventDefault();">${isPinned?'★':'☆'}</button>
      <button class="card-edit" onclick="editTool('${secId}',${idx});event.stopPropagation();event.preventDefault();">✎</button>
      <button class="card-del" onclick="deleteTool('${secId}',${idx});event.stopPropagation();event.preventDefault();">✕</button>
    </div>
    <div class="tc-icon">${tool.icon||'◆'}</div>
    <div class="tc-name">${tool.name}</div>
    <div class="tc-desc">${tool.desc}</div>
  </a>`;
}

function handleCardClick(e, file){
  if(editMode){ e.preventDefault(); return false; }
  return true;
}

function filterSection(id){
  if(activeFilter === id){ activeFilter = null; }
  else { activeFilter = id; }
  document.getElementById('sinp').value = '';
  renderFilters();
  renderSections(activeFilter);
  document.getElementById('emptySearch').style.display='none';
}

function doSearch(){
  const q = document.getElementById('sinp').value.toLowerCase().trim();
  activeFilter = null;
  renderFilters();
  if(!q){ renderSections(); document.getElementById('emptySearch').style.display='none'; return; }
  const wrap = document.getElementById('sectionsWrap');
  wrap.innerHTML = '';
  let count = 0;
  const div = document.createElement('div');
  div.className = 'sec';
  div.innerHTML = `<div class="sec-hdr"><div class="sec-left"><span class="sec-label">Search Results</span></div></Hdiv><div class="tool-grid" id="grid_search"></div>`;
  wrap.appendChild(div);
  const grid = document.getElementById('grid_search');
  state.sections.forEach(sec => {
    sec.tools.forEach((t,i) => {
      if(t.name.toLowerCase().includes(q)||t.desc.toLowerCase().includes(q)){
        grid.insertAdjacentHTML('beforeend', renderCard(t, sec.id, i, sec.color));
        count++;
      }
    });
  });
  document.getElementById('emptySearch').style.display = count?'none':'block';
}

let editingTool = null; // {secId, idx} when editing an existing card, null when adding new

function submitTool(){
  const icon = document.getElementById('newIcon').value.trim();
  const name = document.getElementById('newName').value.trim();
  const file = document.getElementById('newFile').value.trim();
  const desc = document.getElementById('newDesc').value.trim();
  const secId = document.getElementById('newSection').value;
  if(!name||!file){ toast('Name and filename required.'); return; }
  const sec = state.sections.find(s=>s.id===secId);
  if(!sec){ toast('Section not found.'); return; }

  if(editingTool){
    // pull the tool out of its old section (in case the section was changed)
    const oldSec = state.sections.find(s=>s.id===editingTool.secId);
    const existing = oldSec.tools[editingTool.idx];
    const updated = {...existing, name, file, desc: desc||'', icon: icon||existing.icon||'◆'};
    oldSec.tools.splice(editingTool.idx,1);
    sec.tools.push(updated);
    saveState(); render();
    cancelEditTool();
    toast('Saved — '+name);
    return;
  }

  sec.tools.push({name, file, desc: desc||'', icon: icon||'◆'});
  saveState();
  render();
  document.getElementById('newIcon').value='';
  document.getElementById('newName').value='';
  document.getElementById('newFile').value='';
  document.getElementById('newDesc').value='';
  toast('Tool added — '+name);
}

function editTool(secId, idx){
  const sec = state.sections.find(s=>s.id===secId);
  const t = sec?.tools[idx];
  if(!t) return;
  editingTool = {secId, idx};
  document.getElementById('newIcon').value = t.icon||'';
  document.getElementById('newName').value = t.name;
  document.getElementById('newFile').value = t.file;
  document.getElementById('newDesc').value = t.desc||'';
  populateSectionSelect();
  document.getElementById('newSection').value = secId;
  document.getElementById('addPanelTitle').textContent = 'Editing — '+t.name;
  document.getElementById('addSubmitBtn').textContent = 'Save Changes';
  document.getElementById('cancelEditBtn').style.display = 'inline-block';
  const panel = document.getElementById('addPanel');
  panel.classList.add('open');
  panel.scrollIntoView({behavior:'smooth', block:'center'});
}

function cancelEditTool(){
  editingTool = null;
  document.getElementById('newIcon').value='';
  document.getElementById('newName').value='';
  document.getElementById('newFile').value='';
  document.getElementById('newDesc').value='';
  document.getElementById('addPanelTitle').textContent = 'Add a tool';
  document.getElementById('addSubmitBtn').textContent = 'Add';
  document.getElementById('cancelEditBtn').style.display = 'none';
}

function togglePin(file){
  const idx = state.pinned.indexOf(file);
  if(idx>=0) state.pinned.splice(idx,1);
  else state.pinned.push(file);
  saveState();
  render();
}

function addSection(){
  const name = document.getElementById('newSecName').value.trim();
  if(!name){ toast('Enter a section name.'); return; }
  const id = 'sec_'+Date.now();
  state.sections.push({id, label:name, color:'default', tools:[]});
  saveState();
  render();
  document.getElementById('newSecName').value='';
  populateSectionSelect();
  toast('Section added — '+name);
}

function deleteTool(secId, idx){
  if(!editMode) return;
  const sec = state.sections.find(s=>s.id===secId);
  if(!sec) return;
  const name = sec.tools[idx]?.name||'tool';
  sec.tools.splice(idx,1);
  saveState();
  render();
  toast('Removed — '+name);
}

function renameSection(secId){
  const sec = state.sections.find(s=>s.id===secId);
  if(!sec) return;
  const name = prompt('Rename section:', sec.label);
  if(name&&name.trim()){ sec.label=name.trim(); saveState(); render(); }
}

function setDate(){
  const now=new Date();
  const days=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  const months=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  document.getElementById('datechip').textContent=days[now.getDay()]+' '+now.getDate()+' '+months[now.getMonth()];
}

function exportState(){
  const blob = new Blob([JSON.stringify(state,null,2)],{type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'home-base-'+Date.now()+'.json';
  a.click();
  URL.revokeObjectURL(url);
  toast('Exported — pinned, sections, and tools all included.');
}

function importState(inp){
  const file = inp.files[0]; if(!file) return;
  const r = new FileReader();
  r.onload = e => {
    try{
      const p = JSON.parse(e.target.result);
      if(!p.sections || !Array.isArray(p.sections)) throw new Error('missing sections');
      if(!p.pinned) p.pinned = [];
      state = p;
      saveState();
      render();
      toast('Imported — hub updated.');
    }catch(err){ toast('Import failed — not a valid Home Base export.'); }
  };
  r.readAsText(file);
}

try{if(localStorage.getItem('dante_os_theme')==='light')document.body.classList.add('light');}catch(e){}
setDate();
render();
pullCloud();
</script>
