<meta charset="UTF-8">

<title>Night Calls — dAnTE</title>
<style>
:root{
  --bg:#0a0908;--bg2:#120f0e;--bg3:#1a1614;--bg4:#221d1a;
  --border:#221d1a;--border2:#2e2724;--border3:#3a322e;
  --gold:#c9956b;--gold-dim:#8a5f3e;--gold-glow:rgba(201,149,107,0.1);
  --rose:#dc6496;--rose-dim:#a04870;--rose-glow:rgba(220,100,150,0.1);
  --text:#e8ddd2;--text-dim:#8a7d72;--text-muted:#4a4038;
  --radius:6px;
}
.light{
  --bg:#f5efe6;--bg2:#ede4d8;--bg3:#e3d8c8;--bg4:#d9ccb8;
  --border:#d8cdba;--border2:#c8baa3;--border3:#b8a78d;
  --gold:#8a5f3e;--gold-dim:#b8825a;--gold-glow:rgba(138,95,62,0.08);
  --rose:#a04870;--rose-dim:#c46490;--rose-glow:rgba(160,72,112,0.08);
  --text:#241e16;--text-dim:#665a4c;--text-muted:#a89886;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;-webkit-tap-highlight-color:transparent}
body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;font-size:13px;line-height:1.6;display:flex;flex-direction:column;min-height:100vh}
::-webkit-scrollbar{width:3px}::-webkit-scrollbar-thumb{background:var(--border3);border-radius:2px}

header{flex-shrink:0;background:var(--bg);border-bottom:1px solid var(--border);padding:12px 16px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:50}
.logo{display:flex;flex-direction:column;gap:0;margin-right:auto}
.logo-brand{font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:.22em;color:var(--rose);text-transform:uppercase}
.logo-title{font-family:'Cormorant Garamond',serif;font-size:20px;font-weight:300;color:var(--text);letter-spacing:.04em;line-height:1.1}
.logo-title em{color:var(--rose);font-style:italic}
.hbtn{background:none;border:1px solid var(--border2);border-radius:var(--radius);color:var(--text-dim);font-family:'Inter',sans-serif;font-size:11px;padding:6px 11px;cursor:pointer;transition:all .18s;white-space:nowrap}
.hbtn:hover{border-color:var(--rose);color:var(--rose)}
.hbtn-rose{border-color:var(--rose);color:var(--rose)}
.hbtn-rose:hover{background:var(--rose-glow)}

.controls{padding:12px 16px;display:flex;gap:8px;flex-wrap:wrap;align-items:center;border-bottom:1px solid var(--border);background:var(--bg2);flex-shrink:0;position:sticky;top:57px;z-index:40}
.search-wrap{flex:1;min-width:140px;position:relative}
.search-inp{width:100%;background:var(--bg3);border:1px solid var(--border2);border-radius:var(--radius);color:var(--text);font-family:'Inter',sans-serif;font-size:12px;padding:8px 12px 8px 32px;outline:none;transition:border-color .18s}
.search-inp:focus{border-color:var(--rose)}
.search-inp::placeholder{color:var(--text-muted)}
.search-icon{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--text-muted);font-size:13px;pointer-events:none}
.filter-row{display:flex;gap:5px;flex-wrap:wrap}
.fpill{padding:4px 11px;border-radius:12px;border:1px solid var(--border2);font-size:11px;cursor:pointer;color:var(--text-muted);transition:all .15s;white-space:nowrap;background:transparent}
.fpill:hover{border-color:var(--text-dim);color:var(--text-dim)}
.fpill.active{border-color:var(--rose);color:var(--rose);background:var(--rose-glow)}

.pick-btn{background:var(--rose);border:none;border-radius:var(--radius);color:#1a1416;font-family:'Cormorant Garamond',serif;font-size:15px;font-weight:600;padding:7px 16px;cursor:pointer;transition:all .18s;letter-spacing:.04em;white-space:nowrap}
.pick-btn:hover{background:var(--rose-dim);color:#fff}
.pick-btn:active{transform:scale(.97)}

main{flex:1;padding:14px 16px 80px;max-width:700px;width:100%;margin:0 auto}

.stats-row{display:flex;gap:12px;margin-bottom:16px;flex-wrap:wrap}
.stat{display:flex;flex-direction:column;gap:1px}
.stat-num{font-family:'Cormorant Garamond',serif;font-size:22px;color:var(--rose);line-height:1}
.stat-lbl{font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--text-muted);text-transform:uppercase;letter-spacing:.12em}
.stats-div{width:1px;background:var(--border2);align-self:stretch}

.topics-list{display:flex;flex-direction:column;gap:8px}
.topic-card{background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:13px 14px;display:flex;align-items:flex-start;gap:12px;transition:all .18s;cursor:pointer;position:relative}
.topic-card:hover{border-color:var(--border2)}
.topic-card.discussed{opacity:.55}
.topic-card.discussed .topic-q{text-decoration:line-through;color:var(--text-dim)}
.topic-card.highlighted{border-color:var(--rose);background:var(--rose-glow);animation:pulse .5s ease}
@keyframes pulse{0%{box-shadow:0 0 0 0 rgba(220,100,150,.3)}100%{box-shadow:0 0 0 8px rgba(220,100,150,0)}}

.topic-check{width:20px;height:20px;border:1px solid var(--border3);border-radius:4px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:11px;color:transparent;transition:all .15s;margin-top:1px;cursor:pointer}
.topic-card.discussed .topic-check{background:var(--rose-dim);border-color:var(--rose-dim);color:#1a1416}
.topic-card.discussed .topic-check::after{content:'✓'}
.topic-body{flex:1;min-width:0}
.topic-q{font-size:13px;color:var(--text);line-height:1.5;font-weight:500;margin-bottom:4px}
.topic-meta{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.topic-cat{display:inline-flex;align-items:center;gap:3px;padding:2px 8px;border-radius:10px;font-size:10px;font-family:'JetBrains Mono',monospace;letter-spacing:.06em;border:1px solid var(--border2);color:var(--text-muted)}
.topic-cat-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.topic-discussed-tag{font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--rose-dim);letter-spacing:.1em;text-transform:uppercase}
.topic-notes-preview{font-size:11px;color:var(--text-dim);font-style:italic;margin-top:4px;line-height:1.5}

.topic-actions{display:flex;gap:4px;opacity:0;transition:opacity .15s;flex-shrink:0}
.topic-card:hover .topic-actions{opacity:1}
.tact{background:none;border:none;color:var(--text-muted);cursor:pointer;font-size:12px;padding:4px 6px;border-radius:3px;transition:all .15s}
.tact:hover{color:var(--rose);background:var(--rose-glow)}

.empty{text-align:center;padding:60px 20px;color:var(--text-muted)}
.empty-icon{font-size:40px;opacity:.3;margin-bottom:12px}
.empty-title{font-family:'Cormorant Garamond',serif;font-size:18px;color:var(--text-dim);margin-bottom:6px}
.empty-sub{font-size:12px;color:var(--text-muted);line-height:1.7}

.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.82);z-index:200;display:flex;align-items:flex-end;justify-content:center;padding:0;backdrop-filter:blur(8px)}
.modal-overlay.hidden{display:none}
.modal{background:var(--bg2);border:1px solid var(--border2);border-radius:16px 16px 0 0;padding:20px 18px 32px;width:100%;max-width:600px;max-height:88vh;overflow-y:auto;display:flex;flex-direction:column;gap:13px}
.modal-handle{width:36px;height:3px;background:var(--border3);border-radius:2px;margin:0 auto -4px}
.modal-title{font-family:'Cormorant Garamond',serif;font-size:19px;font-weight:300;color:var(--text);line-height:1.4}
.field-label{font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--text-muted);margin-bottom:5px;display:block}
.inp{width:100%;background:var(--bg3);border:1px solid var(--border2);border-radius:var(--radius);color:var(--text);font-family:'Inter',sans-serif;font-size:12px;padding:9px 12px;outline:none;transition:border-color .18s}
.inp:focus{border-color:var(--rose)}
.inp::placeholder{color:var(--text-muted)}
textarea.inp{resize:vertical;min-height:80px;line-height:1.5}
.modal-actions{display:flex;gap:8px;justify-content:flex-end;padding-top:4px}
.btn{display:inline-flex;align-items:center;gap:5px;padding:8px 14px;border-radius:var(--radius);border:1px solid var(--border2);background:transparent;color:var(--text-dim);font-family:'Inter',sans-serif;font-size:12px;cursor:pointer;transition:all .18s}
.btn:hover{border-color:var(--rose);color:var(--rose)}
.btn-solid{background:var(--rose);border-color:var(--rose);color:#1a1416;font-weight:500}
.btn-solid:hover{opacity:.9}
.btn-red{border-color:#c0392b;color:#c0392b}

.fab{position:fixed;bottom:24px;right:20px;width:52px;height:52px;border-radius:50%;background:var(--rose);border:none;color:#1a1416;font-size:24px;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 20px rgba(220,100,150,.3);transition:all .18s;z-index:60}
.fab:hover{transform:scale(1.06)}

.toast{position:fixed;bottom:88px;left:50%;transform:translateX(-50%) translateY(6px);background:var(--bg3);border:1px solid var(--rose-dim);color:var(--rose);font-family:'JetBrains Mono',monospace;font-size:11px;padding:9px 18px;border-radius:20px;z-index:400;opacity:0;transition:all .25s;pointer-events:none;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

.sort-select{background:var(--bg3);border:1px solid var(--border2);border-radius:var(--radius);color:var(--text-dim);font-family:'JetBrains Mono',monospace;font-size:10px;padding:6px 9px;outline:none;cursor:pointer;letter-spacing:.06em}
.sort-select:focus{border-color:var(--rose)}
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-brand">dAnTE · For T</div>
    <div class="logo-title">Night <em>Calls</em></div>
  </div>
  <button class="hbtn" id="syncStatus" style="cursor:default;">—</button>
  <button class="hbtn" onclick="toggleTheme()">☀︎</button>
  <button class="hbtn" onclick="exportData()">⬇</button>
  <button class="hbtn" onclick="importData()">⬆</button>
  <button class="hbtn hbtn-rose" onclick="saveData()">Save</button>
</header>

<div class="controls">
  <div class="search-wrap">
    <span class="search-icon">🔍</span>
    <input class="search-inp" id="searchInp" placeholder="Search topics..." oninput="renderList()">
  </div>
  <button class="pick-btn" onclick="pickRandom()" title="Pick a topic for tonight">✦ Tonight's topic</button>
  <div class="filter-row" id="filterRow"></div>
  <select class="sort-select" onchange="currentSort=this.value;renderList()">
    <option value="default">Default order</option>
    <option value="az">A–Z</option>
    <option value="undiscussed">Undiscussed first</option>
    <option value="discussed">Discussed first</option>
  </select>
</div>

<main>
  <div class="stats-row" id="statsRow"></div>
  <div class="topics-list" id="topicsList"></div>
  <div class="empty hidden" id="emptyState">
    <div class="empty-icon">♡</div>
    <div class="empty-title">No topics found</div>
    <div class="empty-sub">Try a different search or filter.</div>
  </div>
</main>

<button class="fab" onclick="openAddModal()" title="Add topic">+</button>

<div class="modal-overlay hidden" id="topicModal">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title" id="modalTitle">Add a topic</div>
    <div>
      <label class="field-label">The talking point</label>
      <textarea class="inp" id="m-text" placeholder="Write the question or topic..."></textarea>
    </div>
    <div>
      <label class="field-label">Category</label>
      <div class="filter-row" id="catGrid" style="margin-bottom:0"></div>
    </div>
    <div>
      <label class="field-label">Notes from the conversation <span style="font-size:9px;color:var(--text-muted);text-transform:none;letter-spacing:0">(optional)</span></label>
      <textarea class="inp" id="m-notes" placeholder="What came up? Anything worth remembering..."></textarea>
    </div>
    <div class="modal-actions">
      <button class="btn btn-red" id="deleteBtn" onclick="deleteTopic()" style="display:none;margin-right:auto">Delete</button>
      <button class="btn" onclick="closeModal()">Cancel</button>
      <button class="btn btn-solid" onclick="saveTopic()">Save</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>
<input type="file" id="importFile" accept=".json" style="display:none" onchange="handleImport(event)">

<script>

function renderAll(){renderStats();renderFilters();renderList()}

function renderStats(){
  const total=topics.length;
  const disc=topics.filter(t=>t.discussed).length;
  document.getElementById('statsRow').innerHTML=`
    <div class="stat"><div class="stat-num">${total}</div><div class="stat-lbl">Topics</div></div>
    <div class="stats-div"></div>
    <div class="stat"><div class="stat-num">${total-disc}</div><div class="stat-lbl">Not yet</div></div>
    <div class="stats-div"></div>
    <div class="stat"><div class="stat-num">${disc}</div><div class="stat-lbl">Discussed</div></div>`;
}

function renderFilters(){
  const row=document.getElementById('filterRow');
  row.innerHTML='';
  const all=document.createElement('div');
  all.className='fpill'+(selectedCat==='all'?' active':'');
  all.textContent='All';
  all.onclick=()=>{selectedCat='all';renderFilters();renderList()};
  row.appendChild(all);
  categories.forEach(c=>{
    if(!topics.find(t=>t.cat===c.id)) return;
    const p=document.createElement('div');
    p.className='fpill'+(selectedCat===c.id?' active':'');
    p.textContent=c.label;
    p.onclick=()=>{selectedCat=c.id;renderFilters();renderList()};
    row.appendChild(p);
  });
}

function getFiltered(){
  const q=document.getElementById('searchInp').value.trim().toLowerCase();
  let list=topics.filter(t=>{
    if(selectedCat!=='all'&&t.cat!==selectedCat) return false;
    if(q&&!t.q.toLowerCase().includes(q)) return false;
    return true;
  });
  if(currentSort==='az') list=[...list].sort((a,b)=>a.q.localeCompare(b.q));
  else if(currentSort==='undiscussed') list=[...list].sort((a,b)=>(a.discussed?1:0)-(b.discussed?1:0));
  else if(currentSort==='discussed') list=[...list].sort((a,b)=>(b.discussed?1:0)-(a.discussed?1:0));
  return list;
}

function renderList(){
  const list=document.getElementById('topicsList');
  const empty=document.getElementById('emptyState');
  const filtered=getFiltered();
  list.innerHTML='';
  if(!filtered.length){empty.classList.remove('hidden');return}
  empty.classList.add('hidden');
  filtered.forEach(t=>{
    const cat=categories.find(c=>c.id===t.cat);
    const card=document.createElement('div');
    card.className='topic-card'+(t.discussed?' discussed':'');
    card.id='card-'+t.id;
    card.innerHTML=`
      <div class="topic-check" onclick="toggleDiscussed(event,'${t.id}')"></div>
      <div class="topic-body" onclick="openEdit('${t.id}')">
        <div class="topic-q">${esc(t.q)}</div>
        <div class="topic-meta">
          ${cat?`<div class="topic-cat"><div class="topic-cat-dot" style="background:${cat.color}"></div>${cat.label}</div>`:''}
          ${t.discussed?`<div class="topic-discussed-tag">Discussed</div>`:''}
        </div>
        ${t.notes?`<div class="topic-notes-preview">${esc(t.notes)}</div>`:''}
      </div>
      <div class="topic-actions">
        <button class="tact" onclick="event.stopPropagation();openEdit('${t.id}')">✎</button>
        <button class="tact" onclick="event.stopPropagation();confirmDelete('${t.id}')">✕</button>
      </div>`;
    list.appendChild(card);
  });
  renderStats();
}

function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}

function toggleDiscussed(e,id){
  e.stopPropagation();
  const t=topics.find(x=>x.id===id); if(!t) return;
  t.discussed=!t.discussed;
  renderList(); saveData();
}

function pickRandom(){
  const pool=getFiltered().filter(t=>!t.discussed);
  if(!pool.length){
    const all=getFiltered();
    if(!all.length){showToast('No topics found');return}
    const pick=all[Math.floor(Math.random()*all.length)];
    highlight(pick.id,'All topics covered here — pick again');
    return;
  }
  const pick=pool[Math.floor(Math.random()*pool.length)];
  highlight(pick.id,'Tonight\'s topic ♡');
}

function highlight(id,msg){
  document.querySelectorAll('.topic-card').forEach(c=>c.classList.remove('highlighted'));
  const card=document.getElementById('card-'+id);
  if(card){
    card.classList.add('highlighted');
    card.scrollIntoView({behavior:'smooth',block:'center'});
    setTimeout(()=>card.classList.remove('highlighted'),3500);
  }
  showToast(msg);
}

function openAddModal(){
  editId=null;
  document.getElementById('modalTitle').textContent='Add a topic';
  document.getElementById('deleteBtn').style.display='none';
  document.getElementById('m-text').value='';
  document.getElementById('m-notes').value='';
  mSelectedCat=null;
  buildCatGrid();
  document.getElementById('topicModal').classList.remove('hidden');
}

function openEdit(id){
  const t=topics.find(x=>x.id===id); if(!t) return;
  editId=id;
  document.getElementById('modalTitle').textContent=t.q;
  document.getElementById('deleteBtn').style.display='';
  document.getElementById('m-text').value=t.q;
  document.getElementById('m-notes').value=t.notes||'';
  mSelectedCat=t.cat;
  buildCatGrid();
  document.getElementById('topicModal').classList.remove('hidden');
}

function buildCatGrid(){
  const grid=document.getElementById('catGrid');
  grid.innerHTML='';
  categories.forEach(c=>{
    const div=document.createElement('div');
    div.className='fpill'+(mSelectedCat===c.id?' active':'');
    div.textContent=c.label;
    div.onclick=()=>{mSelectedCat=mSelectedCat===c.id?null:c.id;buildCatGrid()};
    grid.appendChild(div);
  });
}

function saveTopic(){
  const q=document.getElementById('m-text').value.trim();
  if(!q){showToast('Write the topic');return}
  const data={
    id:editId||uid(),
    q,
    cat:mSelectedCat,
    notes:document.getElementById('m-notes').value.trim(),
    discussed:editId?(topics.find(x=>x.id===editId)||{}).discussed||false:false,
  };
  if(editId) topics=topics.map(x=>x.id===editId?data:x);
  else topics.unshift(data);
  closeModal(); renderAll(); saveData(); showToast('Saved');
}

function deleteTopic(){
  if(!confirm('Remove this topic?')) return;
  topics=topics.filter(x=>x.id!==editId);
  closeModal(); renderAll(); saveData(); showToast('Removed');
}
function confirmDelete(id){
  if(!confirm('Remove this topic?')) return;
  topics=topics.filter(x=>x.id!==id);
  renderAll(); saveData();
}
function closeModal(){document.getElementById('topicModal').classList.add('hidden')}
document.getElementById('topicModal').addEventListener('click',e=>{
  if(e.target===document.getElementById('topicModal')) closeModal();
});

function saveData(){
  localStorage.setItem('couplesPool',JSON.stringify({topics,categories}));
  showToast('Saved');
  scheduleCloudPush();
}

function setSyncStatus(msg) { const el=document.getElementById('syncStatus'); if(el) el.textContent=msg; }

async function pullCloud() {
  setSyncStatus('Syncing…');
  try {
    const ctrl = new AbortController();
    const timeout = setTimeout(()=>ctrl.abort(), 6000);
    const res = await fetch(`${SYNC_URL}?tool=eq.${SYNC_TOOL}&select=data,updated_at`, {
      headers: { 'apikey': SYNC_ANON_KEY, 'Authorization': 'Bearer ' + SYNC_ANON_KEY, 'x-sync-key': SYNC_KEY },
      signal: ctrl.signal
    });
    clearTimeout(timeout);
    if(!res.ok) { setSyncStatus('Sync error'); return; }
    const rows = await res.json();
    if(!rows.length) { setSyncStatus('Synced'); pushCloudNow(); return; }
    const remote = rows[0];
    const localSyncedAt = localStorage.getItem(SYNC_TOOL + '_synced_at');
    if(!localSyncedAt || new Date(remote.updated_at) > new Date(localSyncedAt)) {
      const d = remote.data;
      if(d.topics) topics=d.topics;
      if(d.categories) categories=d.categories;
      localStorage.setItem('couplesPool', JSON.stringify({topics,categories}));
      localStorage.setItem(SYNC_TOOL + '_synced_at', remote.updated_at);
    }
    setSyncStatus('Synced');
  } catch(e) { setSyncStatus('Offline'); }
}

let cloudPushTimer = null;
function scheduleCloudPush() {
  clearTimeout(cloudPushTimer);
  cloudPushTimer = setTimeout(pushCloudNow, 1500);
}

async function pushCloudNow() {
  setSyncStatus('Syncing…');
  try {
    const res = await fetch(`${SYNC_URL}?on_conflict=tool`, {
      method: 'POST',
      headers: { 'apikey': SYNC_ANON_KEY, 'Authorization': 'Bearer ' + SYNC_ANON_KEY, 'x-sync-key': SYNC_KEY, 'Content-Type': 'application/json', 'Prefer': 'resolution=merge-duplicates,return=representation' },
      body: JSON.stringify([{ tool: SYNC_TOOL, data: {topics,categories} }])
    });
    if(!res.ok) { setSyncStatus('Sync error'); return; }
    const rows = await res.json();
    if(rows.length) localStorage.setItem(SYNC_TOOL + '_synced_at', rows[0].updated_at);
    setSyncStatus('Synced');
  } catch(e) { setSyncStatus('Offline'); }
}
function loadData(){
  const raw=localStorage.getItem('couplesPool');
  if(raw){try{const d=JSON.parse(raw);if(d.topics)topics=d.topics;if(d.categories&&d.categories.length)categories=d.categories;}catch(e){}}
}
function exportData(){
  const blob=new Blob([JSON.stringify({topics,categories},null,2)],{type:'application/json'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);
  a.download='night-calls.json';a.click();showToast('Exported');
}
function importData(){document.getElementById('importFile').click()}
function handleImport(e){
  const file=e.target.files[0];if(!file)return;
  const r=new FileReader();
  r.onload=ev=>{try{const d=JSON.parse(ev.target.result);if(d.topics)topics=d.topics;if(d.categories)categories=d.categories;renderAll();showToast('Imported');}catch(err){showToast('Import failed')}};
  r.readAsText(file);e.target.value='';
}
