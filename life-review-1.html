<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@300;400&display=swap" rel="stylesheet">
<title>Life Review — dAnTE</title>
<style>
:root{
  --bg:#0a0a0a;--bg2:#111;--bg3:#181818;--bg4:#1e1e1e;
  --border:#1e1e1e;--border2:#2a2a2a;--border3:#363636;
  --gold:#c9a84c;--gold-dim:#7a5f28;--gold-glow:rgba(201,168,76,0.08);
  --text:#ddd8ce;--text-dim:#777;--text-muted:#404040;
  --red:#c0392b;--green:#4caf7d;--radius:5px;
}
.light{
  --bg:#f2ede6;--bg2:#eae4dc;--bg3:#e0d9d0;--bg4:#d6cfc5;
  --border:#d8d1c8;--border2:#c8c1b7;--border3:#b8b0a5;
  --gold:#8a6020;--gold-dim:#b8902a;--gold-glow:rgba(138,96,32,0.07);
  --text:#1a1714;--text-dim:#666;--text-muted:#aaa;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;-webkit-tap-highlight-color:transparent}
body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;font-size:13px;line-height:1.5;display:flex;flex-direction:column;min-height:100vh}
::-webkit-scrollbar{width:3px}::-webkit-scrollbar-thumb{background:var(--border3);border-radius:2px}

header{flex-shrink:0;background:var(--bg);border-bottom:1px solid var(--border);padding:11px 16px;display:flex;align-items:center;gap:8px;position:sticky;top:0;z-index:50}
.logo{display:flex;flex-direction:column;gap:0;margin-right:auto}
.logo-brand{font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:.22em;color:var(--gold);text-transform:uppercase}
.logo-title{font-family:'Cormorant Garamond',serif;font-size:19px;font-weight:300;color:var(--text);letter-spacing:.04em;line-height:1.1}
.logo-title em{color:var(--gold);font-style:italic}
.hbtn{background:none;border:1px solid var(--border2);border-radius:var(--radius);color:var(--text-dim);font-family:'Inter',sans-serif;font-size:11px;padding:5px 10px;cursor:pointer;transition:all .18s;white-space:nowrap}
.hbtn:hover{border-color:var(--gold);color:var(--gold)}

.tab-bar{flex-shrink:0;display:flex;background:var(--bg2);border-bottom:1px solid var(--border);padding:0 16px;gap:0;overflow-x:auto}
.tab{padding:9px 13px;font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:.09em;text-transform:uppercase;color:var(--text-muted);cursor:pointer;border-bottom:2px solid transparent;transition:all .18s;white-space:nowrap;flex-shrink:0}
.tab:hover{color:var(--text-dim)}
.tab.active{color:var(--gold);border-bottom-color:var(--gold)}

main{flex:1;padding:14px 16px 60px;max-width:680px;width:100%;margin:0 auto}
.page{display:none}
.page.active{display:block}

.section-label{font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--text-muted);letter-spacing:.14em;text-transform:uppercase;margin-bottom:6px;display:block}
.page-head{margin-bottom:16px}
.page-title{font-family:'Cormorant Garamond',serif;font-size:19px;font-weight:300;color:var(--text);letter-spacing:.03em}
.page-sub{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--text-muted);margin-top:3px}
.page-note{font-size:11px;color:var(--text-muted);font-style:italic;margin-top:8px;border-left:2px solid var(--border2);padding-left:10px;line-height:1.6}

.card{background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:13px;margin-bottom:9px}
.card:hover{border-color:var(--border2)}
.empty-note{font-size:11px;color:var(--text-muted);font-style:italic;padding:10px 2px}

.dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;display:inline-block}

.btn{background:var(--gold-glow);border:1px solid var(--gold-dim);border-radius:var(--radius);color:var(--gold);font-family:'JetBrains Mono',monospace;font-size:10px;padding:8px 14px;cursor:pointer;letter-spacing:.06em;transition:all .18s}
.btn:hover{background:var(--gold);color:#000}
.btn-main{background:var(--green);border:none;color:#fff;font-family:'Cormorant Garamond',serif;font-size:15px;font-weight:600;padding:10px 18px;letter-spacing:.03em;border-radius:var(--radius);cursor:pointer;transition:all .18s}
.btn-main:hover{opacity:.9}
.btn-row{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}
.action-row{display:flex;gap:12px;margin-top:10px;flex-wrap:wrap}
.action-btn{font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--text-muted);background:none;border:none;cursor:pointer;letter-spacing:.08em;text-transform:uppercase;padding:2px 0}
.action-btn:hover{color:var(--gold)}
.action-btn.red:hover{color:var(--red)}

.inp,.sel,textarea.inp{width:100%;background:var(--bg3);border:1px solid var(--border2);border-radius:var(--radius);color:var(--text);font-family:'Inter',sans-serif;font-size:12px;padding:8px 11px;outline:none;transition:border-color .18s}
.inp:focus,.sel:focus,textarea.inp:focus{border-color:var(--gold-dim)}
.inp::placeholder{color:var(--text-muted)}
textarea.inp{resize:vertical;min-height:64px;line-height:1.5}
.field{margin-bottom:11px}
.field-label{font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--text-muted);letter-spacing:.1em;text-transform:uppercase;margin-bottom:5px;display:block}
.field-row{display:flex;gap:8px}
.field-row .field{flex:1}

/* rating scale */
.rate-row{display:flex;gap:4px;flex-wrap:wrap}
.rate-btn{width:26px;height:26px;border:1px solid var(--border2);border-radius:4px;background:var(--bg3);color:var(--text-dim);font-family:'JetBrains Mono',monospace;font-size:11px;cursor:pointer;transition:all .15s;display:flex;align-items:center;justify-content:center}
.rate-btn:hover{border-color:var(--gold-dim)}
.rate-btn.sel{background:var(--gold-dim);border-color:var(--gold-dim);color:#000;font-weight:600}

/* choice pills */
.choice-row{display:flex;gap:6px;flex-wrap:wrap}
.choice-pill{border:1px solid var(--border2);border-radius:20px;background:var(--bg3);color:var(--text-dim);font-size:11px;padding:6px 13px;cursor:pointer;transition:all .15s}
.choice-pill:hover{border-color:var(--gold-dim)}
.choice-pill.sel{background:var(--gold-glow);border-color:var(--gold);color:var(--gold)}

/* checklist */
.chk-row{display:flex;align-items:center;gap:8px;margin-bottom:5px}
.chk-box{width:17px;height:17px;border:1px solid var(--border3);border-radius:4px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:10px;color:transparent;cursor:pointer;transition:all .15s}
.chk-box.on{background:var(--gold-dim);border-color:var(--gold-dim);color:var(--gold)}
.chk-box.on::after{content:'✓'}

/* question block (collapsible, category grouped) */
.cat-group{margin-bottom:14px}
.cat-group-head{display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid var(--border);margin-bottom:9px}
.cat-group-title{font-family:'Cormorant Garamond',serif;font-size:15px;font-weight:600;color:var(--text)}
.cat-group-avg{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--text-muted);margin-left:auto}
.q-block{background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:12px 13px;margin-bottom:8px}
.q-prompt{font-size:13px;color:var(--text);margin-bottom:9px;line-height:1.5}
.q-notes{margin-top:8px}

/* goal cards */
.goal-card{background:var(--bg2);border:1px solid var(--border);border-radius:8px;margin-bottom:9px;overflow:hidden}
.goal-card.status-done{opacity:.5}
.goal-head{display:flex;align-items:flex-start;gap:9px;padding:11px 12px;cursor:pointer}
.goal-head:hover{background:var(--gold-glow)}
.goal-title{font-size:13px;font-weight:500;color:var(--text);flex:1;min-width:0}
.goal-card.status-done .goal-title{text-decoration:line-through;color:var(--text-muted)}
.goal-meta{display:flex;gap:7px;align-items:center;flex-wrap:wrap;margin-top:4px}
.goal-tag{font-family:'JetBrains Mono',monospace;font-size:8px;letter-spacing:.06em;text-transform:uppercase;border:1px solid var(--border2);border-radius:3px;padding:1px 5px;color:var(--text-muted)}
.goal-tag.priority-high{color:var(--red);border-color:var(--red)}
.goal-tag.priority-med{color:var(--gold);border-color:var(--gold-dim)}
.goal-chevron{font-size:9px;color:var(--text-muted);flex-shrink:0;transition:transform .2s}
.goal-card.expanded .goal-chevron{transform:rotate(180deg);color:var(--gold)}
.goal-body{display:none;padding:0 12px 13px;border-top:1px solid var(--border)}
.goal-card.expanded .goal-body{display:block;padding-top:11px}
.progress-wrap{height:4px;background:var(--border2);border-radius:2px;overflow:hidden;margin-top:8px}
.progress-bar{height:100%;background:var(--gold);border-radius:2px;transition:width .4s}
.subtask-row{display:flex;align-items:center;gap:8px;padding:5px 0}
.subtask-text{flex:1;font-size:12px;color:var(--text)}
.subtask-row.done .subtask-text{text-decoration:line-through;color:var(--text-muted)}

/* category manager */
.cat-row{display:flex;align-items:center;gap:8px;padding:8px 10px;background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:6px}
.cat-name{flex:1;font-size:12px;color:var(--text);outline:none}
.color-swatch{width:16px;height:16px;border-radius:50%;flex-shrink:0;cursor:pointer;border:1px solid var(--border3)}

/* dashboard */
.dash-stat{display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-bottom:1px solid var(--border)}
.dash-stat:last-child{border-bottom:none}
.dash-stat-label{font-size:12px;color:var(--text-dim)}
.dash-stat-val{font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--gold)}
.snapshot-row{display:flex;align-items:center;gap:9px;padding:7px 0}
.snapshot-bar-wrap{flex:1;height:6px;background:var(--border2);border-radius:3px;overflow:hidden}
.snapshot-bar{height:100%;border-radius:3px}
.snapshot-val{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--text-muted);width:30px;text-align:right;flex-shrink:0}

/* trend spark */
.spark-wrap{margin-top:8px}
svg.spark{width:100%;height:56px;display:block}

/* insights */
.insight-box{background:var(--bg3);border-left:2px solid var(--gold-dim);border-radius:4px;padding:10px 12px;margin-top:10px;font-size:12px;line-height:1.6;color:var(--text-dim)}
.insight-goal-sugg{display:flex;align-items:center;gap:8px;margin-top:6px;padding:6px 0}

/* modal */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);display:none;align-items:flex-start;justify-content:center;z-index:100;padding:40px 16px;overflow-y:auto}
.modal-overlay.show{display:flex}
.modal-box{background:var(--bg2);border:1px solid var(--border2);border-radius:10px;padding:18px;max-width:480px;width:100%}
.modal-title{font-family:'Cormorant Garamond',serif;font-size:17px;color:var(--text);margin-bottom:12px}

.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(10px);background:var(--gold);color:#000;font-family:'JetBrains Mono',monospace;font-size:11px;padding:9px 18px;border-radius:20px;opacity:0;pointer-events:none;transition:all .25s;z-index:200}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

@media print{
  header,.tab-bar,.btn-row,.action-row,.hbtn{display:none!important}
  body{background:#fff;color:#111}
  main{max-width:100%}
}
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-brand">dAnTE</div>
    <div class="logo-title">Life <em>Review</em></div>
  </div>
  <button class="hbtn" id="syncStatus" style="cursor:default;">—</button>
  <button class="hbtn" onclick="toggleTheme()">◐</button>
  <button class="hbtn" onclick="exportJSON()">Export</button>
  <button class="hbtn" onclick="document.getElementById('importFile').click()">Import</button>
</header>
<input type="file" id="importFile" accept=".json" style="display:none" onchange="handleImport(event)">

<div class="tab-bar">
  <div class="tab active" onclick="switchTab('dashboard')">Dashboard</div>
  <div class="tab" onclick="switchTab('monthly')">Monthly</div>
  <div class="tab" onclick="switchTab('weekly')">Weekly</div>
  <div class="tab" onclick="switchTab('goals')">Goals</div>
  <div class="tab" onclick="switchTab('history')">History</div>
  <div class="tab" onclick="switchTab('templates')">Templates</div>
  <div class="tab" onclick="switchTab('settings')">Settings</div>
</div>

<main>
  <div class="page active" id="page-dashboard"></div>
  <div class="page" id="page-monthly"></div>
  <div class="page" id="page-weekly"></div>
  <div class="page" id="page-goals"></div>
  <div class="page" id="page-history"></div>
  <div class="page" id="page-templates"></div>
  <div class="page" id="page-settings"></div>
</main>

<div class="modal-overlay" id="goalModalOverlay">
  <div class="modal-box" id="goalModalBox"></div>
</div>

<div id="toast" class="toast"></div>

<script>
// ── HELPERS ───────────────────────────────────────────────
function uid(){return Math.random().toString(36).slice(2,9)}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
function pad(n){return String(n).padStart(2,'0')}
function dateKey(d){return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate())}
function monthKey(d){return d.getFullYear()+'-'+pad(d.getMonth()+1)}
function todayKey(){return dateKey(new Date())}
function todayMonthKey(){return monthKey(new Date())}
const MONTHS=['January','February','March','April','May','June','July','August','September','October','November','December'];
function monthLabel(mk){const [y,m]=mk.split('-');return MONTHS[parseInt(m)-1]+' '+y}
function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2000)}

// ── DEFAULT DATA ──────────────────────────────────────────
const DEFAULT_CATEGORIES=[
  {id:'health',name:'Health',color:'#4caf7d'},
  {id:'career',name:'Career',color:'#c9a84c'},
  {id:'relationships',name:'Relationships',color:'#c0567a'},
  {id:'finance',name:'Finance',color:'#5b8fc9'},
  {id:'growth',name:'Personal Growth',color:'#a678d1'},
  {id:'recreation',name:'Recreation',color:'#d18a4c'},
  {id:'home',name:'Home',color:'#7a9a9e'},
  {id:'faith',name:'Faith',color:'#b8902a'},
  {id:'mental',name:'Mental & Emotional',color:'#7a8fd1'},
  {id:'community',name:'Community & Social',color:'#d15b8f'},
  {id:'creativity',name:'Creativity',color:'#5bc9a0'},
  {id:'contribution',name:'Contribution & Legacy',color:'#c97a4c'}
];

// Generates a consistent 7-question set per category — rating, reflection,
// a win, a setback, a progress check, a habit checklist, and a next action.
// Kept as a generator (rather than 84 hand-written questions) so it's easy
// to extend per category later from the Templates tab.
function genCategoryQuestions(cat){
  const n=cat.name.toLowerCase();
  return [
    {id:uid(),categoryId:cat.id,type:'rating',prompt:`Rate your ${n} this month (1–10).`,required:true},
    {id:uid(),categoryId:cat.id,type:'longtext',prompt:`What went well in ${n} this month, and what didn't?`,required:false},
    {id:uid(),categoryId:cat.id,type:'shorttext',prompt:`One specific highlight or win in ${n} this month.`,required:false},
    {id:uid(),categoryId:cat.id,type:'shorttext',prompt:`One specific challenge or setback in ${n} this month.`,required:false},
    {id:uid(),categoryId:cat.id,type:'choice',prompt:`Did you make progress toward your ${n} goals this month?`,options:['Yes','No','Partially'],required:false},
    {id:uid(),categoryId:cat.id,type:'checklist',prompt:`Which habits or practices did you keep up with in ${n} this month?`,options:['','',''],required:false},
    {id:uid(),categoryId:cat.id,type:'shorttext',prompt:`One concrete action for ${n} next month.`,required:false}
  ];
}
function defaultMonthlyTemplate(){
  return [
    {id:'health-1',categoryId:'health',type:'rating',prompt:'Rate your physical health this month (1–10).',required:true},
    {id:'health-2',categoryId:'health',type:'rating',prompt:'Rate your energy levels this month (1–10).',required:false},
    {id:'health-3',categoryId:'health',type:'longtext',prompt:'What did your body ask for this month that you gave it — or didn\'t?',required:false},
    {id:'health-4',categoryId:'health',type:'checklist',prompt:'Which of these did you keep up consistently?',options:['Sleep 7+ hours','Regular movement or exercise','Balanced meals','Hydration','Medical or dental checkups'],required:false},
    {id:'health-5',categoryId:'health',type:'shorttext',prompt:'Any symptom, pain, or warning sign you\'ve been ignoring?',required:false},
    {id:'health-6',categoryId:'health',type:'choice',prompt:'How would you describe your relationship with food this month?',options:['Nourishing','Neutral','Neglected','Struggled'],required:false},
    {id:'health-7',categoryId:'health',type:'shorttext',prompt:'One health habit to build in the next 30 days.',required:false},
    {id:'career-1',categoryId:'career',type:'rating',prompt:'Rate your sense of career momentum this month (1–10).',required:true},
    {id:'career-2',categoryId:'career',type:'longtext',prompt:'What did you actually produce or ship this month — not tasks, outcomes?',required:false},
    {id:'career-3',categoryId:'career',type:'shorttext',prompt:'What skill got sharper this month, even slightly?',required:false},
    {id:'career-4',categoryId:'career',type:'choice',prompt:'Did this month move you closer to the work you actually want to be doing?',options:['Yes, clearly','Somewhat','Sideways','Further away'],required:false},
    {id:'career-5',categoryId:'career',type:'longtext',prompt:'What decision at work or in Dante Craft are you avoiding?',required:false},
    {id:'career-6',categoryId:'career',type:'rating',prompt:'Rate how aligned your daily work is with your 10-year vision (1–10).',required:false},
    {id:'career-7',categoryId:'career',type:'shorttext',prompt:'One thing to stop doing next month to make room for what matters.',required:false},
    {id:'relationships-1',categoryId:'relationships',type:'rating',prompt:'Rate how connected you felt to the people closest to you this month (1–10).',required:true},
    {id:'relationships-2',categoryId:'relationships',type:'longtext',prompt:'Describe a moment this month you felt truly seen, or truly present with someone.',required:false},
    {id:'relationships-3',categoryId:'relationships',type:'shorttext',prompt:'Who did you neglect this month, even unintentionally?',required:false},
    {id:'relationships-4',categoryId:'relationships',type:'choice',prompt:'Are you initiating connection this month, or mostly waiting to be approached?',options:['Mostly initiating','Balanced','Mostly waiting'],required:false},
    {id:'relationships-5',categoryId:'relationships',type:'longtext',prompt:'Is there a repair or conversation you\'ve been putting off with someone?',required:false},
    {id:'relationships-6',categoryId:'relationships',type:'shorttext',prompt:'One relationship you want more of next month.',required:false},
    {id:'finance-1',categoryId:'finance',type:'rating',prompt:'Rate your sense of financial control this month (1–10).',required:true},
    {id:'finance-2',categoryId:'finance',type:'choice',prompt:'Did you stick to your budget this month?',options:['Yes','Mostly','No'],required:false},
    {id:'finance-3',categoryId:'finance',type:'shorttext',prompt:'Biggest financial win this month.',required:false},
    {id:'finance-4',categoryId:'finance',type:'shorttext',prompt:'Biggest financial leak or regret this month.',required:false},
    {id:'finance-5',categoryId:'finance',type:'longtext',prompt:'What did money buy you this month that actually mattered — and what didn\'t?',required:false},
    {id:'finance-6',categoryId:'finance',type:'rating',prompt:'Rate your progress toward your savings or investment target this month (1–10).',required:false},
    {id:'finance-7',categoryId:'finance',type:'shorttext',prompt:'One number you should know but don\'t — a balance, a spend rate, a net figure.',required:false},
    {id:'finance-8',categoryId:'finance',type:'shorttext',prompt:'One financial decision to make differently next month.',required:false},
    {id:'growth-1',categoryId:'growth',type:'rating',prompt:'Rate your personal growth this month (1–10).',required:true},
    {id:'growth-2',categoryId:'growth',type:'longtext',prompt:'What did you learn this month that changed how you think, not just what you know?',required:false},
    {id:'growth-3',categoryId:'growth',type:'shorttext',prompt:'What book, conversation, or experience stretched you this month?',required:false},
    {id:'growth-4',categoryId:'growth',type:'choice',prompt:'Did you spend more time consuming or creating this month?',options:['Mostly creating','Balanced','Mostly consuming'],required:false},
    {id:'growth-5',categoryId:'growth',type:'longtext',prompt:'Where did you play it safe this month when you could have stretched?',required:false},
    {id:'growth-6',categoryId:'growth',type:'rating',prompt:'Rate how much you practiced, versus just studied, this month (1–10).',required:false},
    {id:'growth-7',categoryId:'growth',type:'shorttext',prompt:'One measurable target for next month.',required:false},
    {id:'recreation-1',categoryId:'recreation',type:'rating',prompt:'Rate your rest and recreation this month (1–10).',required:true},
    {id:'recreation-2',categoryId:'recreation',type:'shorttext',prompt:'What did you do purely for enjoyment, with no productive angle attached?',required:false},
    {id:'recreation-3',categoryId:'recreation',type:'choice',prompt:'Did rest this month feel restorative, or did it feel like avoidance?',options:['Restorative','Mixed','Avoidance'],required:false},
    {id:'recreation-4',categoryId:'recreation',type:'longtext',prompt:'Describe a moment this month you felt genuinely present and unhurried.',required:false},
    {id:'recreation-5',categoryId:'recreation',type:'checklist',prompt:'Which of these did you actually do this month?',options:['Something outdoors','Something creative or hands-on','Something social just for fun','A full day fully off work','Something new, never tried before'],required:false},
    {id:'recreation-6',categoryId:'recreation',type:'shorttext',prompt:'One thing you keep saying you\'ll do for fun but haven\'t.',required:false},
    {id:'home-1',categoryId:'home',type:'rating',prompt:'Rate the state of your home and environment this month (1–10).',required:true},
    {id:'home-2',categoryId:'home',type:'shorttext',prompt:'One thing worth fixing or improving at home.',required:false},

function setSyncStatus(msg) { const el=document.getElementById('syncStatus'); if(el) el.textContent=msg; }

async function pullCloud() {
  setSyncStatus('Syncing…');
  try {
    const ctrl = new AbortController();
    const timeout = setTimeout(()=>ctrl.abort(), 6000);
    const res = await fetch(`${SYNC_URL}?tool=eq.${SYNC_TOOL}&select=data,updated_at`, {
      headers: { 'apikey': SYNC_ANON_KEY, 'Authorization': 'Bearer ' + SYNC_ANON_KEY, 'x-sync-key': SYNC_KEY },
      signal: ctrl.signal
    });
    clearTimeout(timeout);
    if(!res.ok) { setSyncStatus('Sync error'); return; }
    const rows = await res.json();
    if(!rows.length) { setSyncStatus('Synced'); pushCloudNow(); return; }
    const remote = rows[0];
    const localSyncedAt = localStorage.getItem(SYNC_TOOL + '_synced_at');
    if(!localSyncedAt || new Date(remote.updated_at) > new Date(localSyncedAt)) {
      const d = remote.data;
      if(d.categories) state.categories=d.categories;
      if(d.templates) state.templates=d.templates;
      if(d.reviews) state.reviews=d.reviews;
      if(d.goals) state.goals=d.goals;
      localStorage.setItem('lifeReviewState', JSON.stringify(state));
      localStorage.setItem(SYNC_TOOL + '_synced_at', remote.updated_at);
    }
    setSyncStatus('Synced');
  } catch(e) { setSyncStatus('Offline'); }
}

function ensureReview(type,periodKey){
  let rev=state.reviews.find(r=>r.type===type&&r.periodKey===periodKey);
  if(!rev){
    rev={id:uid(),type,periodKey,date:todayKey(),answers:{},summary:'',insights:null,linkedGoals:[],submitted:false};
    state.reviews.push(rev);
  }
  return rev;
}
function catAverage(categoryId,upToDate){
  // average of rating-type answers for a category across monthly reviews
  const template=state.templates.monthly;
  const ratingQIds=template.filter(q=>q.categoryId===categoryId&&q.type==='rating').map(q=>q.id);
  let sum=0,n=0;
  state.reviews.filter(r=>r.type==='monthly'&&r.submitted&&(!upToDate||r.periodKey<=upToDate)).forEach(r=>{
    ratingQIds.forEach(qid=>{
      const a=r.answers[qid];
      if(a&&a.value!==undefined&&a.value!==null&&a.value!==''){sum+=Number(a.value);n++}
    });
  });
  return n?sum/n:null;
}
function latestMonthlyReview(){
  const done=state.reviews.filter(r=>r.type==='monthly'&&r.submitted).sort((a,b)=>a.periodKey<b.periodKey?1:-1);
  return done[0]||null;
}

// ── QUESTION RENDERING (shared by monthly + weekly) ───────
function renderAnswerControl(q,answer,onUpdate){
  const wrap=document.createElement('div');
  const val=answer&&answer.value!==undefined?answer.value:(q.type==='checklist'?[]:'');
  if(q.type==='rating'){
    const row=document.createElement('div');row.className='rate-row';
    for(let i=1;i<=10;i++){
      const b=document.createElement('button');
      b.className='rate-btn'+(Number(val)===i?' sel':'');
      b.textContent=i;
      b.onclick=()=>{onUpdate(i);renderAnswerControlRefresh(wrap,q,{value:i,notes:answer?answer.notes:''},onUpdate)};
      row.appendChild(b);
    }
    wrap.appendChild(row);
  } else if(q.type==='choice'){
    const row=document.createElement('div');row.className='choice-row';
    (q.options||[]).forEach(opt=>{
      const p=document.createElement('div');
      p.className='choice-pill'+(val===opt?' sel':'');
      p.textContent=opt;
      p.onclick=()=>{onUpdate(opt);renderAnswerControlRefresh(wrap,q,{value:opt,notes:answer?answer.notes:''},onUpdate)};
      row.appendChild(p);
    });
    wrap.appendChild(row);
  } else if(q.type==='shorttext'){
    const inp=document.createElement('input');
    inp.className='inp';inp.value=val||'';inp.placeholder='Your answer...';
    inp.oninput=()=>onUpdate(inp.value);
    wrap.appendChild(inp);
  } else if(q.type==='longtext'){
    const ta=document.createElement('textarea');
    ta.className='inp';ta.value=val||'';ta.placeholder='Your answer...';
    ta.oninput=()=>onUpdate(ta.value);
    wrap.appendChild(ta);
  } else if(q.type==='date'){
    const inp=document.createElement('input');
    inp.type='date';inp.className='inp';inp.value=val||'';
    inp.oninput=()=>onUpdate(inp.value);
    wrap.appendChild(inp);
  } else if(q.type==='checklist'){
    const items=Array.isArray(val)&&val.length?val:(q.options||['','','']).map(t=>({text:t,done:false}));
    const normalized=items.map(it=>typeof it==='string'?{text:it,done:false}:it);
    normalized.forEach((it,idx)=>{
      const row=document.createElement('div');row.className='chk-row';
      const box=document.createElement('div');
      box.className='chk-box'+(it.done?' on':'');
      box.onclick=()=>{it.done=!it.done;onUpdate(normalized);box.classList.toggle('on',it.done)};
      const inp=document.createElement('input');
      inp.className='inp';inp.style.padding='6px 9px';inp.value=it.text||'';inp.placeholder='Item '+(idx+1);
      inp.oninput=()=>{it.text=inp.value;onUpdate(normalized)};
      row.appendChild(box);row.appendChild(inp);
      wrap.appendChild(row);
    });
  } else if(q.type==='file'){
    const inp=document.createElement('input');
    inp.type='file';inp.accept='image/*';inp.className='inp';
    const preview=document.createElement('div');
    if(val){preview.innerHTML=`<img src="${val}" style="max-width:100%;border-radius:6px;margin-top:8px;display:block">`}
    inp.onchange=()=>{
      const f=inp.files[0];if(!f)return;
      const r=new FileReader();
      r.onload=ev=>{onUpdate(ev.target.result);preview.innerHTML=`<img src="${ev.target.result}" style="max-width:100%;border-radius:6px;margin-top:8px;display:block">`};
      r.readAsDataURL(f);
    };
    wrap.appendChild(inp);wrap.appendChild(preview);
  }
  return wrap;
}
function renderAnswerControlRefresh(wrap,q,answer,onUpdate){
  const fresh=renderAnswerControl(q,answer,onUpdate);
  wrap.replaceWith(fresh);
}

function renderReviewForm(container,type,periodKey,template,rev){
  container.innerHTML='';
  const byCat={};
  template.forEach(q=>{
    const key=q.categoryId||'_none';
    if(!byCat[key]) byCat[key]=[];
    byCat[key].push(q);
  });
  Object.keys(byCat).forEach(catKey=>{
    const cat=catKey==='_none'?null:catById(catKey);
    const group=document.createElement('div');
    group.className='cat-group';
    const gh=document.createElement('div');
    gh.className='cat-group-head';
    gh.innerHTML=cat?`<div class="dot" style="background:${cat.color}"></div><div class="cat-group-title">${esc(cat.name)}</div>`:`<div class="cat-group-title">General</div>`;
    group.appendChild(gh);
    byCat[catKey].forEach(q=>{
      const qb=document.createElement('div');
      qb.className='q-block';
      const label=document.createElement('div');
      label.className='q-prompt';
      label.textContent=q.prompt+(q.required?' *':'');
      qb.appendChild(label);
      const answer=rev.answers[q.id]||{value:q.type==='checklist'?[]:'',notes:''};
      const ctrl=renderAnswerControl(q,answer,(newVal)=>{
        rev.answers[q.id]={value:newVal,notes:rev.answers[q.id]?rev.answers[q.id].notes:''};
        autosave();
      });
      qb.appendChild(ctrl);
      group.appendChild(qb);
    });
    container.appendChild(group);
  });
}

// ── INSIGHTS (on-demand, local heuristic — no live AI call) ─
function generateInsights(revId){
  const rev=state.reviews.find(r=>r.id===revId);
  if(!rev) return;
  const lines=[];
  const suggestions=[];
  const scored=[];
  state.categories.forEach(cat=>{
    const now=catAverage(cat.id,rev.periodKey);
    if(now===null) return;
    // previous month for comparison
    const [y,m]=rev.periodKey.split('-').map(Number);
    const prevKey=monthKey(new Date(y,m-2,1));
    const prev=catAverage(cat.id,prevKey);
    scored.push({cat,now,prev});
  });
  scored.sort((a,b)=>a.now-b.now);
  if(scored.length){
    const lowest=scored[0];
    lines.push(esc(lowest.cat.name)+' is your lowest-rated area this month at '+lowest.now.toFixed(1)+'/10.');
    suggestions.push({title:'Improve '+lowest.cat.name.toLowerCase(),categoryId:lowest.cat.id});
    const highest=scored[scored.length-1];
    if(highest.cat.id!==lowest.cat.id) lines.push(esc(highest.cat.name)+' is your strongest area at '+highest.now.toFixed(1)+'/10.');
    scored.forEach(s=>{
      if(s.prev!==null){
        const delta=s.now-s.prev;
        if(Math.abs(delta)>=1){
          lines.push(esc(s.cat.name)+(delta>0?' improved by ':' dropped by ')+Math.abs(delta).toFixed(1)+' points month over month.');
          if(delta<=-1) suggestions.push({title:'Address the drop in '+s.cat.name.toLowerCase(),categoryId:s.cat.id});
        }
      }
    });
  }
  rev.insights={lines,suggestions:suggestions.slice(0,3),generatedAt:todayKey()};
  autosave();
  renderMonthly();
  showToast('Insights generated');
}
function renderInsightsHTML(rev){
  if(!rev.insights) return '';
  let html='<div class="section-label" style="margin-bottom:6px">Insights</div>';
  rev.insights.lines.forEach(l=>{html+='<div style="margin-bottom:4px">'+l+'</div>'});
  (rev.insights.suggestions||[]).forEach(s=>{
    html+=`<div class="insight-goal-sugg"><span style="flex:1">→ Suggested goal: ${esc(s.title)}</span>
      <button class="action-btn" onclick="convertSuggestionToGoal('${rev.id}','${esc(s.title)}','${s.categoryId}')">Add as goal</button></div>`;
  });
  return html;
}
function convertSuggestionToGoal(revId,title,categoryId){
  const g={id:uid(),title,description:'Suggested from monthly review insight.',categoryId,priority:'med',startDate:todayKey(),endDate:'',recurrence:'none',subtasks:[],progressTarget:null,progressValue:0,status:'active',linkedReviewId:revId};
  state.goals.push(g);
  autosave();
  showToast('Goal added');
}

// ── PRINT / PDF EXPORT ─────────────────────────────────────
function printReview(revId){
  const rev=state.reviews.find(r=>r.id===revId);
  if(!rev) return;
  const template=rev.type==='monthly'?state.templates.monthly:state.templates.weekly;
  const w=window.open('','_blank');
  let body='<h1 style="font-family:Georgia,serif">'+(rev.type==='monthly'?'Monthly Review — '+monthLabel(rev.periodKey):'Weekly Check-In — '+rev.periodKey)+'</h1>';
  template.forEach(q=>{
    const a=rev.answers[q.id];
    let val=a?a.value:'';
    if(Array.isArray(val)) val=val.map(v=>(v.done?'[x] ':'[ ] ')+(v.text||'')).join('<br>');
    body+='<p><strong>'+esc(q.prompt)+'</strong><br>'+esc(String(val||'—'))+'</p>';
  });
  if(rev.insights){
    body+='<h3>Insights</h3>';
    rev.insights.lines.forEach(l=>body+='<p>'+l+'</p>');
  }
  w.document.write('<html><head><title>Review Export</title></head><body style="font-family:Georgia,serif;max-width:640px;margin:40px auto;color:#111">'+body+'</body></html>');
  w.document.close();
  w.print();
}

      const sparkWrap=document.createElement('div');

    </div>`;

}

function sparkSVG(points,color){
  const w=300,h=50,pad=4;
  const min=0,max=10;
  const step=points.length>1?(w-pad*2)/(points.length-1):0;
  const coords=points.map((v,i)=>{
    const x=pad+i*step;
    const y=h-pad-((v-min)/(max-min))*(h-pad*2);
    return x+','+y;
  }).join(' ');
  const dots=points.map((v,i)=>{
    const x=pad+i*step;
    const y=h-pad-((v-min)/(max-min))*(h-pad*2);
    return `<circle cx="${x}" cy="${y}" r="2.5" fill="${color}"></circle>`;
  }).join('');
  return `<svg class="spark" viewBox="0 0 ${w} ${h}" preserveAspectRatio="none"><polyline points="${coords}" fill="none" stroke="${color}" stroke-width="1.5"></polyline>${dots}</svg>`;
}

}
function deleteCategory(id){
  if(!confirm('Delete this category? Its questions will be removed from the monthly template; goals linked to it will show as uncategorized.'))return;
  state.categories=state.categories.filter(c=>c.id!==id);
  state.templates.monthly=state.templates.monthly.filter(q=>q.categoryId!==id);
  autosave();renderCategoryList();renderTemplateQuestions();
}
function setTemplateEditType(t){templateEditType=t;renderTemplates()}
function renderTemplateQuestions(){
  const el=document.getElementById('tplQList');if(!el)return;
  el.innerHTML='';
  const list=state.templates[templateEditType];
  list.forEach((q,idx)=>{
    const row=document.createElement('div');
    row.className='card';
    row.innerHTML=`
      <div class="field-row">
        <div class="field" style="flex:2"><span class="field-label">Prompt</span><input class="inp" value="${esc(q.prompt)}" onchange="updateTplQ('${q.id}','prompt',this.value)"></div>
        <div class="field"><span class="field-label">Type</span>
          <select class="sel" onchange="updateTplQ('${q.id}','type',this.value)">
            ${['rating','choice','shorttext','longtext','checklist','date','file'].map(t=>`<option value="${t}" ${q.type===t?'selected':''}>${t}</option>`).join('')}
          </select>
        </div>
      </div>
      <div class="field-row">
        <div class="field"><span class="field-label">Category</span>
          <select class="sel" onchange="updateTplQ('${q.id}','categoryId',this.value)">
            <option value="" ${!q.categoryId?'selected':''}>General</option>
            ${state.categories.map(c=>`<option value="${c.id}" ${q.categoryId===c.id?'selected':''}>${esc(c.name)}</option>`).join('')}
          </select>
        </div>
        <div class="field"><span class="field-label">Required</span>
          <select class="sel" onchange="updateTplQ('${q.id}','required',this.value==='yes')">
            <option value="no" ${!q.required?'selected':''}>No</option>
            <option value="yes" ${q.required?'selected':''}>Yes</option>
          </select>
        </div>
      </div>
      ${q.type==='choice'?`<div class="field"><span class="field-label">Options (comma separated)</span><input class="inp" value="${esc((q.options||[]).join(', '))}" onchange="updateTplQOptions('${q.id}',this.value)"></div>`:''}
      <div class="action-row">
        <button class="action-btn" onclick="moveTplQ('${q.id}',-1)">↑ Move up</button>
        <button class="action-btn" onclick="moveTplQ('${q.id}',1)">↓ Move down</button>
        <button class="action-btn red" onclick="deleteTplQ('${q.id}')">Delete</button>
      </div>`;
    el.appendChild(row);
  });
}
function updateTplQ(id,field,val){
  const q=state.templates[templateEditType].find(x=>x.id===id);if(!q)return;
  q[field]=val;
  autosave();
  if(field==='type') renderTemplateQuestions();
}
function updateTplQOptions(id,val){
  const q=state.templates[templateEditType].find(x=>x.id===id);if(!q)return;
  q.options=val.split(',').map(s=>s.trim()).filter(Boolean);
  autosave();
}
function moveTplQ(id,dir){
  const list=state.templates[templateEditType];
  const idx=list.findIndex(x=>x.id===id);
  const newIdx=idx+dir;
  if(newIdx<0||newIdx>=list.length)return;
  [list[idx],list[newIdx]]=[list[newIdx],list[idx]];
  autosave();renderTemplateQuestions();
}
function deleteTplQ(id){
  state.templates[templateEditType]=state.templates[templateEditType].filter(x=>x.id!==id);
  autosave();renderTemplateQuestions();
}
function addTemplateQuestion(){
  state.templates[templateEditType].push({id:uid(),categoryId:templateEditType==='monthly'?state.categories[0].id:null,type:'shorttext',prompt:'New question',required:false});
  autosave();renderTemplateQuestions();
}

// ── SETTINGS ──────────────────────────────────────────────
function renderSettings(){
  const c=document.getElementById('page-settings');
  c.innerHTML='';
  const head=document.createElement('div');
  head.className='page-head';
  head.innerHTML='<div class="page-title">Settings</div><div class="page-sub">Data, theme, and privacy</div>';
  c.appendChild(head);

  const card=document.createElement('div');
  card.className='card';
  card.innerHTML=`<span class="section-label">Data</span>
    <div class="page-note">Everything here is stored locally in this browser. Nothing is sent anywhere. Every change autosaves — the button below forces an immediate save and confirms it worked.</div>
    <div class="btn-row">
      <button class="btn-main" onclick="manualSave()" style="flex:1">Save Now</button>
    </div>
    <div class="btn-row">
      <button class="btn" onclick="exportJSON()">Export JSON</button>
      <button class="btn" onclick="document.getElementById('importFile').click()">Import JSON</button>
      <button class="action-btn red" onclick="resetAll()">Reset all data</button>
    </div>`;
  c.appendChild(card);

  // Storage diagnostic — shows exactly what's actually persisted right now,
  // so a save issue is visible instead of silent.
  const diagCard=document.createElement('div');
  diagCard.className='card';
  let raw=null, parsedOk=false, sizeKb='0';
  try{
    raw=localStorage.getItem('lifeReviewState');
    if(raw){JSON.parse(raw);parsedOk=true;sizeKb=(raw.length/1024).toFixed(1)}
  }catch(e){parsedOk=false}
  const monthlyCount=state.templates.monthly.length;
  const weeklyCount=state.templates.weekly.length;
  diagCard.innerHTML=`<span class="section-label">Storage Check</span>
    <div class="dash-stat"><div class="dash-stat-label">Data found in this browser</div><div class="dash-stat-val" style="color:${raw?'var(--green)':'var(--red)'}">${raw?'Yes':'No'}</div></div>
    <div class="dash-stat"><div class="dash-stat-label">Stored data readable</div><div class="dash-stat-val" style="color:${parsedOk?'var(--green)':'var(--red)'}">${parsedOk?'Yes':'—'}</div></div>
    <div class="dash-stat"><div class="dash-stat-label">Stored size</div><div class="dash-stat-val">${sizeKb} KB</div></div>
    <div class="dash-stat"><div class="dash-stat-label">Monthly questions (in memory now)</div><div class="dash-stat-val">${monthlyCount}</div></div>
    <div class="dash-stat"><div class="dash-stat-label">Weekly questions (in memory now)</div><div class="dash-stat-val">${weeklyCount}</div></div>
    <div class="dash-stat"><div class="dash-stat-label">Last save this session</div><div class="dash-stat-val">${lastSaveTime?lastSaveTime.toLocaleTimeString():'—'}</div></div>
    <div class="page-note" style="margin-top:10px">If "Monthly questions" reads 84 now but drops back to a lower number after you refresh, the save itself is not reaching this browser's storage — that's a browser/file-path issue, not something to fix by rebuilding the app.</div>`;
  c.appendChild(diagCard);

  const card2=document.createElement('div');
  card2.className='card';
  card2.innerHTML=`<span class="section-label">Appearance</span>
    <div class="btn-row"><button class="btn" onclick="toggleTheme()">Toggle dark / light</button></div>`;
  c.appendChild(card2);
}

// ── INIT ─────────────────────────────────────────────────
(async function(){
  await pullCloud();
  loadData();
  renderAll();
})();
</script>
</body>
</html>
