<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Apartment Checklist</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=IBM+Plex+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#09090b;--s1:#111114;--s2:#18181c;--s3:#202024;
  --border:rgba(255,255,255,0.07);--border-g:rgba(255,255,255,0.14);
  --tx:#e8e8ec;--dim:#454548;--mid:#888890;
  --acc:#c8a84a;--acc-b:#e8c870;--acc-d:#7a6428;
  --green:#4aaa78;--red:#c46858;--blue:#6a9ab8;
  --fd:'Playfair Display',serif;--fm:'IBM Plex Mono',monospace;
}
body.light{
  --bg:#f5f5f0;--s1:#ebebE4;--s2:#deded6;--s3:#d0d0c8;
  --border:rgba(0,0,0,0.08);--border-g:rgba(0,0,0,0.16);
  --tx:#141412;--dim:#9a9a90;--mid:#505048;
  --acc:#8a6820;--acc-b:#c09040;--acc-d:#5a4410;
  --green:#1a7848;--red:#8a3828;--blue:#2a5878;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--tx);font-family:var(--fm);font-size:12px;line-height:1.6;min-height:100vh;transition:background .25s,color .25s;}

/* HEADER */
.hdr{padding:24px 20px 18px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:10px;}
.hdr-l .brand{font-size:8px;letter-spacing:0.25em;text-transform:uppercase;color:var(--acc-d);margin-bottom:4px;}
.hdr-l .title{font-family:var(--fd);font-size:clamp(20px,4.5vw,30px);font-weight:400;line-height:1.1;}
.hdr-l .title em{font-style:italic;color:var(--acc);}
.hdr-r{display:flex;gap:7px;align-items:center;flex-wrap:wrap;}
.hdr-btn{background:none;border:1px solid var(--border-g);border-radius:2px;color:var(--mid);font-family:var(--fm);font-size:8px;letter-spacing:0.1em;padding:5px 11px;cursor:pointer;transition:all .2s;white-space:nowrap;}
.hdr-btn:hover,.hdr-btn.on{color:var(--acc);border-color:var(--acc);background:rgba(200,168,74,0.06);}

/* SUMMARY */
.summary{display:grid;grid-template-columns:repeat(5,1fr);gap:7px;padding:14px 20px;border-bottom:1px solid var(--border);}
.sm-box{background:var(--s1);border:1px solid var(--border);border-radius:3px;padding:9px 11px;}
.sm-val{font-family:var(--fd);font-size:18px;line-height:1;}
.sm-val.green{color:var(--green);}
.sm-val.gold{color:var(--acc);}
.sm-val.red{color:var(--red);}
.sm-lbl{font-size:7px;letter-spacing:0.1em;text-transform:uppercase;color:var(--dim);margin-top:2px;}

/* NAV */
.nav{display:flex;padding:0 20px;border-bottom:1px solid var(--border);overflow-x:auto;position:sticky;top:0;z-index:50;background:rgba(9,9,11,.97);backdrop-filter:blur(10px);}
body.light .nav{background:rgba(245,245,240,.97);}
.nt{font-size:8px;letter-spacing:0.12em;text-transform:uppercase;color:var(--dim);padding:11px 11px;cursor:pointer;border:none;border-bottom:2px solid transparent;background:none;font-family:var(--fm);white-space:nowrap;flex-shrink:0;transition:all .2s;}
.nt:hover{color:var(--mid);}
.nt.active{color:var(--acc);border-bottom-color:var(--acc);}

/* CONTENT */
.content{max-width:920px;margin:0 auto;padding:18px 16px 80px;}
.page{display:none;}
.page.active{display:block;}

/* SEARCH */
.search-bar{display:flex;gap:8px;margin-bottom:16px;align-items:center;}
.search-inp{background:var(--s1);border:1px solid var(--border);border-radius:2px;color:var(--tx);font-family:var(--fm);font-size:11px;padding:7px 12px;outline:none;flex:1;transition:border-color .2s;}
.search-inp:focus{border-color:var(--border-g);}
.search-inp::placeholder{color:var(--dim);}
.filter-btn{background:none;border:1px solid var(--border);border-radius:2px;color:var(--dim);font-family:var(--fm);font-size:8px;letter-spacing:0.08em;padding:5px 10px;cursor:pointer;transition:all .2s;white-space:nowrap;}
.filter-btn:hover,.filter-btn.on{color:var(--acc);border-color:var(--acc);}

/* CATEGORY */
.cat{margin-bottom:22px;}
.cat-hdr{display:flex;align-items:center;gap:10px;margin-bottom:9px;padding-bottom:7px;border-bottom:1px solid var(--border-g);cursor:pointer;user-select:none;}
.cat-icon{font-size:16px;flex-shrink:0;}
.cat-name{font-family:var(--fd);font-size:16px;font-style:italic;flex:1;}
.cat-count{font-size:8px;color:var(--dim);letter-spacing:0.1em;}
.cat-progress{font-size:8px;color:var(--green);}
.cat-arrow{font-size:9px;color:var(--dim);transition:transform .2s;}
.cat.collapsed .cat-arrow{transform:rotate(-90deg);}
.cat-body{overflow:hidden;}
.cat.collapsed .cat-body{display:none;}

/* ITEM */
.item{display:grid;grid-template-columns:20px 1fr 80px 110px 22px;gap:7px;align-items:start;padding:8px 10px;border-radius:2px;border:1px solid transparent;transition:all .15s;margin-bottom:3px;}
.item:hover{background:var(--s1);border-color:var(--border);}
.item.done{opacity:0.45;}
.item.done .item-name{text-decoration:line-through;color:var(--dim);}
.item-chk{width:14px;height:14px;border:1px solid var(--border-g);border-radius:2px;display:flex;align-items:center;justify-content:center;font-size:7px;flex-shrink:0;cursor:pointer;transition:all .15s;margin-top:1px;}
.item.done .item-chk{background:var(--green);border-color:var(--green);color:var(--bg);}
.item-name{font-size:11px;color:var(--tx);line-height:1.45;cursor:pointer;}
.item-note{font-size:9px;color:var(--dim);margin-top:1px;font-style:italic;}
.item-pri{font-size:7px;padding:2px 6px;border-radius:2px;letter-spacing:0.07em;margin-top:3px;display:inline-block;}
.item-pri.p1{background:rgba(196,104,88,0.12);color:var(--red);border:1px solid rgba(196,104,88,0.25);}
.item-pri.p2{background:rgba(200,168,72,0.1);color:var(--acc);border:1px solid rgba(200,168,72,0.2);}
.item-pri.p3{background:rgba(74,170,120,0.08);color:var(--green);border:1px solid rgba(74,170,120,0.18);}
.item-pri.p4{background:rgba(106,154,184,0.08);color:var(--blue);border:1px solid rgba(106,154,184,0.15);}
.item-est{font-family:var(--fd);font-size:12px;color:var(--dim);text-align:right;padding-top:1px;}
.item-price{background:var(--s2);border:1px solid var(--border);border-radius:2px;color:var(--tx);font-family:var(--fd);font-size:12px;width:100%;outline:none;padding:3px 6px;text-align:right;transition:border-color .15s;}
.item-price:focus{border-color:var(--border-g);}
.item-price::placeholder{color:var(--dim);}
.item-del{background:none;border:none;color:var(--dim);cursor:pointer;font-size:11px;opacity:0;transition:all .15s;padding:1px 3px;}
.item:hover .item-del{opacity:1;}
.item-del:hover{color:var(--red);}

/* CAT TOTAL */
.cat-total{display:flex;justify-content:flex-end;align-items:center;gap:12px;padding:6px 10px;margin-top:4px;}
.ct-lbl{font-size:8px;color:var(--dim);letter-spacing:0.1em;}
.ct-val{font-family:var(--fd);font-size:14px;color:var(--acc);}

/* ADD ITEM */
.add-item-row{display:flex;gap:7px;margin-top:6px;flex-wrap:wrap;}
.add-inp{background:var(--s2);border:1px solid var(--border);border-radius:2px;color:var(--tx);font-family:var(--fm);font-size:10px;padding:5px 9px;outline:none;flex:1;min-width:120px;}
.add-inp::placeholder{color:var(--dim);}
.add-btn{background:none;border:1px dashed var(--border-g);border-radius:2px;color:var(--dim);font-family:var(--fm);font-size:8px;letter-spacing:0.1em;padding:5px 12px;cursor:pointer;transition:all .2s;white-space:nowrap;}
.add-btn:hover{color:var(--acc);border-color:var(--acc);}

.grand-total{background:var(--s1);border:1px solid var(--border-g);border-radius:3px;padding:14px 16px;margin-top:18px;}
.gt-row{display:flex;justify-content:space-between;align-items:center;padding:5px 0;border-bottom:1px solid var(--border);}
.gt-row:last-child{border-bottom:none;padding-top:8px;}
.gt-lbl{font-size:9px;color:var(--dim);letter-spacing:0.08em;}
.gt-val{font-family:var(--fd);font-size:14px;color:var(--tx);}
.gt-val.big{font-size:22px;color:var(--acc);}

.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(44px);background:var(--s2);border:1px solid var(--border-g);color:var(--acc);font-size:8px;letter-spacing:0.1em;padding:8px 16px;border-radius:2px;transition:transform .38s cubic-bezier(.34,1.56,.64,1);z-index:999;white-space:nowrap;}
.toast.show{transform:translateX(-50%) translateY(0);}
.empty-search{text-align:center;padding:28px;font-family:var(--fd);font-style:italic;color:var(--dim);font-size:14px;}

@media(max-width:560px){
  .summary{grid-template-columns:1fr 1fr;}
  .item{grid-template-columns:18px 1fr 90px 18px;}
  .item-est{display:none;}
  .content{padding:14px 10px 60px;}
}
</style>
</head>

// ── STATE ──
const LS = 'apt_checklist_v1';
let state = { done:{}, prices:{}, custom:{} };
let activeFilter = null;
let showPendingOnly = false;

function load() {
  try { const s=localStorage.getItem(LS); if(s) state=JSON.parse(s); } catch(e) {}
}
function saveAll() {
  try { localStorage.setItem(LS, JSON.stringify(state)); } catch(e) {}
  toast('Saved.');
  updateSummary();
}

// ── RENDER ──
function render() {
  const navBar = document.getElementById('navBar');
  const container = document.getElementById('pagesContainer');

  // Build nav
  navBar.innerHTML = CATEGORIES.map((cat,ci) => 
    `<button class="nt ${ci===0?'active':''}" onclick="showCat(${ci},this)" id="nav_${cat.id}">${cat.icon} ${cat.name}</button>`
  ).join('');

  // Build pages
  container.innerHTML = CATEGORIES.map((cat,ci) => `
    <div class="page ${ci===0?'active':''}" id="page_${cat.id}">
      ${renderCat(cat)}
    </div>`).join('');

  updateSummary();
}

function renderCat(cat) {
  const items = cat.items;
  const doneCount = items.filter((_,ii) => state.done[`${cat.id}_${ii}`]).length;

  return `<div class="cat" id="cat_${cat.id}">
    <div class="cat-hdr" onclick="togCat('${cat.id}')">
      <div class="cat-icon">${cat.icon}</div>
      <div class="cat-name">${cat.name}</div>
      <div class="cat-count">${items.length} items</div>
      <div class="cat-progress">${doneCount}/${items.length} done</div>
      <div class="cat-arrow">▾</div>
    </div>
    <div class="cat-body">
      ${items.map((item,ii) => renderItem(cat.id, ii, item)).join('')}
      ${renderCustomItems(cat.id)}
      <div class="add-item-row">
        <input class="add-inp" id="addInp_${cat.id}" placeholder="Add custom item...">
        <input class="add-inp" id="addNote_${cat.id}" placeholder="Note (optional)" style="max-width:200px">
        <button class="add-btn" onclick="addCustomItem('${cat.id}')">+ Add</button>
      </div>
      <div class="cat-total">
        <div class="ct-lbl">Category spent:</div>
        <div class="ct-val" id="catTotal_${cat.id}">₦0</div>
      </div>
    </div>
  </div>`;
}

function renderItem(catId, ii, item) {
  const key = `${catId}_${ii}`;
  const done = state.done[key];
  const price = state.prices[key] || '';
  const priClass = ['','p1','p2','p3','p4'][item.pri||3];
  const priLabel = ['','Day One','Week One','Month One','Later'][item.pri||3];
  return `<div class="item ${done?'done':''}" id="item_${key}">
    <div class="item-chk" onclick="togItem('${key}',this)">${done?'✓':''}</div>
    <div onclick="togItem('${key}',document.querySelector('#item_${key} .item-chk'))">
      <div class="item-name">${item.n}</div>
      ${item.note?`<div class="item-note">${item.note}</div>`:''}
      <span class="item-pri ${priClass}">${priLabel}</span>
    </div>
    <div class="item-est">${item.p||'—'}</div>
    <input class="item-price" placeholder="₦ price" value="${price}" oninput="setPrice('${key}',this.value)" onclick="event.stopPropagation()">
    <button class="item-del" onclick="event.stopPropagation()" title="Remove">✕</button>
  </div>`;
}

function renderCustomItems(catId) {
  const customs = state.custom[catId] || [];
  return customs.map((item,ci) => {
    const key = `${catId}_custom_${ci}`;
    const done = state.done[key];
    const price = state.prices[key] || '';
    return `<div class="item ${done?'done':''}" id="item_${key}" style="border-color:rgba(200,168,74,0.15)">
      <div class="item-chk" onclick="togItem('${key}',this)">${done?'✓':''}</div>
      <div onclick="togItem('${key}',document.querySelector('#item_${key} .item-chk'))">
        <div class="item-name">${item.n}</div>
        ${item.note?`<div class="item-note">${item.note}</div>`:''}
        <span class="item-pri p3">Custom</span>
      </div>
      <div class="item-est">—</div>
      <input class="item-price" placeholder="₦ price" value="${price}" oninput="setPrice('${key}',this.value)" onclick="event.stopPropagation()">
      <button class="item-del" onclick="removeCustom('${catId}',${ci})">✕</button>
    </div>`;
  }).join('');
}

// ── ACTIONS ──
function togItem(key, chkEl) {
  state.done[key] = !state.done[key];
  const row = document.getElementById('item_'+key);
  if(row) {
    row.classList.toggle('done', state.done[key]);
    chkEl.textContent = state.done[key] ? '✓' : '';
  }
  updateCatTotal(key.split('_')[0]);
  updateSummary();
}

function setPrice(key, val) {
  state.prices[key] = val;
  updateCatTotal(key.split('_')[0]);
  updateSummary();
}

function togCat(id) {
  document.getElementById('cat_'+id)?.classList.toggle('collapsed');
}

function showCat(ci, btn) {
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.nt').forEach(t=>t.classList.remove('active'));
  const cat = CATEGORIES[ci];
  document.getElementById('page_'+cat.id).classList.add('active');
  btn.classList.add('active');
  window.scrollTo({top:0,behavior:'smooth'});
}

function addCustomItem(catId) {
  const nameInp = document.getElementById('addInp_'+catId);
  const noteInp = document.getElementById('addNote_'+catId);
  const name = nameInp.value.trim();
  if(!name) return;
  if(!state.custom[catId]) state.custom[catId] = [];
  state.custom[catId].push({n:name, note:noteInp.value.trim()});
  nameInp.value = ''; noteInp.value = '';
  saveAll();
  // Re-render this category page
  const cat = CATEGORIES.find(c=>c.id===catId);
  document.getElementById('page_'+catId).innerHTML = renderCat(cat);
  updateCatTotal(catId);
}

function removeCustom(catId, ci) {
  if(!state.custom[catId]) return;
  state.custom[catId].splice(ci,1);
  saveAll();
  const cat = CATEGORIES.find(c=>c.id===catId);
  document.getElementById('page_'+catId).innerHTML = renderCat(cat);
  updateCatTotal(catId);
}

function updateCatTotal(catId) {
  let total = 0;
  Object.keys(state.prices).forEach(key => {
    if(key.startsWith(catId+'_')) {
      total += parseNum(state.prices[key]);
    }
  });
  const el = document.getElementById('catTotal_'+catId);
  if(el) el.textContent = total ? '₦'+fmtNum(total) : '₦0';
}

function updateSummary() {
  let total=0, done=0, spent=0;
  CATEGORIES.forEach(cat => {
    cat.items.forEach((_,ii) => {
      total++;
      const key=`${cat.id}_${ii}`;
      if(state.done[key]) done++;
      spent += parseNum(state.prices[key]||'0');
    });
    (state.custom[cat.id]||[]).forEach((_,ci) => {
      total++;
      const key=`${cat.id}_custom_${ci}`;
      if(state.done[key]) done++;
      spent += parseNum(state.prices[key]||'0');
    });
  });
  const pending = total-done;
  const pct = total ? Math.round((done/total)*100) : 0;
  setText('smTotal',total);
  setText('smDone',done);
  setText('smPending',pending);
  setText('smSpent','₦'+fmtNum(spent));
  setText('smPct',pct+'%');
  CATEGORIES.forEach(cat => updateCatTotal(cat.id));
}

// ── SEARCH ──
let activeFilterPri = null;
let pendingFilter = false;

function handleSearch() {
  const q = document.getElementById('searchInp').value.toLowerCase().trim();
  if(!q) { renderAll(); return; }

  const container = document.getElementById('pagesContainer');
  let html = '<div class="cat"><div class="cat-hdr" style="cursor:default"><div class="cat-name">Search Results</div></div><div class="cat-body">';
  let count = 0;
  CATEGORIES.forEach(cat => {
    cat.items.forEach((item,ii) => {
      if(item.n.toLowerCase().includes(q)||(item.note||'').toLowerCase().includes(q)) {
        html += renderItem(cat.id,ii,item);
        count++;
      }
    });
  });
  if(!count) html += '<div class="empty-search">No items found matching "'+q+'"</div>';
  html += '</div></div>';
  container.innerHTML = html;
  document.querySelectorAll('.nt').forEach(t=>t.classList.remove('active'));
}

function filterPriority(pri, btn) {
  document.getElementById('searchInp').value='';
  if(activeFilterPri===pri) {
    activeFilterPri=null;
    btn.classList.remove('on');
    renderAll(); return;
  }
  activeFilterPri=pri;
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
  const labels=['','Day One','Week One','Month One','Later'];
  const container=document.getElementById('pagesContainer');
  let html=`<div class="cat"><div class="cat-hdr" style="cursor:default"><div class="cat-name">${labels[pri]} Items</div></div><div class="cat-body">`;
  let count=0;
  CATEGORIES.forEach(cat=>{
    cat.items.forEach((item,ii)=>{
      if(item.pri===pri){html+=renderItem(cat.id,ii,item);count++;}
    });
  });
  if(!count) html+='<div class="empty-search">No items in this priority.</div>';
  html+='</div></div>';
  container.innerHTML=html;
  document.querySelectorAll('.nt').forEach(t=>t.classList.remove('active'));
}

function filterPending() {
  document.getElementById('searchInp').value='';
  pendingFilter=!pendingFilter;
  document.getElementById('pendingBtn').classList.toggle('on',pendingFilter);
  if(!pendingFilter){renderAll();return;}
  const container=document.getElementById('pagesContainer');
  let html='<div class="cat"><div class="cat-hdr" style="cursor:default"><div class="cat-name">Pending Items</div></div><div class="cat-body">';
  let count=0;
  CATEGORIES.forEach(cat=>{
    cat.items.forEach((item,ii)=>{
      const key=`${cat.id}_${ii}`;
      if(!state.done[key]){html+=renderItem(cat.id,ii,item);count++;}
    });
  });
  if(!count) html+='<div class="empty-search">Everything is acquired. 🎉</div>';
  html+='</div></div>';
  container.innerHTML=html;
  document.querySelectorAll('.nt').forEach(t=>t.classList.remove('active'));
}

function renderAll() {
  document.getElementById('pagesContainer').innerHTML=CATEGORIES.map((cat,ci)=>
    `<div class="page ${ci===0?'active':''}" id="page_${cat.id}">${renderCat(cat)}</div>`
  ).join('');
  document.querySelectorAll('.nt').forEach((t,i)=>t.classList.toggle('active',i===0));
  updateSummary();
}

function exportSummary() {
  let txt='APARTMENT CHECKLIST SUMMARY\n'+'='.repeat(40)+'\n\n';
  let totalSpent=0;
  CATEGORIES.forEach(cat=>{
    let catSpent=0, catDone=0;
    txt+=`\n${cat.icon} ${cat.name.toUpperCase()}\n${'-'.repeat(30)}\n`;
    cat.items.forEach((item,ii)=>{
      const key=`${cat.id}_${ii}`;
      const done=state.done[key];
      const price=parseNum(state.prices[key]||'0');
      catSpent+=price; if(done) catDone++;
      txt+=`${done?'[x]':'[ ]'} ${item.n}${price?' — ₦'+fmtNum(price):''}\n`;
    });
    txt+=`\nCategory total: ₦${fmtNum(catSpent)} | ${catDone}/${cat.items.length} done\n`;
    totalSpent+=catSpent;
  });
  txt+='\n'+'='.repeat(40)+'\nTOTAL SPENT: ₦'+fmtNum(totalSpent);
  const blob=new Blob([txt],{type:'text/plain'});
  const a=document.createElement('a'); a.href=URL.createObjectURL(blob);
  a.download='apartment-checklist.txt'; a.click();
  toast('Summary exported.');
}

// ── UTILS ──
function parseNum(s){return parseFloat(String(s).replace(/[₦,\s]/g,''))||0;}
function fmtNum(n){return Math.round(n).toLocaleString();}
function setText(id,v){const el=document.getElementById(id);if(el)el.textContent=v;}
function toggleTheme(){
  document.body.classList.toggle('light');
  try{localStorage.setItem('apt_theme',document.body.classList.contains('light')?'light':'dark');}catch(e){}
}
function toast(msg){
  const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2200);
}

// ── INIT ──
load();
try{if(localStorage.getItem('apt_theme')==='light')document.body.classList.add('light');}catch(e){}
render();
