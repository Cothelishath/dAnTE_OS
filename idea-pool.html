<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@300;400&display=swap" rel="stylesheet">
<title>Idea Pool — dAnTE</title>
<style>
:root{
  --bg:#0a0a0a;--bg2:#111;--bg3:#181818;--bg4:#1e1e1e;
  --border:#1e1e1e;--border2:#2a2a2a;--border3:#363636;
  --gold:#c9a84c;--gold-dim:#7a5f28;--gold-glow:rgba(201,168,76,0.08);
  --text:#ddd8ce;--text-dim:#777;--text-muted:#404040;
  --red:#c0392b;--green:#4caf7d;--radius:6px;
}
.light{
  --bg:#f2ede6;--bg2:#eae4dc;--bg3:#e0d9d0;--bg4:#d6cfc5;
  --border:#d8d1c8;--border2:#c8c1b7;--border3:#b8b0a5;
  --gold:#8a6020;--gold-dim:#b8902a;--gold-glow:rgba(138,96,32,0.07);
  --text:#1a1714;--text-dim:#666;--text-muted:#aaa;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;-webkit-tap-highlight-color:transparent}
body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;font-size:13px;line-height:1.5;display:flex;flex-direction:column;min-height:100vh}
::-webkit-scrollbar{width:3px}::-webkit-scrollbar-thumb{background:var(--border3);border-radius:2px}

/* HEADER */
header{flex-shrink:0;background:var(--bg);border-bottom:1px solid var(--border);padding:12px 16px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:50}
.logo{display:flex;flex-direction:column;gap:0;margin-right:auto}
.logo-brand{font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:.22em;color:var(--gold);text-transform:uppercase}
.logo-title{font-family:'Cormorant Garamond',serif;font-size:20px;font-weight:300;color:var(--text);letter-spacing:.04em;line-height:1.1}
.logo-title em{color:var(--gold);font-style:italic}
.hbtn{background:none;border:1px solid var(--border2);border-radius:var(--radius);color:var(--text-dim);font-family:'Inter',sans-serif;font-size:11px;padding:6px 11px;cursor:pointer;transition:all .18s;white-space:nowrap}
.hbtn:hover{border-color:var(--gold);color:var(--gold)}
.hbtn-gold{border-color:var(--gold);color:var(--gold)}
.hbtn-gold:hover{background:var(--gold-glow)}

/* CONTROLS BAR */
.controls{padding:12px 16px;display:flex;gap:8px;flex-wrap:wrap;align-items:center;border-bottom:1px solid var(--border);background:var(--bg2);flex-shrink:0;position:sticky;top:57px;z-index:40}
.search-wrap{flex:1;min-width:140px;position:relative}
.search-inp{width:100%;background:var(--bg3);border:1px solid var(--border2);border-radius:var(--radius);color:var(--text);font-family:'Inter',sans-serif;font-size:12px;padding:8px 12px 8px 32px;outline:none;transition:border-color .18s}
.search-inp:focus{border-color:var(--gold)}
.search-inp::placeholder{color:var(--text-muted)}
.search-icon{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--text-muted);font-size:13px;pointer-events:none}
.filter-row{display:flex;gap:5px;flex-wrap:wrap}
.fpill{padding:4px 11px;border-radius:12px;border:1px solid var(--border2);font-size:11px;cursor:pointer;color:var(--text-muted);transition:all .15s;white-space:nowrap;background:transparent}
.fpill:hover{border-color:var(--text-dim);color:var(--text-dim)}
.fpill.active{border-color:var(--gold);color:var(--gold);background:var(--gold-glow)}
.sort-select{background:var(--bg3);border:1px solid var(--border2);border-radius:var(--radius);color:var(--text-dim);font-family:'JetBrains Mono',monospace;font-size:10px;padding:6px 9px;outline:none;cursor:pointer;letter-spacing:.06em}
.sort-select:focus{border-color:var(--gold)}

/* PICK BUTTON */
.pick-btn{background:var(--gold);border:none;border-radius:var(--radius);color:#000;font-family:'Cormorant Garamond',serif;font-size:15px;font-weight:600;padding:7px 16px;cursor:pointer;transition:all .18s;letter-spacing:.04em;white-space:nowrap}
.pick-btn:hover{background:var(--gold-dim);color:var(--text)}
.pick-btn:active{transform:scale(.97)}

/* MAIN */
main{flex:1;padding:14px 16px 80px;max-width:700px;width:100%;margin:0 auto}

/* STATS ROW */
.stats-row{display:flex;gap:12px;margin-bottom:16px;flex-wrap:wrap}
.stat{display:flex;flex-direction:column;gap:1px}
.stat-num{font-family:'Cormorant Garamond',serif;font-size:22px;color:var(--gold);line-height:1}
.stat-lbl{font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--text-muted);text-transform:uppercase;letter-spacing:.12em}
.stats-div{width:1px;background:var(--border2);align-self:stretch}

/* IDEA CARDS */
.ideas-list{display:flex;flex-direction:column;gap:8px}
.idea-card{background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:13px 14px;display:flex;align-items:flex-start;gap:12px;transition:all .18s;cursor:pointer;position:relative}
.idea-card:hover{border-color:var(--border2)}
.idea-card.engaged{opacity:.6}
.idea-card.engaged .idea-title{text-decoration:line-through;color:var(--text-dim)}
.idea-card.highlighted{border-color:var(--gold);background:var(--gold-glow);animation:pulse .5s ease}
@keyframes pulse{0%{box-shadow:0 0 0 0 rgba(201,168,76,.3)}100%{box-shadow:0 0 0 8px rgba(201,168,76,0)}}

.idea-check{width:20px;height:20px;border:1px solid var(--border3);border-radius:4px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:11px;color:transparent;transition:all .15s;margin-top:1px;cursor:pointer}
.idea-card.engaged .idea-check{background:var(--gold-dim);border-color:var(--gold-dim);color:var(--gold)}
.idea-card.engaged .idea-check::after{content:'✓'}

.idea-body{flex:1;min-width:0}
.idea-title{font-size:13px;color:var(--text);line-height:1.4;font-weight:500;margin-bottom:4px;word-break:break-word}
.idea-note{font-size:11px;color:var(--text-dim);line-height:1.5;margin-bottom:6px;word-break:break-word}
.idea-meta{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.idea-cat{display:inline-flex;align-items:center;gap:3px;padding:2px 8px;border-radius:10px;font-size:10px;font-family:'JetBrains Mono',monospace;letter-spacing:.06em;border:1px solid var(--border2);color:var(--text-muted)}
.idea-cat-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.idea-engaged-tag{font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--gold-dim);letter-spacing:.1em;text-transform:uppercase}
.idea-date{font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--text-muted)}

.idea-actions{display:flex;gap:4px;opacity:0;transition:opacity .15s;flex-shrink:0}
.idea-card:hover .idea-actions{opacity:1}
.iact{background:none;border:none;color:var(--text-muted);cursor:pointer;font-size:12px;padding:4px 6px;border-radius:3px;transition:all .15s}
.iact:hover{color:var(--gold);background:var(--gold-glow)}
.iact.del:hover{color:var(--red);background:rgba(192,57,43,.08)}

/* EMPTY */
.empty{text-align:center;padding:60px 20px;color:var(--text-muted)}
.empty-icon{font-size:40px;opacity:.3;margin-bottom:12px}
.empty-title{font-family:'Cormorant Garamond',serif;font-size:18px;color:var(--text-dim);margin-bottom:6px}
.empty-sub{font-size:12px;color:var(--text-muted);line-height:1.7}

/* FAB */
.fab{position:fixed;bottom:24px;right:20px;width:52px;height:52px;border-radius:50%;background:var(--gold);border:none;color:#000;font-size:24px;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 20px rgba(201,168,76,.3);transition:all .18s;z-index:60}
.fab:hover{background:var(--gold-pale,#e8d5a3);transform:scale(1.06)}
.fab:active{transform:scale(.96)}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.82);z-index:200;display:flex;align-items:flex-end;justify-content:center;padding:0;backdrop-filter:blur(8px)}
.modal-overlay.hidden{display:none}
.modal{background:var(--bg2);border:1px solid var(--border2);border-radius:16px 16px 0 0;padding:20px 18px 32px;width:100%;max-width:600px;max-height:88vh;overflow-y:auto;display:flex;flex-direction:column;gap:13px}
.modal-handle{width:36px;height:3px;background:var(--border3);border-radius:2px;margin:0 auto -4px}
.modal-title{font-family:'Cormorant Garamond',serif;font-size:20px;font-weight:300;color:var(--text)}
.field-label{font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--text-muted);margin-bottom:5px;display:block}
.inp{width:100%;background:var(--bg3);border:1px solid var(--border2);border-radius:var(--radius);color:var(--text);font-family:'Inter',sans-serif;font-size:12px;padding:9px 12px;outline:none;transition:border-color .18s}
.inp:focus{border-color:var(--gold)}
.inp::placeholder{color:var(--text-muted)}
textarea.inp{resize:vertical;min-height:68px;line-height:1.5}
.cat-grid{display:flex;flex-wrap:wrap;gap:6px}
.cat-opt{padding:5px 12px;border-radius:12px;border:1px solid var(--border2);font-size:11px;cursor:pointer;color:var(--text-muted);transition:all .15s;display:flex;align-items:center;gap:5px;background:transparent}
.cat-opt:hover{border-color:var(--text-dim);color:var(--text)}
.cat-opt.selected{border-color:var(--gold);color:var(--gold);background:var(--gold-glow)}
.cat-dot{width:7px;height:7px;border-radius:50%}
.modal-actions{display:flex;gap:8px;justify-content:flex-end;padding-top:4px}
.btn{display:inline-flex;align-items:center;gap:5px;padding:8px 14px;border-radius:var(--radius);border:1px solid var(--border2);background:transparent;color:var(--text-dim);font-family:'Inter',sans-serif;font-size:12px;cursor:pointer;transition:all .18s}
.btn:hover{border-color:var(--gold);color:var(--gold)}
.btn-gold{border-color:var(--gold);color:var(--gold)}
.btn-solid{background:var(--gold);border-color:var(--gold);color:#000;font-weight:500}
.btn-solid:hover{opacity:.9}
.btn-red{border-color:var(--red);color:var(--red)}

/* PICK HIGHLIGHT TOAST */
.toast{position:fixed;bottom:88px;left:50%;transform:translateX(-50%) translateY(6px);background:var(--bg3);border:1px solid var(--gold-dim);color:var(--gold);font-family:'JetBrains Mono',monospace;font-size:11px;padding:9px 18px;border-radius:20px;z-index:400;opacity:0;transition:all .25s;pointer-events:none;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* MANAGE CATS */
.cat-manage-row{display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:1px solid var(--border)}
.cat-color-inp{width:28px;height:28px;border-radius:50%;border:2px solid var(--border2);cursor:pointer;padding:0;flex-shrink:0}
.cat-name-inp{flex:1;background:transparent;border:none;color:var(--text);font-family:'Inter',sans-serif;font-size:12px;outline:none;padding:2px 4px;border-radius:3px}
.cat-name-inp:focus{background:var(--bg4)}
.cat-del-btn{background:none;border:none;color:var(--text-muted);cursor:pointer;font-size:12px;padding:3px 6px;transition:color .15s}
.cat-del-btn:hover{color:var(--red)}
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-brand">dAnTE</div>
    <div class="logo-title">Idea <em>Pool</em></div>
  </div>
  <button class="hbtn" id="syncStatus" style="cursor:default;">—</button>
  <button class="hbtn" onclick="toggleTheme()">☀︎</button>
  <button class="hbtn" onclick="openCatManager()">⬡ Categories</button>
  <button class="hbtn" onclick="exportData()">⬇</button>
  <button class="hbtn" onclick="importData()">⬆</button>
  <button class="hbtn hbtn-gold" onclick="saveData()">Save</button>
</header>

<div class="controls">
  <div class="search-wrap">
    <span class="search-icon">🔍</span>
    <input class="search-inp" id="searchInp" placeholder="Search ideas..." oninput="renderList()">
  </div>
  <button class="pick-btn" onclick="pickRandom()" title="Pick a random idea for me">✦ Pick one</button>
  <div class="filter-row" id="filterRow"></div>
  <select class="sort-select" onchange="currentSort=this.value;renderList()">
    <option value="newest">Newest</option>
    <option value="oldest">Oldest</option>
    <option value="az">A–Z</option>
    <option value="unengaged">Unengaged first</option>
    <option value="engaged">Engaged first</option>
  </select>
</div>

<main>
  <div class="stats-row" id="statsRow"></div>
  <div class="ideas-list" id="ideasList"></div>
  <div class="empty hidden" id="emptyState">
    <div class="empty-icon">◎</div>
    <div class="empty-title">The pool is empty</div>
    <div class="empty-sub">Add anything you might want to work on.<br>When you can't decide, tap <strong>Pick one</strong> and start.</div>
  </div>
</main>

<button class="fab" onclick="openAddModal()" title="Add idea">+</button>

<!-- ADD / EDIT MODAL -->
<div class="modal-overlay hidden" id="ideaModal">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title" id="modalTitle">New idea</div>
    <div>
      <label class="field-label">What's the task or idea?</label>
      <input class="inp" id="m-title" placeholder="Be specific enough to start without thinking...">
    </div>
    <div>
      <label class="field-label">Notes <span style="font-size:9px;color:var(--text-muted);text-transform:none;letter-spacing:0">(optional — context, sub-tasks, links)</span></label>
      <textarea class="inp" id="m-note" placeholder="Any extra context that makes starting easier..."></textarea>
    </div>
    <div>
      <label class="field-label">Category</label>
      <div class="cat-grid" id="catGrid"></div>
    </div>
    <div>
      <label class="field-label">Estimated time</label>
      <select class="inp" id="m-time" style="appearance:none;cursor:pointer">
        <option value="">— unspecified</option>
        <option value="< 15 min">Under 15 min</option>
        <option value="30 min">30 min</option>
        <option value="1 hr">1 hour</option>
        <option value="2 hr">2 hours</option>
        <option value="half day">Half day</option>
        <option value="full day">Full day</option>
        <option value="ongoing">Ongoing / open-ended</option>
      </select>
    </div>
    <div class="modal-actions">
      <button class="btn btn-red" id="deleteBtn" onclick="deleteIdea()" style="display:none;margin-right:auto">Delete</button>
      <button class="btn" onclick="closeModal()">Cancel</button>
      <button class="btn btn-solid" onclick="saveIdea()">Save</button>
    </div>
  </div>
</div>

<!-- CATEGORY MANAGER MODAL -->
<div class="modal-overlay hidden" id="catModal">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title">Categories</div>
    <div id="catManageList"></div>
    <div style="display:flex;gap:8px;margin-top:4px;align-items:center">
      <input class="inp" id="newCatName" placeholder="New category name..." style="flex:1">
      <input type="color" id="newCatColor" value="#c9a84c" style="width:36px;height:36px;border:1px solid var(--border2);border-radius:50%;cursor:pointer;padding:2px;background:var(--bg3);flex-shrink:0">
      <button class="btn btn-gold" onclick="addCategory()" style="white-space:nowrap">+ Add</button>
    </div>
    <div class="modal-actions">
      <button class="btn btn-solid" onclick="closeCatManager()">Done</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>
<input type="file" id="importFile" accept=".json" style="display:none" onchange="handleImport(event)">

<script>
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,6)}

let ideas=[];
const PREFILL=[
  // ── DANTE CRAFT ──────────────────────────────────────────
  {title:'Write the Dante Craft capability statement — one page, what we do, who we do it for, what sets us apart',cat:'dante',time:'2 hr'},
  {title:'Draft a reusable project proposal template for Dante Craft site bids',cat:'dante',time:'2 hr'},
  {title:'Build a simple project tracker for active Dante Craft jobs',cat:'dante',time:'1 hr'},

// ── RENDER ────────────────────────────────────────────────
function renderAll(){renderStats();renderFilters();renderList()}

function renderStats(){
  const total=ideas.length;
  const eng=ideas.filter(i=>i.engaged).length;
  const uneng=total-eng;
  document.getElementById('statsRow').innerHTML=`
    <div class="stat"><div class="stat-num">${total}</div><div class="stat-lbl">Ideas</div></div>
    <div class="stats-div"></div>
    <div class="stat"><div class="stat-num">${uneng}</div><div class="stat-lbl">Untouched</div></div>
    <div class="stats-div"></div>
    <div class="stat"><div class="stat-num">${eng}</div><div class="stat-lbl">Engaged</div></div>`;
}

function renderFilters(){
  const row=document.getElementById('filterRow');
  row.innerHTML='';
  const all=document.createElement('div');
  all.className='fpill'+(selectedCat==='all'?' active':'');
  all.textContent='All'; all.onclick=()=>{selectedCat='all';renderFilters();renderList()};
  row.appendChild(all);
  categories.forEach(c=>{
    if(!ideas.find(i=>i.cat===c.id)) return;
    const p=document.createElement('div');
    p.className='fpill'+(selectedCat===c.id?' active':'');
    p.textContent=c.label;
    p.onclick=()=>{selectedCat=c.id;renderFilters();renderList()};
    row.appendChild(p);
  });
  const uncat=document.createElement('div');
  uncat.className='fpill'+(selectedCat==='uncat'?' active':'');
  uncat.textContent='Uncategorised';
  uncat.style.display=ideas.find(i=>!i.cat)?'':'none';
  uncat.onclick=()=>{selectedCat='uncat';renderFilters();renderList()};
  row.appendChild(uncat);
}

function getFiltered(){
  const q=document.getElementById('searchInp').value.trim().toLowerCase();
  let list=ideas.filter(i=>{
    if(selectedCat==='uncat') return !i.cat;
    if(selectedCat!=='all'&&i.cat!==selectedCat) return false;
    if(q&&!(i.title.toLowerCase().includes(q)||(i.note&&i.note.toLowerCase().includes(q)))) return false;
    return true;
  });
  if(currentSort==='oldest') list=[...list].reverse();
  else if(currentSort==='az') list=[...list].sort((a,b)=>a.title.localeCompare(b.title));
  else if(currentSort==='unengaged') list=[...list].sort((a,b)=>(a.engaged?1:0)-(b.engaged?1:0));
  else if(currentSort==='engaged') list=[...list].sort((a,b)=>(b.engaged?1:0)-(a.engaged?1:0));
  return list;
}

function renderList(){
  const list=document.getElementById('ideasList');
  const empty=document.getElementById('emptyState');
  const filtered=getFiltered();
  list.innerHTML='';
  if(!filtered.length){empty.classList.remove('hidden');return}
  empty.classList.add('hidden');
  filtered.forEach(idea=>{
    const cat=categories.find(c=>c.id===idea.cat);
    const card=document.createElement('div');
    card.className='idea-card'+(idea.engaged?' engaged':'');
    card.id='card-'+idea.id;
    card.innerHTML=`
      <div class="idea-check" onclick="toggleEngaged(event,'${idea.id}')" title="${idea.engaged?'Mark as not yet done':'Mark as engaged'}"></div>
      <div class="idea-body" onclick="openEdit('${idea.id}')">
        <div class="idea-title">${esc(idea.title)}</div>
        ${idea.note?`<div class="idea-note">${esc(idea.note)}</div>`:''}
        <div class="idea-meta">
          ${cat?`<div class="idea-cat"><div class="idea-cat-dot" style="background:${cat.color}"></div>${cat.label}</div>`:''}
          ${idea.time?`<div class="idea-cat" style="border-color:transparent;padding-left:0">⏱ ${idea.time}</div>`:''}
          ${idea.engaged?`<div class="idea-engaged-tag">Previously engaged</div>`:''}
        </div>
      </div>
      <div class="idea-actions">
        <button class="iact" onclick="openEdit('${idea.id}')" title="Edit">✎</button>
        <button class="iact del" onclick="confirmDelete(event,'${idea.id}')" title="Delete">✕</button>
      </div>`;
    list.appendChild(card);
  });
  renderStats();
}

function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}

// ── TOGGLE ENGAGED ────────────────────────────────────────
function toggleEngaged(e,id){
  e.stopPropagation();
  const idea=ideas.find(i=>i.id===id); if(!idea) return;
  idea.engaged=!idea.engaged;
  idea.engagedDate=idea.engaged?Date.now():null;
  renderList(); saveData();
}

// ── PICK RANDOM ───────────────────────────────────────────
function pickRandom(){
  const pool=getFiltered().filter(i=>!i.engaged);
  if(!pool.length){
    const all=getFiltered();
    if(!all.length){showToast('Pool is empty — add some ideas');return}
    // All engaged — pick from all
    const pick=all[Math.floor(Math.random()*all.length)];
    highlightCard(pick.id,'All ideas have been engaged — here\'s one anyway');
    return;
  }
  const pick=pool[Math.floor(Math.random()*pool.length)];
  highlightCard(pick.id,'Picked for you ✦');
}

function highlightCard(id,msg){
  document.querySelectorAll('.idea-card').forEach(c=>c.classList.remove('highlighted'));
  const card=document.getElementById('card-'+id);
  if(card){
    card.classList.add('highlighted');
    card.scrollIntoView({behavior:'smooth',block:'center'});
    setTimeout(()=>card.classList.remove('highlighted'),3000);
  }
  showToast(msg);
}

function openAddModal(){

  document.getElementById('m-note').value='';

  mSelectedCat=null;
  buildCatGrid();
  document.getElementById('ideaModal').classList.remove('hidden');
  setTimeout(()=>document.getElementById('m-title').focus(),80);
}

function openEdit(id){
  const idea=ideas.find(i=>i.id===id); if(!idea) return;
  editId=id;
  document.getElementById('modalTitle').textContent='Edit idea';
  document.getElementById('deleteBtn').style.display='';
  document.getElementById('m-title').value=idea.title||'';
  document.getElementById('m-note').value=idea.note||'';
  document.getElementById('m-time').value=idea.time||'';
  mSelectedCat=idea.cat||null;
  buildCatGrid();
  document.getElementById('ideaModal').classList.remove('hidden');
}

function buildCatGrid(){
  const grid=document.getElementById('catGrid');
  grid.innerHTML='';
  categories.forEach(c=>{
    const div=document.createElement('div');
    div.className='cat-opt'+(mSelectedCat===c.id?' selected':'');
    div.innerHTML=`<div class="cat-dot" style="background:${c.color}"></div>${c.label}`;
    div.onclick=()=>{
      mSelectedCat=mSelectedCat===c.id?null:c.id;
      buildCatGrid();
    };
    grid.appendChild(div);
  });
}

function saveIdea(){
  const title=document.getElementById('m-title').value.trim();
  if(!title){showToast('Give this idea a title');return}
  const idea={
    id:editId||uid(),
    title,
    note:document.getElementById('m-note').value.trim(),
    cat:mSelectedCat,
    time:document.getElementById('m-time').value,
    engaged:editId?(ideas.find(i=>i.id===editId)||{}).engaged||false:false,
    engagedDate:editId?(ideas.find(i=>i.id===editId)||{}).engagedDate||null:null,
    created:editId?(ideas.find(i=>i.id===editId)||{}).created||Date.now():Date.now(),
  };
  if(editId) ideas=ideas.map(i=>i.id===editId?idea:i);
  else ideas.unshift(idea);
  closeModal(); renderAll(); saveData(); showToast('Saved');
}

function deleteIdea(){
  if(!confirm('Remove this idea from the pool?')) return;
  ideas=ideas.filter(i=>i.id!==editId);
  closeModal(); renderAll(); saveData(); showToast('Removed');
}

function confirmDelete(e,id){
  e.stopPropagation();
  if(!confirm('Remove this idea?')) return;
  ideas=ideas.filter(i=>i.id!==id);
  renderAll(); saveData();
}

function closeModal(){document.getElementById('ideaModal').classList.add('hidden')}

document.getElementById('ideaModal').addEventListener('click',e=>{
  if(e.target===document.getElementById('ideaModal')) closeModal();
});

function setSyncStatus(msg) { const el=document.getElementById('syncStatus'); if(el) el.textContent=msg; }

async function pullCloud() {
  setSyncStatus('Syncing…');
  try {
    const ctrl = new AbortController();
    const timeout = setTimeout(()=>ctrl.abort(), 6000);
    const res = await fetch(`${SYNC_URL}?tool=eq.${SYNC_TOOL}&select=data,updated_at`, {
      headers: { 'apikey': SYNC_ANON_KEY, 'Authorization': 'Bearer ' + SYNC_ANON_KEY, 'x-sync-key': SYNC_KEY },
      signal: ctrl.signal
    });
    clearTimeout(timeout);
    if(!res.ok) { setSyncStatus('Sync error'); return; }
    const rows = await res.json();
    if(!rows.length) { setSyncStatus('Synced'); pushCloudNow(); return; }
    const remote = rows[0];
    const localSyncedAt = localStorage.getItem(SYNC_TOOL + '_synced_at');
    if(!localSyncedAt || new Date(remote.updated_at) > new Date(localSyncedAt)) {
      const d = remote.data;
      if(d.ideas) ideas=d.ideas;
      if(d.categories) categories=d.categories;
      localStorage.setItem('ideaPool', JSON.stringify({ideas,categories}));
      localStorage.setItem(SYNC_TOOL + '_synced_at', remote.updated_at);
    }
    setSyncStatus('Synced');
  } catch(e) { setSyncStatus('Offline'); }
}

}

async function pushCloudNow() {

      method: 'POST',

      body: JSON.stringify([{ tool: SYNC_TOOL, data: {ideas,categories} }])
    });
    if(!res.ok) { setSyncStatus('Sync error'); return; }
    const rows = await res.json();
    if(rows.length) localStorage.setItem(SYNC_TOOL + '_synced_at', rows[0].updated_at);

}

    try{
      const d=JSON.parse(raw);
      if(d.ideas) ideas=d.ideas;
      if(d.categories&&d.categories.length) categories=d.categories;
    }catch(e){}
  }
}
function exportData(){
  const blob=new Blob([JSON.stringify({ideas,categories},null,2)],{type:'application/json'});
  const a=document.createElement('a'); a.href=URL.createObjectURL(blob);
  a.download='idea-pool.json'; a.click(); showToast('Exported');
}
function importData(){document.getElementById('importFile').click()}
function handleImport(e){
  const file=e.target.files[0]; if(!file) return;
  const r=new FileReader();
  r.onload=ev=>{
    try{
      const d=JSON.parse(ev.target.result);
      if(d.ideas) ideas=d.ideas;
      if(d.categories&&d.categories.length) categories=d.categories;
      renderAll(); saveData(); showToast('Imported');
    }catch(err){showToast('Import failed')}
  };
  r.readAsText(file); e.target.value='';
}
function toggleTheme(){
  isDark=!isDark;
  document.body.classList.toggle('light',!isDark);
  localStorage.setItem('ideaPoolTheme',isDark?'dark':'light');
}
function showToast(msg){
  const t=document.getElementById('toast'); t.textContent=msg;
  t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),2200);
}
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeModal()});

// ── INIT ─────────────────────────────────────────────────
const th=localStorage.getItem('ideaPoolTheme');
if(th==='light'){isDark=false;document.body.classList.add('light')}
(async function(){
  await pullCloud();
  loadData();
  // Seed with prefill ideas if pool is empty (first run)
  if(!ideas.length){
    ideas=PREFILL.map((p,i)=>({
      id:uid(),
      title:p.title,
      note:p.note||'',
      cat:p.cat||null,
      time:p.time||'',
      engaged:false,
      engagedDate:null,
      created:Date.now()-((PREFILL.length-i)*1000)
    }));
  }
  renderAll();
})();
</script>
